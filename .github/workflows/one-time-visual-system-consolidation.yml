name: One-time visual system consolidation

on:
  push:
    branches:
      - fix/design-system-consolidation-20260720

permissions:
  contents: write

jobs:
  consolidate:
    if: ${{ !contains(github.event.head_commit.message, 'apply canonical visual system') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: fix/design-system-consolidation-20260720
          fetch-depth: 0

      - name: Apply consolidation and dead-code cleanup
        run: bash scripts/design-system/run-visual-system-consolidation.sh

      - name: Validate JavaScript contracts
        run: |
          node scripts/design-system/test-visual-system-contract.mjs
          node scripts/design-system/audit-css.mjs

      - name: Validate changed PHP syntax
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [ -n "$file" ] && php -l "$file"
          done < <(git diff --name-only --diff-filter=ACM HEAD -- '*.php')

      - name: Validate patch integrity
        run: git diff --check

      - name: Remove one-time migration machinery
        run: |
          rm -f .github/workflows/one-time-visual-system-consolidation.yml
          rm -f scripts/design-system/run-visual-system-consolidation.sh
          rm -f scripts/design-system/.consolidate_visual_system.py

      - name: Commit consolidated system
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(design-system): apply canonical visual system and remove dead assets"
          git push origin HEAD:fix/design-system-consolidation-20260720
