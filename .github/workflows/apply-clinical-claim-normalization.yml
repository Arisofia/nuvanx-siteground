name: Apply Clinical Claim Normalization

on:
  push:
    branches:
      - feat/clinical-claims-governance-20260717
    paths:
      - scripts/clinical/normalize-legacy-claims.mjs
      - .github/workflows/apply-clinical-claim-normalization.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Normalize legacy clinical copy
        run: node scripts/clinical/normalize-legacy-claims.mjs

      - name: Validate PHP
        run: php -l wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php

      - name: Commit normalized source
        run: |
          set -euo pipefail
          if git diff --quiet -- wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php; then
            echo 'Legacy clinical copy is already canonical.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php
          git commit -m 'refactor(clinical): normalize legacy content source'
          git push origin HEAD:${{ github.ref_name }}
