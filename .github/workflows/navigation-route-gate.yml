name: Navigation Route Gate

on:
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/inc/nvx-navigation-filters.php'
      - 'wp-content/themes/nuvanx-medical/header.php'
      - 'wp-content/themes/nuvanx-medical/footer.php'
      - 'scripts/navigation/test-published-menu-contract.php'
      - 'scripts/navigation/test-header-accessibility-contract.mjs'
      - 'scripts/navigation/test-footer-route-contract.mjs'
      - '.github/workflows/navigation-route-gate.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/inc/nvx-navigation-filters.php'
      - 'wp-content/themes/nuvanx-medical/header.php'
      - 'wp-content/themes/nuvanx-medical/footer.php'
      - 'scripts/navigation/test-published-menu-contract.php'
      - 'scripts/navigation/test-header-accessibility-contract.mjs'
      - 'scripts/navigation/test-footer-route-contract.mjs'
      - '.github/workflows/navigation-route-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  published-routes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate navigation, header and footer sources
        run: |
          set -euo pipefail
          php -l wp-content/themes/nuvanx-medical/inc/nvx-navigation-filters.php
          php -l wp-content/themes/nuvanx-medical/header.php
          php -l wp-content/themes/nuvanx-medical/footer.php
          php -l scripts/navigation/test-published-menu-contract.php
          node --check scripts/navigation/test-header-accessibility-contract.mjs
          node --check scripts/navigation/test-footer-route-contract.mjs

      - name: Enforce native navigation and published routes
        run: |
          set -euo pipefail
          php scripts/navigation/test-published-menu-contract.php
          node scripts/navigation/test-header-accessibility-contract.mjs
          node scripts/navigation/test-footer-route-contract.mjs
