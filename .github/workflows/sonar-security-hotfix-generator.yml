name: Sonar Security Hotfix Generator

on:
  workflow_run:
    workflows: ['Deploy Staging2 (manual)']
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: sonar-security-hotfix-generator
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'fix/sonar-security-hotspots-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out master
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Download contract evidence from completed run
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/sonar-hotfix
          artifacts_json="$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts")"
          artifact_url="$(jq -r '.artifacts[] | select(.name | startswith("staging2-contract-validation-")) | .archive_download_url' <<<"$artifacts_json" | head -n1)"
          test -n "$artifact_url" && test "$artifact_url" != null
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$artifact_url" -o /tmp/sonar-hotfix/evidence.zip
          unzip -q /tmp/sonar-hotfix/evidence.zip -d /tmp/sonar-hotfix/evidence
          test -f /tmp/sonar-hotfix/evidence/sonar-hotfix-files.json

      - name: Rebuild clean branch from master and restore validated files
        env:
          TARGET_BRANCH: fix/sonar-security-hotspots-20260723
        shell: bash
        run: |
          set -euo pipefail
          git switch -C "$TARGET_BRANCH" origin/master
          rm .github/workflows/sonar-security-hotfix-generator.yml
          python3 <<'PY'
          import base64
          import json
          from pathlib import Path

          artifact = json.loads(Path('/tmp/sonar-hotfix/evidence/sonar-hotfix-files.json').read_text(encoding='utf-8'))
          expected = {
              'scripts/staging2/capture-visual-qa-browser.mjs',
              'scripts/staging2/test-deploy-workflow-contract.mjs',
              'scripts/staging2/verify-rendered-acceptance-ssh.mjs',
              'wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php',
          }
          files = artifact.get('files', {})
          if set(files) != expected:
              raise SystemExit(f'unexpected artifact paths: {sorted(files)}')
          for relative, spec in files.items():
              target = Path(relative)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(base64.b64decode(spec['content_base64'], validate=True))
          PY

      - name: Validate corrected branch
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/staging2/capture-visual-qa-browser.mjs
          node --check scripts/staging2/test-deploy-workflow-contract.mjs
          node --check scripts/staging2/verify-rendered-acceptance-ssh.mjs
          /usr/bin/php -l wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php
          node scripts/staging2/test-deploy-workflow-contract.mjs
          git diff --check
          ! grep -Fq 'Math.random()' scripts/staging2/capture-visual-qa-browser.mjs
          ! grep -Fq "PATH: '/usr/bin:/bin:/usr/sbin:/sbin'" scripts/staging2/test-deploy-workflow-contract.mjs
          ! grep -Fq "spawnSync('ssh'" scripts/staging2/verify-rendered-acceptance-ssh.mjs
          ! grep -Fq "'http://www.nuvanx.com'" wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php
          ! grep -Fq "'http://nuvanx.com'" wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php

      - name: Force-push clean validated branch
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/sonar-security-hotspots-20260723
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(security): resolve Sonar hotspots in staging2 tooling'
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${TARGET_BRANCH}"
