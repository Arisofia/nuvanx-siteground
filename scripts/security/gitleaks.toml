# Gitleaks configuration for Issue #45 inventory / purge / verify.
# Extends the default ruleset. Evidence stays path-only and redacted.

title = "NUVANX Issue 45 security scanners"

[extend]
useDefault = true

[[allowlists]]
id = "issue45-recovery-public-key-fingerprint"
description = "Pinned SHA-256 of the offline recovery PUBLIC key is not a secret credential"
regexTarget = "match"
regexes = [
  '''(?i)97b999b0c159f0a747c4b6d230c9fe8ffd213420ca5fd339d9555ff5cb5d235a''',
]
