name: One-time QA Visual Blockers

on:
  push:
    branches:
      - fix/qa-visual-blockers-plan-20260720
    paths:
      - '.github/qa-visual-blockers.trigger'

permissions:
  contents: write

concurrency:
  group: one-time-qa-visual-blockers
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out target branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: fix/qa-visual-blockers-plan-20260720
          fetch-depth: 0

      - name: Apply requested plan
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')

          strategy_path = root / 'wp-content/themes/nuvanx-medical/inc/nvx-strategy-pages.php'
          strategy = strategy_path.read_text(encoding='utf-8')
          review_old = '<article class="nvx-brand-readable nvx-strategy-page nvx-strategy-page--review">'
          review_new = '<article class="nvx-brand-readable nvx-strategy-page nvx-strategy-page--review nvx-shell">'
          if review_old in strategy:
              strategy = strategy.replace(review_old, review_new, 1)
          elif review_new not in strategy:
              raise SystemExit('Review article marker not found')

          start = strategy.index('function nvx_strategy_investment_markup(): string')
          end = strategy.index('function nvx_strategy_page_markup', start)
          investment = strategy[start:end]
          investment_old = '<article class="nvx-brand-readable nvx-strategy-page">'
          investment_new = '<article class="nvx-brand-readable nvx-strategy-page nvx-shell">'
          if investment_old in investment:
              investment = investment.replace(investment_old, investment_new, 1)
          elif investment_new not in investment:
              raise SystemExit('Investment article marker not found')
          strategy = strategy[:start] + investment + strategy[end:]
          strategy_path.write_text(strategy, encoding='utf-8')

          contact_path = root / 'wp-content/themes/nuvanx-medical/templates/template-contact.php'
          contact = contact_path.read_text(encoding='utf-8')
          contact = contact.replace(' style="border:0;"', '').replace(" style='border:0;'", '')
          if '<div class="nvx-clinics-grid">' not in contact:
              raise SystemExit('Contact clinics grid wrapper not found')
          contact_path.write_text(contact, encoding='utf-8')

          closure_path = root / 'wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php'
          closure = closure_path.read_text(encoding='utf-8')
          root_pattern = re.compile(
              r'\n/\* Strategy pages own one full-width editorial hierarchy\. \*/\n'
              r'\.nvx-page__content > \.nvx-strategy-page \{.*?\n\}\n',
              re.S,
          )
          closure, root_count = root_pattern.subn(
              '\n/* Strategy pages retain the canonical shell restored in PHP markup. */\n',
              closure,
              count=1,
          )
          if root_count != 1:
              raise SystemExit(f'Expected one strategy root override, removed {root_count}')

          contact_pattern = re.compile(
              r'\n/\* Contact cards use the same shell, card and control contracts as treatment pages\. \*/.*?'
              r'\n/\* Native details controls',
              re.S,
          )
          closure, contact_count = contact_pattern.subn('\n/* Native details controls', closure, count=1)
          if contact_count != 1:
              raise SystemExit(f'Expected one contact closure block, removed {contact_count}')
          closure_path.write_text(closure, encoding='utf-8')

          components_path = root / 'wp-content/themes/nuvanx-medical/assets/css/nvx-components.css'
          components = components_path.read_text(encoding='utf-8').rstrip() + '\n'
          marker = '/* CONTACT CLINIC CARDS — canonical editorial grid */'
          contact_css = r'''

          /* CONTACT CLINIC CARDS — canonical editorial grid */
          .nvx-page--contact .nvx-section--contact-hero {
            background: var(--nvx-surface-base);
          }

          .nvx-page--contact .nvx-clinics-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--nvx-gap-base);
            margin-top: var(--nvx-space-6);
          }

          .nvx-page--contact .nvx-clinic-card {
            display: flex;
            flex-direction: column;
            gap: var(--nvx-space-3);
            min-width: 0;
            padding: var(--nvx-pad-card);
            border: var(--nvx-border-hairline) solid var(--nvx-color-line);
            border-radius: var(--nvx-radius-card);
            background: var(--nvx-light);
            box-shadow: var(--nvx-shadow-min);
          }

          .nvx-page--contact .nvx-clinic-card__header {
            display: grid;
            gap: var(--nvx-space-1);
          }

          .nvx-page--contact .nvx-clinic-card__data {
            display: grid;
            gap: var(--nvx-space-2);
            margin: 0;
            padding: 0;
            list-style: none;
          }

          .nvx-page--contact .nvx-clinic-card__data li {
            display: block;
            margin: 0;
          }

          .nvx-page--contact .nvx-clinic-card__data .nvx-icon {
            width: var(--nvx-icon-xs);
            height: var(--nvx-icon-xs);
            margin-right: var(--nvx-space-1);
            color: var(--nvx-accent-muted);
            vertical-align: text-bottom;
          }

          .nvx-page--contact .nvx-clinic-card__map {
            overflow: hidden;
            border-radius: var(--nvx-radius-image);
            background: var(--nvx-surface-base);
          }

          .nvx-page--contact .nvx-clinic-card__map iframe {
            display: block;
            width: 100%;
            border: 0;
          }

          .nvx-page--contact .nvx-clinic-card > .nvx-btn {
            align-self: flex-start;
            margin-top: auto;
          }

          @media (max-width: 720px) {
            .nvx-page--contact .nvx-clinics-grid {
              grid-template-columns: 1fr;
            }
          }
          '''.strip('\n')
          if marker not in components:
              components += contact_css + '\n'
          components_path.write_text(components, encoding='utf-8')

          qa_path = root / 'scripts/staging2/rendered-qa.mjs'
          qa = qa_path.read_text(encoding='utf-8')
          old_name = '`${slug}-${viewport}-consent.png`'
          new_name = '`${slug}-consent-${viewport}.png`'
          if old_name in qa:
              qa = qa.replace(old_name, new_name, 1)
          elif new_name not in qa:
              raise SystemExit('Consent screenshot name not found')
          qa_path.write_text(qa, encoding='utf-8')

          qa_contract_path = root / 'scripts/staging2/test-rendered-qa-contract.mjs'
          qa_contract = qa_contract_path.read_text(encoding='utf-8')
          old_contract = r'/`\$\{slug\}-\$\{viewport\}-consent\.png`/'
          new_contract = r'/`\$\{slug\}-consent-\$\{viewport\}\.png`/'
          if old_contract in qa_contract:
              qa_contract = qa_contract.replace(old_contract, new_contract, 1)
          elif new_contract not in qa_contract:
              raise SystemExit('Consent screenshot test marker not found')
          qa_contract_path.write_text(qa_contract, encoding='utf-8')

          visual_test = root / 'scripts/design-system/test-strategy-contact-visual-closure.mjs'
          visual_test.write_text(r'''#!/usr/bin/env node
          import fs from 'node:fs';
          import path from 'node:path';
          import process from 'node:process';
          import { fileURLToPath } from 'node:url';

          const root = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '../..');
          const read = (relative) => fs.readFileSync(path.join(root, relative), 'utf8');
          const failures = [];
          const requireText = (source, text, message) => { if (!source.includes(text)) failures.push(message); };
          const forbidText = (source, text, message) => { if (source.includes(text)) failures.push(message); };

          const strategy = read('wp-content/themes/nuvanx-medical/inc/nvx-strategy-pages.php');
          const components = read('wp-content/themes/nuvanx-medical/assets/css/nvx-components.css');
          const closure = read('wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php');

          requireText(strategy, 'nvx-strategy-page--review nvx-shell', 'review article must use the canonical shell');
          const investmentStart = strategy.indexOf('function nvx_strategy_investment_markup(): string');
          const investmentEnd = strategy.indexOf('function nvx_strategy_page_markup', investmentStart);
          requireText(strategy.slice(investmentStart, investmentEnd), 'nvx-strategy-page nvx-shell', 'investment article must use the canonical shell');

          forbidText(closure, '.nvx-page__content > .nvx-strategy-page', 'late CSS must not override the restored strategy shell');
          requireText(closure, '.nvx-strategy-page > .nvx-brand-hero', 'strategy hero presentation must remain available');
          requireText(closure, '.nvx-strategy-page > .nvx-brand-section', 'strategy section presentation must remain available');

          requireText(components, '/* CONTACT CLINIC CARDS — canonical editorial grid */', 'clinic cards must live in components.css');
          requireText(components, '.nvx-page--contact .nvx-clinics-grid', 'clinic grid selector is missing');
          requireText(components, 'grid-template-columns: repeat(2, minmax(0, 1fr));', 'desktop clinic grid must use two columns');
          requireText(components, '.nvx-page--contact .nvx-clinic-card', 'clinic card component is missing');
          requireText(components, '.nvx-page--contact .nvx-clinic-card__map iframe', 'clinic map component is missing');
          requireText(components, 'grid-template-columns: 1fr;', 'mobile clinic grid must collapse to one column');
          forbidText(closure, 'Contact cards use the same shell', 'contact cards must not remain in late inline CSS');
          forbidText(components, '!important', 'clinic cards must not use !important');

          if (failures.length) {
            console.error('Strategy/contact visual contract failed:');
            for (const failure of failures) console.error(`- ${failure}`);
            process.exit(1);
          }

          console.log('PASS: strategy shell and canonical contact-card CSS');
          '''.replace(/^          /gm, ''), encoding='utf-8')

          runtime_test = root / 'scripts/staging2/test-runtime-qa-closure-contract.mjs'
          runtime = runtime_test.read_text(encoding='utf-8')
          runtime = runtime.replace(
              "const closure = read('wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php');",
              "const strategy = read('wp-content/themes/nuvanx-medical/inc/nvx-strategy-pages.php');\nconst components = read('wp-content/themes/nuvanx-medical/assets/css/nvx-components.css');\nconst closure = read('wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php');",
              1,
          )
          runtime = re.sub(
              r"for \(const selector of \[.*?\n\}\nrequireText\(closure, 'grid-template-columns: repeat\(2, minmax\(0, 1fr\)\);'.*?requireText\(closure, 'border: 0;'.*?\n",
              "requireText(strategy, 'nvx-strategy-page--review nvx-shell', 'review strategy article must use nvx-shell');\n"
              "const investmentStart = strategy.indexOf('function nvx_strategy_investment_markup(): string');\n"
              "const investmentEnd = strategy.indexOf('function nvx_strategy_page_markup', investmentStart);\n"
              "requireText(strategy.slice(investmentStart, investmentEnd), 'nvx-strategy-page nvx-shell', 'investment strategy article must use nvx-shell');\n"
              "forbidText(closure, '.nvx-page__content > .nvx-strategy-page', 'late CSS must not override the strategy shell');\n"
              "requireText(components, '.nvx-page--contact .nvx-clinics-grid', 'clinic grid must live in components.css');\n"
              "requireText(components, '.nvx-page--contact .nvx-clinic-card__map iframe', 'clinic maps must be styled in components.css');\n"
              "requireText(components, 'border: 0;', 'clinic map border reset must live in components.css');\n",
              runtime,
              count=1,
              flags=re.S,
          )
          runtime_test.write_text(runtime, encoding='utf-8')
          PY

      - name: Validate changes
        run: |
          node --check scripts/staging2/rendered-qa.mjs
          node scripts/staging2/test-rendered-qa-contract.mjs
          node scripts/staging2/test-runtime-qa-closure-contract.mjs
          node scripts/design-system/test-external-visual-closure.mjs
          node scripts/design-system/test-strategy-contact-visual-closure.mjs
          node scripts/design-system/audit-css.mjs
          php -l wp-content/themes/nuvanx-medical/inc/nvx-strategy-pages.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php
          php -l wp-content/themes/nuvanx-medical/templates/template-contact.php

      - name: Commit validated patch
        shell: bash
        run: |
          rm .github/workflows/one-time-qa-visual-blockers.yml
          rm .github/qa-visual-blockers.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix(qa): resolve visual blocker plan'
          git push origin HEAD:fix/qa-visual-blockers-plan-20260720
