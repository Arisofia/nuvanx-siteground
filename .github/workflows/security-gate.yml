name: Security Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Reject tracked files covered by gitignore
        run: |
          set -euo pipefail
          tracked_ignored="$(git ls-files -ci --exclude-standard)"
          if [[ -n "$tracked_ignored" ]]; then
            echo 'ERROR: files are tracked although .gitignore excludes them:'
            printf '%s\n' "$tracked_ignored"
            exit 1
          fi

      - name: Reject forbidden operational paths
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '(^wp-admin/|^wp-includes/|^wp-content/uploads/|^qa/screenshots/|(^|/)wp-config\.php$|(^|/)source_site_wpconfig$|(^|/)\.env($|\.)|(^|/)wp-content/backups[^/]*/|(^|/)dup-installer(/|$)|(^|/)installer/original_files_|(^|/)[^/]*installer-log[^/]*$)' || true)"
          if [[ -n "$forbidden" ]]; then
            echo 'ERROR: forbidden operational or runtime paths are tracked:'
            printf '%s\n' "$forbidden"
            exit 1
          fi

      - name: Scan concrete values and write path-only evidence
        id: scan
        run: |
          set -euo pipefail
          mkdir -p qa/security
          output='qa/security/current-tree-matches.txt'
          : > "$output"
          patterns=(
            "define[[:space:]]*\\([[:space:]]*['\"](AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT|WP_CACHE_KEY_SALT)['\"][[:space:]]*,[[:space:]]*['\"][^'\"]{20,}['\"]"
            "define[[:space:]]*\\([[:space:]]*['\"]DB_PASSWORD['\"][[:space:]]*,[[:space:]]*['\"][^'\"]{8,}['\"]"
            "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "gh[pousr]_[A-Za-z0-9_]{30,}"
          )
          index=0
          for pattern in "${patterns[@]}"; do
            index=$((index + 1))
            matches="$(git grep -lEI "$pattern" -- . ':!docs/security/**' ':!qa/security/**' ':!.github/workflows/security-gate.yml' ':!.github/workflows/security-secret-diagnostic-once.yml' || true)"
            if [[ -n "$matches" ]]; then
              printf '[pattern-%s]\n%s\n' "$index" "$matches" >> "$output"
            fi
          done
          if [[ -s "$output" ]]; then
            echo 'has_matches=true' >> "$GITHUB_OUTPUT"
          else
            printf 'NO_MATCHES\n' > "$output"
            echo 'has_matches=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Upload path-only scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: repository-security-path-evidence
          path: qa/security/current-tree-matches.txt
          retention-days: 7
          if-no-files-found: error

      - name: Reject concrete secret values in tracked text
        if: steps.scan.outputs.has_matches == 'true'
        run: |
          echo 'ERROR: possible concrete secret material remains in tracked files.'
          cat qa/security/current-tree-matches.txt
          exit 1

      - name: Report repository hygiene
        run: |
          set -euo pipefail
          printf 'tracked_files=%s\n' "$(git ls-files | wc -l)"
          printf 'commits=%s\n' "$(git rev-list --count --all)"
          printf 'tracked_ignored=0\n'
