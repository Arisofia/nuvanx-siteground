name: Home Copy Sync Once

on:
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/home-copy-sync-once.yml'

permissions:
  contents: write

concurrency:
  group: home-copy-sync-once-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'content/home-cercano-medico-20260724'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Update visual QA home contract
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          old = "['/', 'Medicina estética con criterio. Madrid.']"
          new = "['/', 'Medicina estética con criterio médico y resultados naturales.']"
          for relative in (
              'scripts/staging2/capture-visual-qa.mjs',
              'scripts/staging2/capture-visual-qa-browser.mjs',
          ):
              path = Path(relative)
              content = path.read_text(encoding='utf-8')
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{relative}: expected one home H1 contract, found {count}')
              path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validate home source and QA scripts
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/php -l wp-content/themes/nuvanx-medical/front-page.php
          node --check scripts/staging2/capture-visual-qa.mjs
          node --check scripts/staging2/capture-visual-qa-browser.mjs
          grep -Fq 'Medicina estética con criterio médico y resultados naturales.' wp-content/themes/nuvanx-medical/front-page.php
          grep -Fq "['/', 'Medicina estética con criterio médico y resultados naturales.']" scripts/staging2/capture-visual-qa.mjs
          grep -Fq "['/', 'Medicina estética con criterio médico y resultados naturales.']" scripts/staging2/capture-visual-qa-browser.mjs
          git diff --check

      - name: Commit validated sync and remove one-off workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/home-copy-sync-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test(staging2): actualizar H1 esperado del home'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${TARGET_BRANCH}"
