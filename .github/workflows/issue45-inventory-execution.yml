name: Issue 45 Final Inventory
run-name: Issue 45 final inventory · ${{ github.event_name }} · ${{ github.sha }}

on:
  push:
    branches:
      - 'security/issue45-final-inventory-*'
    paths:
      - .github/workflows/issue45-inventory-execution.yml
      - scripts/security/issue-45-summarize-inventory.py
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/issue45-inventory-execution.yml
      - scripts/security/issue-45-summarize-inventory.py

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout clean security tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Install pinned history and secret scanners
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-cache-dir git-filter-repo==2.47.0
          version='8.30.1'
          asset="gitleaks_${version}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          curl -fsSLO "${base}/${asset}"
          curl -fsSLO "${base}/gitleaks_${version}_checksums.txt"
          grep " ${asset}$" "gitleaks_${version}_checksums.txt" | sha256sum -c -
          tar -xzf "$asset" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          git filter-repo --version
          gitleaks version

      - name: Create isolated all-refs mirror
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git clone --mirror "$auth_url" /tmp/nuvanx-siteground-purge.git
          git -C /tmp/nuvanx-siteground-purge.git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C /tmp/nuvanx-siteground-purge.git fetch --force "$auth_url" \
            '+refs/heads/*:refs/heads/*' \
            '+refs/tags/*:refs/tags/*'
          git -C /tmp/nuvanx-siteground-purge.git fetch --force "$auth_url" \
            '+refs/pull/*/head:refs/pull/*/head' \
            '+refs/pull/*/merge:refs/pull/*/merge' || true

      - name: Build path-only purge inventory
        run: |
          set -euo pipefail
          mkdir -p /tmp/issue45-tools /tmp/issue45-evidence/pre
          cp scripts/security/issue-45-build-manifest.py /tmp/issue45-tools/
          cp scripts/security/issue-45-inventory.sh /tmp/issue45-tools/
          chmod 700 /tmp/issue45-tools/issue-45-inventory.sh
          /tmp/issue45-tools/issue-45-inventory.sh \
            /tmp/nuvanx-siteground-purge.git \
            /tmp/issue45-evidence/pre \
            /tmp/issue45-tools

      - name: Validate candidate against clean master tree
        run: |
          set -euo pipefail
          git fetch origin master --depth=1
          git ls-tree -r --name-only origin/master | sort > /tmp/current-master-tree.txt
          mkdir -p qa/security/issue45-final-inventory
          python3 scripts/security/issue-45-summarize-inventory.py \
            --manifest /tmp/issue45-evidence/pre/candidate-purge-paths.txt \
            --reasons /tmp/issue45-evidence/pre/candidate-purge-reasons.tsv \
            --current-tree /tmp/current-master-tree.txt \
            --output-dir qa/security/issue45-final-inventory

      - name: Prepare review-safe evidence
        run: |
          set -euo pipefail
          cp /tmp/issue45-evidence/pre/inventory-metadata.txt qa/security/issue45-final-inventory/
          cp /tmp/issue45-evidence/pre/reachable-refs-before.txt qa/security/issue45-final-inventory/
          cp /tmp/issue45-evidence/pre/repository-size-before.txt qa/security/issue45-final-inventory/
          cp /tmp/issue45-evidence/pre/candidate-purge-paths.txt qa/security/issue45-final-inventory/approved-purge-paths.txt
          cp /tmp/issue45-evidence/pre/candidate-purge-reasons.tsv qa/security/issue45-final-inventory/
          cp /tmp/issue45-evidence/pre/evidence-sha256.txt qa/security/issue45-final-inventory/
          cat qa/security/issue45-final-inventory/approval-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Publish approved path-only evidence branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          publish=/tmp/issue45-final-inventory-publish
          rm -rf "$publish"
          mkdir -p "$publish/qa/security/issue45-final-inventory"
          cp qa/security/issue45-final-inventory/* "$publish/qa/security/issue45-final-inventory/"
          cat > "$publish/README.md" <<EOF
          # Issue 45 approved path-only purge inventory

          Generated from an all-refs mirror and validated against the clean master tree.
          This branch contains paths, reasons, intersections, refs and counts only. No secret values or historical blobs are stored here.
          Source commit: ${GITHUB_SHA}
          EOF
          cd "$publish"
          git init
          git checkout --orphan security/issue45-approved-inventory
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md qa/security/issue45-final-inventory
          git commit -m 'security: publish approved issue 45 purge inventory'
          auth_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force "$auth_url" HEAD:refs/heads/security/issue45-approved-inventory

      - name: Upload approved path-only inventory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue45-approved-inventory
          path: qa/security/issue45-final-inventory/
          retention-days: 7
          if-no-files-found: error
