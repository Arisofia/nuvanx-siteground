name: Staging2 Rendered QA

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Public Staging2 URL'
        required: true
        default: 'https://staging2.nuvanx.com'
        type: string
      expected_sha:
        description: 'Full SHA currently deployed in Staging2'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: staging2-rendered-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rendered-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: ${{ inputs.base_url }}
      EXPECTED_DEPLOY_SHA: ${{ inputs.expected_sha }}
      EXPECTED_CANONICAL_HOST: nuvanx.com
      QA_OUTPUT_DIR: qa-artifacts/staging2-rendered
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Validate audit source and contract
        run: |
          node --check scripts/staging2/rendered-qa.mjs
          node -e "JSON.parse(require('fs').readFileSync('scripts/staging2/rendered-qa-routes.json','utf8'))"
          node scripts/staging2/test-rendered-qa-contract.mjs
          node scripts/staging2/test-runtime-qa-closure-contract.mjs

      - name: Install temporary browser dependency
        run: |
          npm install playwright@1.54.1 --no-save
          npx playwright install --with-deps chromium

      - name: Run rendered QA
        id: audit
        shell: bash
        run: |
          set +e
          node scripts/staging2/rendered-qa.mjs
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish QA report in job summary
        if: always()
        run: |
          if [ -f qa-artifacts/staging2-rendered/report.md ]; then
            cat qa-artifacts/staging2-rendered/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'report.md no disponible — la auditoría pudo haber crasheado.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload screenshots and reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: staging2-rendered-qa-${{ github.run_id }}
          path: qa-artifacts/staging2-rendered
          if-no-files-found: error
          retention-days: 14

      - name: Enforce critical findings
        if: always()
        env:
          AUDIT_EXIT_CODE: ${{ steps.audit.outputs.exit_code }}
        run: |
          test "$AUDIT_EXIT_CODE" = "0" || {
            echo 'Rendered QA found critical failures. Review report.md and screenshots.' >&2
            exit 1
          }
