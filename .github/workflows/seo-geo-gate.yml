name: SEO GEO Gate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      enforcement:
        description: Enforcement level
        required: false
        default: critical
        type: choice
        options:
          - none
          - critical
          - all

concurrency:
  group: seo-geo-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tooling:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate Node audit syntax
        run: |
          set -euo pipefail
          node --check scripts/seo/audit-rendered-pages.mjs
          node --check scripts/seo/audit-rendered-pages-browser.mjs
          node --check scripts/seo/test-audit-rendered-pages.mjs

      - name: Test rendered-audit parser
        run: |
          set -euo pipefail
          node scripts/seo/test-audit-rendered-pages.mjs

      - name: Lint SEO and GEO PHP modules
        run: |
          set -euo pipefail
          files=(
            wp-content/themes/nuvanx-medical/inc/nvx-seo-metadata.php
            wp-content/themes/nuvanx-medical/inc/nvx-home-copy.php
            wp-content/themes/nuvanx-medical/inc/nvx-home-content-v2.php
            wp-content/themes/nuvanx-medical/inc/nvx-faq-content-v2.php
            wp-content/themes/nuvanx-medical/inc/nvx-clinical-language.php
            wp-content/themes/nuvanx-medical/inc/nvx-medical-review.php
            scripts/staging2/set-medical-review.php
            wp-content/themes/nuvanx-medical/inc/nvx-treatments-catalog.php
          )
          for file in "${files[@]}"; do
            echo "Linting ${file}"
            php -l "${file}"
          done

      - name: Test canonical SEO metadata
        run: php scripts/seo/test-seo-metadata.php

      - name: Test canonical home copy
        run: php scripts/seo/test-home-copy-canonical.php

      - name: Test home content contracts
        run: php scripts/seo/test-home-content-v2-canonical.php

      - name: Test visible and schema FAQ parity
        run: php scripts/seo/test-home-faq-parity.php

      - name: Test clinical language normalization
        run: php scripts/seo/test-clinical-language.php

      - name: Test medical review provenance
        run: php scripts/seo/test-medical-review.php

      - name: Test treatment catalogue copy
        run: php scripts/seo/test-treatment-catalog-copy.php

  rendered-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NVX_PRODUCTION_URL: https://nuvanx.com
      NVX_STAGING_URL: https://staging2.nuvanx.com
      STAGING_BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
      STAGING_BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
      NVX_STAGING_BASIC_AUTH: ${{ secrets.STAGING_BASIC_USER }}:${{ secrets.STAGING_BASIC_PASSWORD }}
      NVX_AUDIT_ENVIRONMENTS: production,staging
      NVX_SEO_ENFORCE: ${{ inputs.enforcement || 'critical' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install pinned Chromium audit runtime
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Audit final rendered production and staging DOM
        id: audit
        continue-on-error: true
        run: |
          set -euo pipefail
          node scripts/seo/audit-rendered-pages-browser.mjs

      - name: Publish job summary
        if: always()
        run: |
          if [[ -f qa/seo-geo/rendered-audit.md ]]; then
            cat qa/seo-geo/rendered-audit.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'SEO/GEO audit did not produce a report.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload path-safe audit evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: seo-geo-rendered-audit
          path: |
            qa/seo-geo/rendered-audit.json
            qa/seo-geo/rendered-audit.md
          retention-days: 14
          if-no-files-found: error

      - name: Enforce critical SEO/GEO policies
        if: steps.audit.outcome == 'failure'
        run: |
          echo 'Rendered SEO/GEO audit contains blocking findings.'
          exit 1
