name: Deploy Staging2 (manual)

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-staging2.yml'
      - 'tools/deploy/deploy-to-staging2.sh'
      - 'scripts/staging2/test-deploy-workflow-contract.mjs'
      - 'docs/operations/deployment.md'
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Full 40-character SHA already merged into master'
        required: true
        type: string
      confirmation:
        description: 'Explicit deployment confirmation'
        required: true
        default: CANCEL
        type: choice
        options:
          - CANCEL
          - DEPLOY_STAGING2

permissions:
  contents: read

concurrency:
  group: staging2-manual-deployment
  cancel-in-progress: false

jobs:
  contract:
    name: Validate deployment contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Validate workflow and remote deployment script
        run: |
          bash -n tools/deploy/deploy-to-staging2.sh
          node scripts/staging2/test-deploy-workflow-contract.mjs

  deploy:
    name: Deploy immutable SHA to staging2
    needs: contract
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/master' &&
      inputs.confirmation == 'DEPLOY_STAGING2'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging2
      url: https://staging2.nuvanx.com
    env:
      DEPLOY_SHA: ${{ inputs.git_sha }}
      WP_ROOT: /home/customer/www/staging2.nuvanx.com/public_html
    steps:
      - name: Check out master history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Validate immutable source SHA
        shell: bash
        run: |
          set -euo pipefail
          [[ "$DEPLOY_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'git_sha must be a full lowercase 40-character SHA.' >&2
            exit 1
          }
          git fetch --no-tags origin master
          git cat-file -e "${DEPLOY_SHA}^{commit}"
          git merge-base --is-ancestor "$DEPLOY_SHA" origin/master || {
            echo 'Refusing to deploy a SHA that is not contained in origin/master.' >&2
            exit 1
          }
          git checkout --detach "$DEPLOY_SHA"
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"

      - name: Configure strict SSH authentication
        shell: bash
        env:
          STAGING2_SSH_HOST: ${{ secrets.STAGING2_SSH_HOST }}
          STAGING2_SSH_PORT: ${{ secrets.STAGING2_SSH_PORT }}
          STAGING2_SSH_USER: ${{ secrets.STAGING2_SSH_USER }}
          STAGING2_SSH_PRIVATE_KEY: ${{ secrets.STAGING2_SSH_PRIVATE_KEY }}
          STAGING2_SSH_KNOWN_HOSTS: ${{ secrets.STAGING2_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING2_SSH_HOST:?Missing STAGING2_SSH_HOST secret}"
          : "${STAGING2_SSH_USER:?Missing STAGING2_SSH_USER secret}"
          : "${STAGING2_SSH_PRIVATE_KEY:?Missing STAGING2_SSH_PRIVATE_KEY secret}"
          : "${STAGING2_SSH_KNOWN_HOSTS:?Missing STAGING2_SSH_KNOWN_HOSTS secret}"

          SSH_PORT="${STAGING2_SSH_PORT:-18765}"
          [[ "$SSH_PORT" =~ ^[0-9]{1,5}$ ]] || {
            echo 'STAGING2_SSH_PORT must be numeric.' >&2
            exit 1
          }
          [[ "$STAGING2_SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]] || {
            echo 'STAGING2_SSH_HOST contains unsupported characters.' >&2
            exit 1
          }
          [[ "$STAGING2_SSH_USER" =~ ^[A-Za-z0-9._-]+$ ]] || {
            echo 'STAGING2_SSH_USER contains unsupported characters.' >&2
            exit 1
          }

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$STAGING2_SSH_PRIVATE_KEY" > "$HOME/.ssh/staging2_key"
          printf '%s\n' "$STAGING2_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/staging2_key" "$HOME/.ssh/known_hosts"

          cat > "$HOME/.ssh/config" <<EOF
          Host nvx-staging2
            HostName $STAGING2_SSH_HOST
            User $STAGING2_SSH_USER
            Port $SSH_PORT
            IdentityFile $HOME/.ssh/staging2_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $HOME/.ssh/known_hosts
            ConnectTimeout 15
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Verify SiteGround staging2 target
        shell: bash
        run: |
          set -euo pipefail
          ssh nvx-staging2 \
            "test -d '$WP_ROOT' && test -f '$WP_ROOT/wp-config.php' && command -v wp >/dev/null && command -v rsync >/dev/null && command -v php >/dev/null"

      - name: Upload immutable release payload
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_RELEASE="$WP_ROOT/wp-content/.nuvanx-deployments/${DEPLOY_SHA}-${GITHUB_RUN_ID}"
          echo "REMOTE_RELEASE=$REMOTE_RELEASE" >> "$GITHUB_ENV"
          ssh nvx-staging2 "mkdir -p '$REMOTE_RELEASE/theme'"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='php_errorlog' \
            --exclude='*.log' \
            --exclude='_archive*' \
            --exclude='_disabled*' \
            --exclude='*.bak*' \
            wp-content/themes/nuvanx-medical/ \
            "nvx-staging2:$REMOTE_RELEASE/theme/"
          rsync -az tools/deploy/deploy-to-staging2.sh \
            "nvx-staging2:$REMOTE_RELEASE/deploy-to-staging2.sh"

      - name: Execute guarded remote deployment
        id: remote_deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh nvx-staging2 \
            "NUVANX_CONFIRM=yes bash '$REMOTE_RELEASE/deploy-to-staging2.sh' --wp-root '$WP_ROOT' --source-theme '$REMOTE_RELEASE/theme' --sha '$DEPLOY_SHA' --confirm"

      - name: Verify deployed marker
        shell: bash
        run: |
          set -euo pipefail
          deployed_sha="$(ssh nvx-staging2 "tr -d '\\r\\n' < '$WP_ROOT/wp-content/themes/nuvanx-medical/.nvx-deploy-sha'")"
          test "$deployed_sha" = "$DEPLOY_SHA"
          echo "Verified staging2 marker: $deployed_sha"

      - name: Run staging2 smoke verification
        env:
          BASE_URL: https://staging2.nuvanx.com
        run: bash scripts/staging2/smoke-verify-staging2.sh

      - name: Remove temporary remote payload
        if: always()
        shell: bash
        run: ssh nvx-staging2 "rm -rf '$REMOTE_RELEASE'"

      - name: Write deployment summary
        if: success()
        shell: bash
        run: |
          {
            echo '## Staging2 deployment completed'
            echo
            echo "- SHA: \`$DEPLOY_SHA\`"
            echo '- Target: `https://staging2.nuvanx.com`'
            echo '- Scope: `wp-content/themes/nuvanx-medical` only'
            echo '- Backup: created on the SiteGround host before synchronization'
            echo '- Verification: deploy marker + staging2 smoke test'
          } >> "$GITHUB_STEP_SUMMARY"
