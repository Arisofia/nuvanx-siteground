name: Visual System Gate

on:
  pull_request:
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - 'wp-content/themes/nuvanx-medical/assets/images/**'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'scripts/design-system/**'
      - 'docs/design-system/**'
      - 'docs/NUVANX-DESIGN-SYSTEM.md'
      - 'qa/design-system/**'
      - '.github/workflows/visual-system-gate.yml'
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - 'wp-content/themes/nuvanx-medical/assets/images/**'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'scripts/design-system/**'
      - '.github/workflows/visual-system-gate.yml'

permissions:
  contents: write

jobs:
  normalize-source:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.normalize.outputs.changed }}
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          show-progress: false

      - name: Remove the final retired color source
        id: normalize
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-patterns-editorial.css')
          source = path.read_text(encoding='utf-8')
          updated = source.replace(
              '   Hero antracita #1C1C1C · alabastro #F5E8D8 · process #C5A880',
              '   Treatment surfaces use the canonical palette tokens.'
          ).replace(
              'border: 1px solid rgba(197, 168, 128, 0.28);',
              'border: var(--nvx-border-hairline) solid var(--nvx-color-line);'
          )
          if updated != source:
              path.write_text(updated, encoding='utf-8')
              print('changed=true')
          else:
              print('changed=false')
          PY
          if git diff --quiet; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Commit normalized source
        if: steps.normalize.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wp-content/themes/nuvanx-medical/assets/css/nvx-patterns-editorial.css
          git commit -m "refactor(colors): remove final retired treatment gold"
          git push origin HEAD:${{ github.head_ref }}

  visual-contract:
    needs: normalize-source
    if: needs.normalize-source.outputs.changed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Validate canonical visual contract
        id: contract
        continue-on-error: true
        run: node scripts/design-system/test-visual-system-contract.mjs

      - name: Audit runtime typography, colors, icons and numbering
        id: visual_audit
        continue-on-error: true
        run: node scripts/design-system/audit-visual-system.mjs

      - name: Run existing CSS audit
        id: css_audit
        continue-on-error: true
        run: node scripts/design-system/audit-css.mjs

      - name: Validate PHP syntax
        id: php_lint
        continue-on-error: true
        run: |
          php -l wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-integrations.php

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-system-audit
          path: qa/design-system/visual-system-summary.json
          if-no-files-found: error
          retention-days: 7

      - name: Verify generated audit is clean
        id: generated_audit
        if: always()
        continue-on-error: true
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('qa/design-system/visual-system-summary.json', 'utf8'));
          const collections = [
            'activeRetiredColorFindings',
            'bannedFontFindings',
            'literalFontFindings',
            'forbiddenFontRequests',
            'typographyTokenMismatches',
            'parallelFontVariables',
            'survivingRetiredAssets',
            'missingIconClasses',
            'missingTokens',
          ];
          const dirty = collections.filter((key) => Array.isArray(summary[key]) && summary[key].length > 0);
          if (dirty.length) {
            console.error(`Dirty visual audit collections: ${dirty.join(', ')}`);
            process.exit(1);
          }
          console.log('PASS: generated visual-system-summary.json is clean');
          NODE

      - name: Enforce gate result
        if: always()
        env:
          CONTRACT: ${{ steps.contract.outcome }}
          VISUAL_AUDIT: ${{ steps.visual_audit.outcome }}
          CSS_AUDIT: ${{ steps.css_audit.outcome }}
          PHP_LINT: ${{ steps.php_lint.outcome }}
          GENERATED_AUDIT: ${{ steps.generated_audit.outcome }}
        run: |
          printf '%s\n' \
            "contract=$CONTRACT" \
            "visual_audit=$VISUAL_AUDIT" \
            "css_audit=$CSS_AUDIT" \
            "php_lint=$PHP_LINT" \
            "generated_audit=$GENERATED_AUDIT"
          test "$CONTRACT" = success
          test "$VISUAL_AUDIT" = success
          test "$CSS_AUDIT" = success
          test "$PHP_LINT" = success
          test "$GENERATED_AUDIT" = success
