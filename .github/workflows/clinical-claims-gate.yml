name: Clinical Claims Gate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: clinical-claims-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  claims:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate claim registry and deployable language
        run: |
          set -euo pipefail
          node --check scripts/clinical/audit-claims.mjs
          node scripts/clinical/audit-claims.mjs

      - name: Validate P0 publication guard
        run: |
          set -euo pipefail
          php -l wp-content/themes/nuvanx-medical/inc/nvx-p0-publication-guard.php
          php -l scripts/seo/test-p0-publication-guard.php
          php scripts/seo/test-p0-publication-guard.php

      - name: Publish claim summary
        if: always()
        run: |
          if [[ -f qa/clinical-claims/claims-audit.md ]]; then
            cat qa/clinical-claims/claims-audit.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload path-only claim evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: clinical-claims-audit
          path: |
            qa/clinical-claims/claims-audit.json
            qa/clinical-claims/claims-audit.md
          retention-days: 14
          if-no-files-found: error
