name: CSS Gate

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      theme_path:
        description: Theme path relative to the repository root (CSS Gate target)
        required: false
        default: wp-content/themes/nuvanx-medical
        type: string

permissions:
  contents: read

jobs:
  css-gate:
    runs-on: ubuntu-latest
    env:
      # workflow_dispatch inputs live under github.event.inputs (not inputs.*).
      # Empty on push/PR → default medical theme path.
      NVX_THEME_PATH: ${{ github.event.inputs.theme_path || 'wp-content/themes/nuvanx-medical' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate theme path
        run: |
          set -euo pipefail
          echo "NVX_THEME_PATH=${NVX_THEME_PATH}"
          test -d "${NVX_THEME_PATH}" || {
            echo "ERROR: NVX_THEME_PATH is not a directory: ${NVX_THEME_PATH}"
            exit 1
          }
          test -d "${NVX_THEME_PATH}/assets/css" || {
            echo "ERROR: missing assets/css under ${NVX_THEME_PATH}"
            exit 1
          }

      - name: Validate canonical stylesheet inventory
        run: |
          set -euo pipefail
          THEME="${NVX_THEME_PATH}"
          CSS="$THEME/assets/css"

          required=(
            nvx-fonts.css
            nvx-tokens.css
            nvx-base.css
            nvx-site-layout.css
            nvx-components.css
            nvx-patterns-editorial.css
            nvx-header.css
            nvx-footer.css
            nvx-brand-home.css
          )

          for file in "${required[@]}"; do
            test -s "$CSS/$file" || { echo "ERROR: missing canonical stylesheet $file"; exit 1; }
          done

          duplicates=(
            nvx-tokens.min.css
            nvx-base.min.css
            nvx-site-layout.min.css
            nvx-components.min.css
            nvx-patterns-editorial.min.css
            nvx-header.min.css
            nvx-footer.min.css
            nvx-brand-home.min.css
          )

          for file in "${duplicates[@]}"; do
            test ! -e "$CSS/$file" || { echo "ERROR: duplicate canonical stylesheet remains: $file"; exit 1; }
          done

      - name: Validate retained layout utility contract
        run: |
          set -euo pipefail
          THEME="${NVX_THEME_PATH}"
          LAYOUT="$THEME/assets/css/nvx-site-layout.css"
          test -s "$LAYOUT"

          # Class presence: match the selector name, not formatting (spaces/`{`/minification).
          # End boundary excludes longer BEM names (e.g. nvx-stack must not match nvx-stack--tight).
          class_present() {
            local class="$1"
            grep -qE "\.${class}([^a-zA-Z0-9_-]|$)" "$LAYOUT"
          }

          required_classes=(
            nvx-reading
            nvx-grid-12
            nvx-span-4
            nvx-span-5
            nvx-span-6
            nvx-span-7
            nvx-span-8
            nvx-span-12
            nvx-stack
            nvx-stack--tight
            nvx-stack--wide
            nvx-cluster
            nvx-section--tight
            nvx-brand-section--tight
          )

          for class in "${required_classes[@]}"; do
            class_present "$class" || {
              echo "ERROR: supported layout API selector missing: .${class}"
              exit 1
            }
          done

          # Both tight variants must share one rule that uses the same padding token.
          # Formatting-agnostic: whitespace collapsed; either selector order is OK.
          flat="$(tr -s '[:space:]' ' ' < "$LAYOUT")"
          shared_token_rule() {
            local token="$1"
            local a='nvx-brand-section--tight'
            local b='nvx-section--tight'
            printf '%s' "$flat" | grep -qE "\.${a}[[:space:]]*,[[:space:]]*\.${b}[[:space:]]*\{[^}]*${token}" \
              || printf '%s' "$flat" | grep -qE "\.${b}[[:space:]]*,[[:space:]]*\.${a}[[:space:]]*\{[^}]*${token}"
          }

          shared_token_rule '--nvx-pad-section-tight' || {
            echo 'ERROR: .nvx-brand-section--tight and .nvx-section--tight must share a rule using var(--nvx-pad-section-tight)'
            exit 1
          }

          shared_token_rule '--nvx-space-8' || {
            echo 'ERROR: .nvx-brand-section--tight and .nvx-section--tight must share a mobile rule using var(--nvx-space-8)'
            exit 1
          }

          # Informational scan: counts + capped samples (DB markup is audited separately).
          PATTERN='nvx-(grid-12|span-(4|5|6|7|8|12)|stack(--tight|--wide)?|cluster|reading|section--tight)'
          SAMPLE_CAP=15
          matches_file="$(mktemp)"
          # Keep stderr visible (permissions / IO errors); only treat "no matches" as non-fatal.
          grep -RInE \
            --include='*.php' \
            --include='*.js' \
            --include='*.html' \
            --include='*.json' \
            --exclude-dir='assets' \
            "$PATTERN" \
            "$THEME" >"$matches_file" || true

          total="$(wc -l <"$matches_file" | tr -d ' ')"
          files_hit="$(cut -d: -f1 "$matches_file" | sort -u | wc -l | tr -d ' ')"
          echo "Tracked runtime references (informational): ${total} match(es) across ${files_hit} file(s)"
          if [ "$total" -gt 0 ]; then
            echo "Sample (first ${SAMPLE_CAP}):"
            head -n "$SAMPLE_CAP" "$matches_file"
            if [ "$total" -gt "$SAMPLE_CAP" ]; then
              echo "... and $((total - SAMPLE_CAP)) more (capped for CI log readability)"
            fi
          else
            echo "No tracked PHP/JS/HTML/JSON references under theme (DB/Gutenberg may still use classes)."
          fi
          rm -f "$matches_file"

      - name: Reject patch architecture and unsafe selectors
        run: |
          set -euo pipefail
          THEME="${NVX_THEME_PATH}"
          ACTIVE=(
            "$THEME/assets/css/nvx-tokens.css"
            "$THEME/assets/css/nvx-base.css"
            "$THEME/assets/css/nvx-site-layout.css"
            "$THEME/assets/css/nvx-components.css"
            "$THEME/assets/css/nvx-patterns-editorial.css"
            "$THEME/assets/css/nvx-header.css"
            "$THEME/assets/css/nvx-footer.css"
            "$THEME/assets/css/nvx-brand-home.css"
          )

          reject() {
            local pattern="$1"
            local label="$2"
            if grep -nE "$pattern" "${ACTIVE[@]}"; then
              echo "ERROR: $label"
              exit 1
            fi
          }

          reject '!important' '!important is forbidden'
          reject ':has\(' ':has() dependencies are forbidden'
          reject ':nth-child\(|:nth-of-type\(' 'positional composition is forbidden'
          reject 'backdrop-filter|-webkit-backdrop-filter' 'glassmorphism is forbidden'
          reject 'nvx-v3-|nvx-v4-|editorial-home-v4|legacy|compat|bridge|patch' 'versioned or compatibility layers are forbidden'
          reject 'transition:[[:space:]]*all' 'transition: all is forbidden'

      - name: Validate one token source and direct runtime loading
        run: |
          set -euo pipefail
          THEME="${NVX_THEME_PATH}"
          ROOT_COUNT="$(grep -Rho ':root[[:space:]]*{' "$THEME/assets/css" --include='*.css' | wc -l | tr -d ' ')"
          test "$ROOT_COUNT" = '1' || { echo "ERROR: expected one :root, found $ROOT_COUNT"; exit 1; }

          grep -q "nvx-tokens.css" "$THEME/functions.php"
          grep -q "nvx-patterns-editorial.css" "$THEME/functions.php"
          ! grep -qE '\.min\.css|nvx-responsive|nvx-brand-system|nvx-visual-system|nvx-fluid-organic|nvx-typography-alignment' "$THEME/functions.php"
          ! grep -qE 'preg_replace|preg_replace_callback|nvx_theme_normalize_content_markup|nvx_theme_apply_editorial_flows' "$THEME/functions.php"

      - name: Parse active CSS
        run: |
          set -euo pipefail
          THEME="${NVX_THEME_PATH}"
          CSS="$THEME/assets/css"
          npx --yes clean-css-cli@5.6.3 \
            -o /tmp/nuvanx-canonical.css \
            "$CSS/nvx-tokens.css" \
            "$CSS/nvx-base.css" \
            "$CSS/nvx-site-layout.css" \
            "$CSS/nvx-components.css" \
            "$CSS/nvx-patterns-editorial.css" \
            "$CSS/nvx-header.css" \
            "$CSS/nvx-footer.css" \
            "$CSS/nvx-brand-home.css"
          test -s /tmp/nuvanx-canonical.css
