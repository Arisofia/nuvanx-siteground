name: Normalize Canonical CSS

on:
  push:
    branches:
      - fix/warm-white-accent-20260717
    paths:
      - 'scripts/design-system/normalize-canonical-css.mjs'
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - '.github/workflows/normalize-canonical-css.yml'

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Normalize canonical CSS
        run: node scripts/design-system/normalize-canonical-css.mjs
      - name: Verify audit
        run: node scripts/design-system/audit-css.mjs || true
      - name: Commit normalized sources
        run: |
          if git diff --quiet; then
            echo 'No normalization changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/assets/css qa/design-system
          git commit -m 'fix(css): normalize canonical visual roles'
          git push origin HEAD:${{ github.ref_name }}
