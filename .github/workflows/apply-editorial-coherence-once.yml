name: Apply Editorial Coherence Once

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: editorial-coherence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: Apply and validate migration
        run: |
          set -uo pipefail
          : > editorial-migration.log
          run_check() {
            printf '\n== %s ==\n' "$1" | tee -a editorial-migration.log
            shift
            "$@" >>editorial-migration.log 2>&1
          }
          run_check migration python scripts/design-system/apply-editorial-coherence.py || status=$?
          if [[ "${status:-0}" -eq 0 ]]; then
            python <<'PY'
          from pathlib import Path
          path = Path('wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php')
          text = path.read_text(encoding='utf-8')
          had_final_newline = text.endswith('\n')
          cleaned = '\n'.join(line.rstrip() for line in text.splitlines())
          if had_final_newline:
              cleaned += '\n'
          path.write_text(cleaned, encoding='utf-8', newline='\n')
          PY
          fi
          if [[ "${status:-0}" -eq 0 ]]; then
            run_check php-lint bash -c "find wp-content/themes/nuvanx-medical -type f -name '*.php' -print0 | xargs -0 -n1 php -l" || status=$?
          fi
          if [[ "${status:-0}" -eq 0 ]]; then
            run_check node-syntax node --check scripts/theme-hygiene/test-theme-hygiene.mjs || status=$?
          fi
          if [[ "${status:-0}" -eq 0 ]]; then
            run_check theme-hygiene node scripts/theme-hygiene/test-theme-hygiene.mjs || status=$?
          fi
          if [[ "${status:-0}" -eq 0 ]]; then
            run_check diff-check git diff --check || status=$?
          fi
          cat editorial-migration.log
          exit "${status:-0}"

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: editorial-coherence-migration-${{ github.run_id }}
          path: |
            editorial-migration.log
            theme-hygiene-report.txt
          retention-days: 7
          if-no-files-found: warn

      - name: Commit clean result
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/apply-editorial-coherence-once.yml \
            scripts/design-system/apply-editorial-coherence.py \
            docs/editorial-coherence-migration.trigger \
            editorial-migration.log \
            theme-hygiene-report.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(design): separate editorial primitives from treatment styles [editorial-coherence-applied]'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
