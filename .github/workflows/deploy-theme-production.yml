name: Deploy theme to production + flush cache

# Manual only. Promotes the same validated theme pipeline as staging2 to production.
# Requires explicit confirmation input. Uses STAGING_SSH_* secrets (same SiteGround
# account host; different public_html path).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: true
        default: master
      confirm:
        description: Type PROMOTE_PRODUCTION to proceed
        required: true
        default: ''
      skip_smoke:
        description: Skip post-deploy HTTP verify (true/false)
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  PROD_BASE_URL: https://nuvanx.com
  PROD_PATH: /home/customer/www/nuvanx.com/public_html
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html
  THEME_REL: wp-content/themes/nuvanx-medical

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        run: |
          set -euo pipefail
          if [[ '${{ inputs.confirm }}' != 'PROMOTE_PRODUCTION' ]]; then
            echo "Refusing: confirm must be exactly PROMOTE_PRODUCTION" >&2
            exit 1
          fi
          echo "Confirmation accepted for ref=${{ inputs.ref }}"

  deploy-and-flush:
    needs: guard
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      deployed_ref: ${{ steps.meta.outputs.deployed_ref }}
      backup_dir: ${{ steps.promote.outputs.backup_dir }}
    steps:
      - name: Resolve deploy ref
        id: meta
        run: |
          set -euo pipefail
          REF='${{ inputs.ref }}'
          echo "deployed_ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Deploying ref: ${REF}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.meta.outputs.deployed_ref }}
          fetch-depth: 1

      - name: Validate secrets and canonical source
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in SSH_KEY SSH_USER SSH_HOST SSH_PORT KNOWN_HOSTS; do
            [[ -n "${!name:-}" ]] || { echo "ERROR: secret $name empty"; exit 1; }
          done
          for css_file in \
            nvx-fonts.css \
            nvx-tokens.css \
            nvx-base.css \
            nvx-site-layout.css \
            nvx-components.css \
            nvx-patterns-editorial.css \
            nvx-header.css \
            nvx-footer.css \
            nvx-posts.css; do
            test -f "${{ env.THEME_REL }}/assets/css/$css_file" || { echo "ERROR: missing $css_file"; exit 1; }
          done
          grep -Fq 'nvx-patterns-editorial.css' "${{ env.THEME_REL }}/functions.php"
          test -f "${{ env.THEME_REL }}/inc/nvx-blog-system.php"
          find "${{ env.THEME_REL }}" -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          test -x scripts/ops/post-promote-verify.sh || chmod +x scripts/ops/post-promote-verify.sh
          test -x scripts/staging2/smoke-verify-staging2.sh || chmod +x scripts/staging2/smoke-verify-staging2.sh

      - name: Configure SSH agent and known hosts
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      - run: mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.STAGING_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Backup prod theme + promote from checkout
        id: promote
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          DATE="$(date +%Y%m%d-%H%M%S)"
          BACKUP_REL="wp-content/backups-nuvanx/pre-sync-${DATE}"
          echo "backup_dir=${{ env.PROD_PATH }}/${BACKUP_REL}" >> "$GITHUB_OUTPUT"

          # Remote backup + guards (theme/mu-plugin tarballs; no DB export from Actions)
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "bash -e -s" <<EOF
            set -euo pipefail
            ROOT='${{ env.PROD_PATH }}'
            BACKUP_DIR="\$ROOT/${BACKUP_REL}"
            cd "\$ROOT"
            siteurl="\$(wp option get siteurl)"
            home="\$(wp option get home)"
            theme="\$(wp theme list --status=active --field=name)"
            echo "prod siteurl=\$siteurl home=\$home theme=\$theme"
            [[ "\$siteurl" == 'https://nuvanx.com' ]]
            [[ "\$home" == 'https://nuvanx.com' ]]
            [[ "\$theme" == 'nuvanx-medical' ]]
            mkdir -p "\$BACKUP_DIR"
            tar -czf "\$BACKUP_DIR/theme.tgz" -C "\$ROOT" wp-content/themes/nuvanx-medical
            if [[ -d wp-content/mu-plugins ]]; then
              tar -czf "\$BACKUP_DIR/mu-plugins.tgz" -C "\$ROOT" wp-content/mu-plugins
            fi
            wp sg optimize css disable || true
            wp sg optimize combine-css disable || true
            wp sg optimize combine-js disable || true
            echo "BACKUP_OK \$BACKUP_DIR"
          EOF

          rsync -az --delete -e "ssh -p $SSH_PORT" \
            --exclude '.git' --exclude 'php_errorlog' --exclude '*.log' \
            "${{ env.THEME_REL }}/" \
            "$SSH_USER@$SSH_HOST:${{ env.PROD_PATH }}/${{ env.THEME_REL }}/"

          rsync -az -e "ssh -p $SSH_PORT" \
            wp-content/mu-plugins/nuvanx-valoracion-native-hubspot-form.php \
            wp-content/mu-plugins/nuvanx-contacto-hubspot-form.php \
            "$SSH_USER@$SSH_HOST:${{ env.PROD_PATH }}/wp-content/mu-plugins/"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "bash -e -s" <<'REMOTE'
            set -euo pipefail
            ROOT='/home/customer/www/nuvanx.com/public_html'
            THEME="$ROOT/wp-content/themes/nuvanx-medical"
            CSS="$THEME/assets/css"
            cd "$ROOT"
            rm -f wp-content/mu-plugins/zzzzzzzzzzzz-nuvanx-valoracion-native-hubspot-form.php \
                  wp-content/mu-plugins/zzzzzzzzzzzz-nuvanx-contacto-hubspot-form.php \
                  wp-content/mu-plugins/z-nuvanx-valoracion-native-hubspot-form.php \
                  wp-content/mu-plugins/z-nuvanx-contacto-hubspot-form.php
            [[ "$(wp option get siteurl)" == 'https://nuvanx.com' ]]
            [[ "$(wp option get home)" == 'https://nuvanx.com' ]]
            [[ "$(wp theme list --status=active --field=name)" == 'nuvanx-medical' ]]
            for css_file in \
              nvx-fonts.css \
              nvx-tokens.css \
              nvx-base.css \
              nvx-site-layout.css \
              nvx-components.css \
              nvx-patterns-editorial.css \
              nvx-header.css \
              nvx-footer.css \
              nvx-posts.css; do
              test -f "$CSS/$css_file" || { echo "ERROR: remote missing $css_file"; exit 1; }
            done
            test -f "$THEME/inc/nvx-blog-system.php"
            test -f "$THEME/archive.php"
            test -f "$THEME/search.php"
            grep -Fq 'nvx-patterns-editorial.css' "$THEME/functions.php"
            find "$CSS" -maxdepth 1 -type f -name 'nvx-*.min.css' -delete
            wp cache flush || true
            wp sg purge || true
            rm -rf wp-content/uploads/siteground-optimizer-assets/siteground-optimizer-combined-* 2>/dev/null || true
            rm -rf wp-content/cache/sgo-cache/* 2>/dev/null || true
            rm -rf wp-content/cache/* 2>/dev/null || true
            wp eval 'if (function_exists("opcache_reset")) { opcache_reset(); echo "opcache=ok\n"; }' || true
            echo PROMOTE_PROD_OK
          REMOTE

  post-verify:
    needs: deploy-and-flush
    if: ${{ inputs.skip_smoke != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.deploy-and-flush.outputs.deployed_ref }}
          fetch-depth: 1

      - name: Wait for CDN / cache edge
        run: sleep 20

      - name: Post-promote structural verify (production)
        env:
          BASE_URL: ${{ env.PROD_BASE_URL }}
          SMOKE_RETRIES: '8'
          SMOKE_RETRY_SLEEP: '6'
        run: |
          set -euo pipefail
          chmod +x scripts/ops/post-promote-verify.sh
          bash scripts/ops/post-promote-verify.sh

      - name: Full smoke verify (production)
        env:
          BASE_URL: ${{ env.PROD_BASE_URL }}
          SMOKE_RETRIES: '8'
          SMOKE_RETRY_SLEEP: '6'
        run: |
          set -euo pipefail
          chmod +x scripts/staging2/smoke-verify-staging2.sh
          bash scripts/staging2/smoke-verify-staging2.sh
