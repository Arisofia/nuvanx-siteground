name: One-time fix content preg helper

on:
  push:
    branches:
      - fix/editorial-home-cases-final-20260722
    paths:
      - '.github/workflows/one-time-fix-content-preg-helper.yml'

permissions:
  contents: write

jobs:
  patch-and-remove:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: fix/editorial-home-cases-final-20260722
          fetch-depth: 0
          persist-credentials: false

      - name: Patch callback-safe preg helper
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php')
          text = path.read_text(encoding='utf-8')
          old = """/**
           * Safe preg_replace: never wipe content when the regex engine fails (returns null).
           *
           * @param string   $pattern  Pattern.
           * @param string   $replace  Replacement.
           * @param string   $subject  Subject HTML.
           * @param int      $limit    Limit (-1 = all).
           * @param int|null $count    Optional match count out-param.
           */
          function nvx_content_preg_replace_keep( string $pattern, string $replace, string $subject, int $limit = -1, ?int &$count = null ): string {
          \t$result = preg_replace( $pattern, $replace, $subject, $limit, $count );
          \treturn is_string( $result ) ? $result : $subject;
          }
          """
          new = """/**
           * Safe regex replacement: never wipe content when PCRE fails.
           *
           * Supports both literal replacements and callbacks because the presentation
           * pipeline uses this helper for attribute normalization and protected media.
           *
           * @param string          $pattern Pattern.
           * @param string|callable $replace Replacement string or callback.
           * @param string          $subject Subject HTML.
           * @param int             $limit   Limit (-1 = all).
           * @param int|null        $count   Optional match count out-param.
           */
          function nvx_content_preg_replace_keep( string $pattern, $replace, string $subject, int $limit = -1, ?int &$count = null ): string {
          \tif ( is_callable( $replace ) ) {
          \t\t$result = preg_replace_callback( $pattern, $replace, $subject, $limit, $count );
          \t} else {
          \t\t$result = preg_replace( $pattern, (string) $replace, $subject, $limit, $count );
          \t}

          \treturn is_string( $result ) ? $result : $subject;
          }
          """
          if text.count(old) != 1:
              raise SystemExit('Expected helper block was not found exactly once.')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          php -l wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php

      - name: Commit patch and remove one-time workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php
          git rm .github/workflows/one-time-fix-content-preg-helper.yml
          git commit -m 'fix(runtime): support callback replacements in content presentation'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
