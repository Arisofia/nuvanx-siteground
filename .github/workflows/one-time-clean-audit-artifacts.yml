name: One-time Clean Audit Artifacts

on:
  push:
    branches:
      - fix/audit-icon-selector-context-20260720
    paths:
      - '.github/workflows/one-time-clean-audit-artifacts.yml'

permissions:
  contents: write

jobs:
  clean-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/audit-icon-selector-context-20260720
          fetch-depth: 0

      - name: Restore generated reports from master
        run: |
          git fetch origin master
          git checkout origin/master -- qa/design-system/active-css-exceptions.json qa/design-system/audit-summary.json
          rm .github/workflows/one-time-clean-audit-artifacts.yml

      - name: Commit focused diff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qa/design-system/active-css-exceptions.json qa/design-system/audit-summary.json
          git add -u .github/workflows/one-time-clean-audit-artifacts.yml
          git commit -m "chore(audit): keep generated reports out of parser fix"
          git push origin HEAD:fix/audit-icon-selector-context-20260720
