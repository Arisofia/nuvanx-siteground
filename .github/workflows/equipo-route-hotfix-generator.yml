name: Equipo Route Hotfix Generator

on:
  push:
    branches:
      - fix/equipo-route-detection-20260724

permissions:
  contents: write

concurrency:
  group: equipo-route-hotfix-generator
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: fix/equipo-route-detection-20260724
          fetch-depth: 0
          persist-credentials: false

      - name: Apply route-only equipo detection
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          equipo = Path('wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php')
          content = equipo.read_text(encoding='utf-8')

          old_detector = '''function nvx_content_is_equipo_page( string $content ): bool {
\tif ( false !== strpos( $content, 'nvx-equipo-editorial' ) ) {
\t\treturn false;
\t}

\tif ( ! nvx_equipo_is_singular_context() ) {
\t\treturn false;
\t}

\tif ( is_front_page() || is_home() ) {
\t\treturn false;
\t}

\tif ( is_page( 'equipo-medico' ) ) {
\t\treturn true;
\t}

\t$path = function_exists( 'nvx_schema_current_path' )
\t\t? nvx_schema_current_path( (int) get_queried_object_id() )
\t\t: '';

\tif ( is_string( $path ) && function_exists( 'nvx_schema_path_matches' ) && nvx_schema_path_matches( $path, '/equipo-medico/' ) ) {
\t\treturn true;
\t}

\treturn (bool) preg_match(
\t\t'/aria-label=["\\']Equipo médico NUVANX["\\']|id=["\\']nvx-equipo-h1["\\']|class=["\\'][^"\\']*nvx-equipo-hero|equipo especialista/iu',
\t\t$content
\t);
}'''

          new_detector = '''function nvx_content_is_equipo_page( string $content ): bool {
\tunset( $content );

\tif ( ! nvx_equipo_is_singular_context() || is_front_page() || is_home() ) {
\t\treturn false;
\t}

\tif ( is_page( 'equipo-medico' ) ) {
\t\treturn true;
\t}

\t$path = function_exists( 'nvx_schema_current_path' )
\t\t? nvx_schema_current_path( (int) get_queried_object_id() )
\t\t: '';

\treturn is_string( $path )
\t\t&& function_exists( 'nvx_schema_path_matches' )
\t\t&& nvx_schema_path_matches( $path, '/equipo-medico/' );
}'''

          count = content.count(old_detector)
          if count != 1:
              raise SystemExit(f'expected one legacy equipo detector, found {count}')
          content = content.replace(old_detector, new_detector, 1)

          old_class = "\t$html  = '<div class=\"nvx-editorial-hero__copy-copy\">';"
          new_class = "\t$html  = '<div class=\"nvx-editorial-hero__copy\">';"
          count = content.count(old_class)
          if count != 1:
              raise SystemExit(f'expected one copy-copy source class, found {count}')
          equipo.write_text(content.replace(old_class, new_class, 1), encoding='utf-8')

          workflow = Path('.github/workflows/deploy-staging2.yml')
          workflow_text = workflow.read_text(encoding='utf-8')
          marker = "      - 'wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php'\n"
          addition = marker + "      - 'wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php'\n"
          if "inc/nvx-equipo-page.php" not in workflow_text:
              if workflow_text.count(marker) != 1:
                  raise SystemExit('deploy workflow insertion marker missing or duplicated')
              workflow.write_text(workflow_text.replace(marker, addition, 1), encoding='utf-8')
          PY

      - name: Validate regression contract
        shell: bash
        run: |
          set -euo pipefail
          php -l wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php
          grep -Fq "is_page( 'equipo-medico' )" wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php
          grep -Fq "nvx_schema_path_matches( \$path, '/equipo-medico/' )" wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php
          ! grep -Fq 'equipo especialista/iu' wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php
          ! grep -Fq 'nvx-editorial-hero__copy-copy' wp-content/themes/nuvanx-medical/inc/nvx-equipo-page.php
          grep -Fq "inc/nvx-equipo-page.php" .github/workflows/deploy-staging2.yml
          git diff --check

      - name: Remove temporary operations scaffolding
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/equipo-route-hotfix-generator.yml
          rm -f .github/workflows/equipo-route-hotfix-once.yml
          rm -f .github/workflows/promote-production-once.yml
          rm -f ops/production-promotion-20260724.txt
          rm -f ops/trigger-production-promotion-20260724.txt
          rm -f ops/branch-trigger-placeholder.txt
          rm -f ops/promotion-ready.txt
          rm -f ops/equipo-hotfix-trigger.txt

      - name: Commit validated hotfix
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/equipo-route-detection-20260724
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(equipo): gate renderer by canonical route only'
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${TARGET_BRANCH}"
