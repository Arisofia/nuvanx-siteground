name: Validate canonical cleanup patch

on:
  push:
    branches:
      - refactor/canonical-theme-cleanup-20260718
    paths:
      - '.github/workflows/validate-canonical-cleanup-patch.yml'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build and validate patch
        run: |
          set -euo pipefail
          find .cleanup-payload -maxdepth 1 -type f -name '*.patch' -print | sort
          python3 - <<'PY'
          from pathlib import Path

          files = sorted(Path('.cleanup-payload').glob('*.patch'))
          data = b''.join(path.read_bytes() for path in files)

          repairs = (
              (
                  b'@@ -226,5 +214,4 @@ body.home  .nvx-main',
                  b'@@ -226,5 +214,4 @@ body.home .nvx-main',
              ),
              (
                  b'-    margin-top: var(--nvx-space-2);\n-  }\n\n-}\n-\n-@media (max-width: 480px)',
                  b'-    margin-top: var(--nvx-space-2);\n-  }\n-}\n-\n-@media (max-width: 480px)',
              ),
          )
          for old, new in repairs:
              if data.count(old) != 1:
                  raise SystemExit(f'Expected one staged-boundary marker, found {data.count(old)}: {old!r}')
              data = data.replace(old, new, 1)

          Path('/tmp/canonical-cleanup.patch').write_bytes(data)
          PY
          wc -c /tmp/canonical-cleanup.patch
          git apply --check --verbose /tmp/canonical-cleanup.patch

      - name: Upload assembled patch
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: canonical-cleanup-patch
          path: /tmp/canonical-cleanup.patch
          if-no-files-found: error
          retention-days: 3
