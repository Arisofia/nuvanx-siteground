name: Third-Party Runtime Gate

on:
  push:
    branches:
      - master
    paths:
      - 'scripts/runtime/**'
      - 'qa/runtime/**'
      - '.github/workflows/third-party-runtime-gate.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'scripts/runtime/**'
      - 'qa/runtime/**'
      - '.github/workflows/third-party-runtime-gate.yml'
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

concurrency:
  group: third-party-runtime-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Lint workflow
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/third-party-runtime-gate.yml

      - name: Validate runtime scripts
        run: |
          set -euo pipefail
          node --check scripts/runtime/verify-third-party-health.mjs
          node --check scripts/runtime/verify-home-video-performance.mjs
          node --check scripts/runtime/test-third-party-health-contract.mjs
          node scripts/runtime/test-third-party-health-contract.mjs

  production:
    if: github.event_name != 'pull_request'
    needs: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install Chromium
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify production runtime and home media
        id: verify
        continue-on-error: true
        env:
          BASE_URL: https://nuvanx.com
          OUTPUT_PATH: runtime-health-production.json
          HOME_MEDIA_OUTPUT_PATH: home-media-production.json
          VERIFY_RETRIES: '4'
          VERIFY_RETRY_DELAY_MS: '4000'
        run: |
          set +e
          node scripts/runtime/verify-third-party-health.mjs
          runtime_status=$?
          node scripts/runtime/verify-home-video-performance.mjs
          media_status=$?
          if (( runtime_status != 0 || media_status != 0 )); then
            echo "Production verification failed: runtime=$runtime_status media=$media_status" >&2
            exit 1
          fi

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: third-party-runtime-production
          path: |
            runtime-health-production.json
            home-media-production.json
          retention-days: 14
          if-no-files-found: error

      - name: Enforce production verification
        if: steps.verify.outcome == 'failure'
        run: exit 1

  staging:
    if: github.event_name != 'pull_request'
    needs: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
      BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
    steps:
      - name: Checkout with history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve deployed staging SHA
        id: deployed
        run: |
          set -euo pipefail
          SHA="$(node scripts/analytics/resolve-staging-deploy-sha.mjs "${{ github.sha }}")"
          [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Install Chromium
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify staging runtime and home media
        id: verify
        continue-on-error: true
        env:
          BASE_URL: https://staging2.nuvanx.com
          EXPECTED_DEPLOY_SHA: ${{ steps.deployed.outputs.sha }}
          OUTPUT_PATH: runtime-health-staging.json
          HOME_MEDIA_OUTPUT_PATH: home-media-staging.json
          VERIFY_RETRIES: '8'
          VERIFY_RETRY_DELAY_MS: '5000'
        run: |
          set +e
          node scripts/runtime/verify-third-party-health.mjs
          runtime_status=$?
          node scripts/runtime/verify-home-video-performance.mjs
          media_status=$?
          if (( runtime_status != 0 || media_status != 0 )); then
            echo "Staging verification failed: runtime=$runtime_status media=$media_status" >&2
            exit 1
          fi

      - name: Upload staging evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: third-party-runtime-staging
          path: |
            runtime-health-staging.json
            home-media-staging.json
          retention-days: 14
          if-no-files-found: error

      - name: Enforce staging verification
        if: steps.verify.outcome == 'failure'
        run: exit 1
