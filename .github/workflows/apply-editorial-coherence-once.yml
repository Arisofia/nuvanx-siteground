name: Apply Editorial Coherence Once

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: editorial-coherence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  migrate:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && !contains(github.event.pull_request.head.sha, 'editorial-coherence-applied') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: Apply and validate migration
        run: |
          set -euo pipefail
          python scripts/design-system/apply-editorial-coherence.py
          find wp-content/themes/nuvanx-medical -type f -name '*.php' -print0 | xargs -0 -n1 php -l >/dev/null
          node --check scripts/theme-hygiene/test-theme-hygiene.mjs
          node scripts/theme-hygiene/test-theme-hygiene.mjs
          git diff --check

      - name: Commit clean result
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/apply-editorial-coherence-once.yml \
            scripts/design-system/apply-editorial-coherence.py \
            docs/editorial-coherence-migration.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(design): separate editorial primitives from treatment styles [editorial-coherence-applied]'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
