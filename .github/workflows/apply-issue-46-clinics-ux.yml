name: Apply Issue 46 Clinics UX

on:
  push:
    branches:
      - fix/clinicas-navigation-maps-46
    paths:
      - 'scripts/issue-46/apply-clinics-hub-ux.mjs'
      - '.github/workflows/apply-issue-46-clinics-ux.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply clinics hub UX
        run: node scripts/issue-46/apply-clinics-hub-ux.mjs
      - name: Validate PHP syntax
        run: php -l wp-content/themes/nuvanx-medical/inc/nvx-clinics-hub.php
      - name: Validate CSS system
        run: node scripts/design-system/audit-css.mjs
      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/functions.php wp-content/themes/nuvanx-medical/inc/nvx-clinics-hub.php wp-content/themes/nuvanx-medical/assets/css/nvx-components.css qa/design-system
          git commit -m 'fix(ux): add clinics navigation and explicit Google Maps CTAs'
          git push origin HEAD:${{ github.ref_name }}
