name: Ticket 43 Staging QA

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA of the pure 3-file candidate commit'
        required: true
        default: '15212c226990908a549284d06161bd620b3cc828'

permissions:
  contents: read

env:
  STAGING_BASE_URL: https://staging2.nuvanx.com
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html
  BACKUP_NAME: ticket43-staging-before-${{ github.run_id }}-${{ github.run_attempt }}
  CANDIDATE_ALLOWLIST: |
    deploy/ticket-43/post_content_v2.html
    wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css
    wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css

jobs:
  deploy-and-qa:
    name: Protected Staging Deployment and QA
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Hardcode Environment Validation
        run: |
          if [ "${{ env.STAGING_BASE_URL }}" != "https://staging2.nuvanx.com" ]; then
            echo "ERROR: STAGING_BASE_URL altered"
            exit 1
          fi
          if [ "${{ env.STAGING_PATH }}" != "/home/customer/www/staging2.nuvanx.com/public_html" ]; then
            echo "ERROR: STAGING_PATH altered"
            exit 1
          fi

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Validate Candidate SHA and Allowlist
        run: |
          TARGET="${{ github.event.inputs.target_sha }}"
          if [[ ! "$TARGET" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: Invalid SHA format"
            exit 1
          fi

          git fetch origin master
          git fetch origin "$TARGET" || { echo "ERROR: SHA does not exist"; exit 1; }

          MERGE_BASE="$(git merge-base origin/master "$TARGET")"
          if [ -z "$MERGE_BASE" ]; then
            echo "ERROR: Candidate SHA shares no history with master"
            exit 1
          fi
          echo "Merge base with master: $MERGE_BASE"

          printf '%s\n' "${{ env.CANDIDATE_ALLOWLIST }}" | sed '/^$/d' > allowlist.txt
          git diff --name-only "$MERGE_BASE"..."$TARGET" > diff.txt

          echo "Changed files in candidate:"
          cat diff.txt

          if grep -vxF -f allowlist.txt diff.txt | grep -q .; then
            echo "ERROR: Target SHA contains unauthorized files"
            grep -vxF -f allowlist.txt diff.txt
            exit 1
          fi

          if [ ! -s diff.txt ]; then
            echo "ERROR: Candidate SHA has no diff against master"
            exit 1
          fi

      - name: Extract Authorized Candidate Artifacts
        run: |
          TARGET="${{ github.event.inputs.target_sha }}"
          mkdir -p deploy/ticket-43
          mkdir -p wp-content/themes/nuvanx-medical/assets/css/

          git show "$TARGET:deploy/ticket-43/post_content_v2.html" > deploy/ticket-43/post_content_v2.html
          git show "$TARGET:wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css" > wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css
          git show "$TARGET:wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css" > wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css

          sha256sum deploy/ticket-43/post_content_v2.html > candidate-hashes.txt
          sha256sum wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css >> candidate-hashes.txt
          sha256sum wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css >> candidate-hashes.txt
          cat candidate-hashes.txt

          echo "EXPECTED_CSS_SHA=$(sha256sum wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "EXPECTED_MIN_SHA=$(sha256sum wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css | awk '{print $1}')" >> "$GITHUB_ENV"
          echo "EXPECTED_HTML_SHA=$(sha256sum deploy/ticket-43/post_content_v2.html | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Setup SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Configure SSH Known Hosts
        env:
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          {
            echo "Host *"
            echo "  StrictHostKeyChecking yes"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/known_hosts ~/.ssh/config

      - name: Precheck Staging and Create Backup
        id: backup
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            cd "${{ env.STAGING_PATH }}"

            SITEURL=\$(wp option get siteurl)
            HOMEURL=\$(wp option get home)
            ACTIVE_THEME=\$(wp theme list --status=active --field=name)

            if [ "\$SITEURL" != "${{ env.STAGING_BASE_URL }}" ]; then echo "ERROR: SITEURL mismatch: \$SITEURL"; exit 1; fi
            if [ "\$HOMEURL" != "${{ env.STAGING_BASE_URL }}" ]; then echo "ERROR: HOMEURL mismatch: \$HOMEURL"; exit 1; fi
            if [ "\$ACTIVE_THEME" != "nuvanx-medical" ]; then echo "ERROR: ACTIVE_THEME mismatch: \$ACTIVE_THEME"; exit 1; fi

            BACKUP_DIR="\$HOME/nuvanx-backups/${{ env.BACKUP_NAME }}"
            mkdir -p "\$BACKUP_DIR"

            wp post get 9 --field=post_content > "\$BACKUP_DIR/post_content_before.html"
            sha256sum "\$BACKUP_DIR/post_content_before.html" > "\$BACKUP_DIR/metadata.sha256"

            THEME_CSS="${{ env.STAGING_PATH }}/wp-content/themes/nuvanx-medical/assets/css"
            cp "\$THEME_CSS/nvx-brand-home.css" "\$BACKUP_DIR/"
            cp "\$THEME_CSS/nvx-brand-home.min.css" "\$BACKUP_DIR/"
            sha256sum "\$BACKUP_DIR/nvx-brand-home.css" "\$BACKUP_DIR/nvx-brand-home.min.css" >> "\$BACKUP_DIR/metadata.sha256"

            echo "\$BACKUP_DIR" > /tmp/nvx_ticket43_backup_dir.txt
            echo "Backup created at \$BACKUP_DIR"
          EOF

      - name: Transfer Candidate Artifacts and Scripts
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p ${{ env.STAGING_PATH }}/deploy/ticket-43 ${{ env.STAGING_PATH }}/scripts/ticket-43"

          scp -P "$SSH_PORT" deploy/ticket-43/post_content_v2.html \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/deploy/ticket-43/"

          scp -P "$SSH_PORT" wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/wp-content/themes/nuvanx-medical/assets/css/"

          scp -P "$SSH_PORT" wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/wp-content/themes/nuvanx-medical/assets/css/"

          scp -P "$SSH_PORT" scripts/ticket-43/apply-post-content.php \
            scripts/ticket-43/rollback.sh \
            scripts/ticket-43/verify-post-deploy.sh \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/scripts/ticket-43/"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "chmod +x ${{ env.STAGING_PATH }}/scripts/ticket-43/*.sh"

      - name: Apply Post Content
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            cd "${{ env.STAGING_PATH }}"

            REMOTE_HTML_SHA=\$(sha256sum deploy/ticket-43/post_content_v2.html | awk '{print \$1}')
            if [ "\$REMOTE_HTML_SHA" != "${{ env.EXPECTED_HTML_SHA }}" ]; then
              echo "ERROR: Remote HTML sha mismatch"
              exit 1
            fi

            REMOTE_CSS_SHA=\$(sha256sum wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css | awk '{print \$1}')
            REMOTE_MIN_SHA=\$(sha256sum wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css | awk '{print \$1}')
            if [ "\$REMOTE_CSS_SHA" != "${{ env.EXPECTED_CSS_SHA }}" ]; then echo "ERROR: Remote CSS sha mismatch"; exit 1; fi
            if [ "\$REMOTE_MIN_SHA" != "${{ env.EXPECTED_MIN_SHA }}" ]; then echo "ERROR: Remote MIN CSS sha mismatch"; exit 1; fi

            export NVX_POST_CONTENT_V2="${{ env.STAGING_PATH }}/deploy/ticket-43/post_content_v2.html"
            wp eval-file scripts/ticket-43/apply-post-content.php

            wp cache flush >/dev/null 2>&1 || true
            wp sg purge >/dev/null 2>&1 || true
          EOF

      - name: Verify Post-Deploy
        id: verify
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            cd "${{ env.STAGING_PATH }}"
            export NUVX_STAGING_URL="${{ env.STAGING_BASE_URL }}"
            export NUVX_THEME_CSS="wp-content/themes/nuvanx-medical/assets/css"
            export NUVX_EXPECTED_CSS_SHA="${{ env.EXPECTED_CSS_SHA }}"
            export NUVX_EXPECTED_MIN_SHA="${{ env.EXPECTED_MIN_SHA }}"
            bash scripts/ticket-43/verify-post-deploy.sh
          EOF

      - name: Rollback on Failure
        if: failure() && steps.backup.outcome == 'success'
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            BACKUP_DIR="\$HOME/nuvanx-backups/${{ env.BACKUP_NAME }}"
            export NUVX_BACKUP_DIR="\$BACKUP_DIR"
            export NUVX_STAGING_PATH="${{ env.STAGING_PATH }}"
            bash "${{ env.STAGING_PATH }}/scripts/ticket-43/rollback.sh"
          EOF

      - name: Upload Candidate Hashes
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ticket43-candidate-hashes
          path: candidate-hashes.txt
          retention-days: 14