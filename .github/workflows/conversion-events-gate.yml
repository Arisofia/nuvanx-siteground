name: Conversion Events Gate

on:
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/js/nvx-conversion-events.js'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-conversion-events.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-valoracion-modal.php'
      - 'wp-content/themes/nuvanx-medical/templates/template-contact.php'
      - 'wp-content/mu-plugins/nuvanx-valoracion-native-hubspot-form.php'
      - 'scripts/analytics/**'
      - 'scripts/forms/**'
      - '.github/workflows/conversion-events-gate.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/js/nvx-conversion-events.js'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-conversion-events.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-valoracion-modal.php'
      - 'wp-content/themes/nuvanx-medical/templates/template-contact.php'
      - 'wp-content/mu-plugins/nuvanx-valoracion-native-hubspot-form.php'
      - 'scripts/analytics/**'
      - 'scripts/forms/**'
      - '.github/workflows/conversion-events-gate.yml'
  workflow_dispatch:

concurrency:
  group: conversion-events-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Lint GitHub Actions workflow
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 .github/workflows/conversion-events-gate.yml

      - name: Validate JavaScript syntax
        run: |
          node --check wp-content/themes/nuvanx-medical/assets/js/nvx-conversion-events.js
          node --check scripts/analytics/verify-conversion-events-browser.mjs
          node --check scripts/forms/test-hubspot-form-contract.mjs
          node --check scripts/forms/verify-hubspot-runtime-browser.mjs

      - name: Validate PHP syntax
        run: |
          php -l wp-content/themes/nuvanx-medical/inc/nvx-conversion-events.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-valoracion-modal.php
          php -l wp-content/themes/nuvanx-medical/templates/template-contact.php
          php -l wp-content/mu-plugins/nuvanx-valoracion-native-hubspot-form.php
          php -l scripts/forms/test-valoracion-single-mount.php

      - name: Enforce privacy and event contracts
        run: |
          node scripts/analytics/test-conversion-events.mjs
          node scripts/analytics/test-conversion-gate-workflow.mjs
          node scripts/forms/test-hubspot-form-contract.mjs
          php scripts/forms/test-valoracion-single-mount.php

  rendered-staging:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL: https://staging2.nuvanx.com
      BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
      BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
      VERIFY_RETRIES: '8'
      VERIFY_RETRY_DELAY_MS: '5000'
    steps:
      - name: Checkout repository with history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve latest deploy-triggering commit
        id: deploy
        env:
          SEARCH_REF: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHA="$(node scripts/analytics/resolve-staging-deploy-sha.mjs "$SEARCH_REF")"
          [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Expected staging deploy: $SHA"

      - name: Install pinned Chromium runtime
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Verify deployed events and HubSpot funnel without sending traffic
        id: rendered
        continue-on-error: true
        env:
          EXPECTED_DEPLOY_SHA: ${{ steps.deploy.outputs.sha }}
        run: |
          set +e
          set -o pipefail
          node scripts/analytics/verify-conversion-events-browser.mjs 2>&1 | tee analytics-staging.log
          analytics_status=$?
          node scripts/forms/verify-hubspot-runtime-browser.mjs 2>&1 | tee -a analytics-staging.log
          forms_status=$?
          if (( analytics_status != 0 || forms_status != 0 )); then
            echo "Rendered verification failed: analytics=$analytics_status forms=$forms_status" >&2
            exit 1
          fi

      - name: Upload rendered analytics evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: conversion-events-staging-evidence
          path: analytics-staging.log
          retention-days: 14
          if-no-files-found: error

      - name: Enforce rendered analytics contract
        if: steps.rendered.outcome == 'failure'
        run: exit 1
