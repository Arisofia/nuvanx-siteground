name: Ticket 43 One-Time QA Hardening

on:
  push:
    branches:
      - fix/ticket-43-complete-qa-hardening

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: fix/ticket-43-complete-qa-hardening
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply deterministic source corrections
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import re

          html_path = Path('deploy/ticket-43/post_content_v3-production-copy.html')
          css_path = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css')
          workflow_path = Path('.github/workflows/ticket43-v4-delivery.yml')

          html = html_path.read_text(encoding='utf-8')
          old_second = '<p class="nvx-brand-body nvx-home-editorial__lead">\nUbicadas estratégicamente'
          new_second = '<p class="nvx-brand-body nvx-home-editorial__body">\nUbicadas estratégicamente'
          if html.count(old_second) != 1:
              raise SystemExit(f'Expected exactly one second intro paragraph marker, found {html.count(old_second)}')
          html = html.replace(old_second, new_second, 1)
          if html.count('nvx-home-editorial__lead') != 1:
              raise SystemExit('Expected exactly one semantic intro lead class')
          if html.count('nvx-home-editorial__body') != 1:
              raise SystemExit('Expected exactly one semantic intro body class')
          html_path.write_text(html, encoding='utf-8')

          css = css_path.read_text(encoding='utf-8')
          replacements = {
              '.nvx-home-editorial__lead:first-of-type {': '.nvx-home-editorial__lead {',
              '.nvx-home-editorial__lead:nth-of-type(2) {': '.nvx-home-editorial__body {',
          }
          for old, new in replacements.items():
              if css.count(old) != 1:
                  raise SystemExit(f'Expected exactly one CSS selector {old!r}, found {css.count(old)}')
              css = css.replace(old, new, 1)
          if 'nth-of-type' in css or 'nth-child' in css:
              raise SystemExit('Positional selectors remain in home CSS')
          css_path.write_text(css, encoding='utf-8')

          workflow = workflow_path.read_text(encoding='utf-8')

          target_input = """      target_sha:
        description: 'Exact 40-character candidate SHA to deploy to staging2'
        required: true
        type: string
"""
          base_input = target_input + """      base_sha:
        description: 'Exact 40-character base SHA used for candidate scope validation'
        required: true
        type: string
"""
          if workflow.count(target_input) != 1:
              raise SystemExit('Unable to locate target_sha input block')
          workflow = workflow.replace(target_input, base_input, 1)

          target_env = '          TARGET: ${{ inputs.target_sha }}\n'
          target_base_env = target_env + '          BASE: ${{ inputs.base_sha }}\n'
          if workflow.count(target_env) != 1:
              raise SystemExit('Unable to locate target SHA environment block')
          workflow = workflow.replace(target_env, target_base_env, 1)

          old_resolve = """          [[ "$TARGET" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'ERROR: target_sha must be exactly 40 lowercase hexadecimal characters'
            exit 1
          }
          git fetch origin master
          git cat-file -e "${TARGET}^{commit}"
          git merge-base --is-ancestor origin/master "$TARGET" || {
            echo 'ERROR: candidate must contain current origin/master'
            exit 1
          }
          git checkout --detach "$TARGET"
          echo "sha=$TARGET" >> "$GITHUB_OUTPUT"
"""
          new_resolve = """          [[ "$TARGET" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'ERROR: target_sha must be exactly 40 lowercase hexadecimal characters'
            exit 1
          }
          [[ "$BASE" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'ERROR: base_sha must be exactly 40 lowercase hexadecimal characters'
            exit 1
          }
          [[ "$TARGET" != "$BASE" ]] || {
            echo 'ERROR: target_sha and base_sha must be different commits'
            exit 1
          }
          git fetch origin master
          git cat-file -e "${TARGET}^{commit}"
          git cat-file -e "${BASE}^{commit}"
          git merge-base --is-ancestor origin/master "$TARGET" || {
            echo 'ERROR: candidate must contain current origin/master'
            exit 1
          }
          git merge-base --is-ancestor "$BASE" "$TARGET" || {
            echo 'ERROR: base_sha must be an ancestor of target_sha'
            exit 1
          }
          git checkout --detach "$TARGET"
          echo "sha=$TARGET" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
"""
          if workflow.count(old_resolve) != 1:
              raise SystemExit('Unable to locate candidate resolution block')
          workflow = workflow.replace(old_resolve, new_resolve, 1)

          old_scope = """          TARGET="${{ steps.candidate.outputs.sha }}"
          mkdir -p qa/results qa/screenshots
          git diff --name-only origin/master..."$TARGET" | tee qa/results/editorial-changed-files.txt
          git diff --stat origin/master..."$TARGET" | tee qa/results/editorial-diff-stat.txt
"""
          new_scope = """          TARGET="${{ steps.candidate.outputs.sha }}"
          BASE="${{ steps.candidate.outputs.base }}"
          mkdir -p qa/results qa/screenshots
          git diff --name-only "$BASE" "$TARGET" | tee qa/results/editorial-changed-files.txt
          git diff --stat "$BASE" "$TARGET" | tee qa/results/editorial-diff-stat.txt
          test -s qa/results/editorial-changed-files.txt || {
            echo 'ERROR: candidate scope is empty'
            exit 1
          }
"""
          if workflow.count(old_scope) != 1:
              raise SystemExit('Unable to locate candidate scope header')
          workflow = workflow.replace(old_scope, new_scope, 1)

          old_invalid = '          INVALID="$(git diff --name-only origin/master..."$TARGET" | grep -Ev "$ALLOWED" || true)"\n'
          new_invalid = '          INVALID="$(git diff --name-only "$BASE" "$TARGET" | grep -Ev "$ALLOWED" || true)"\n'
          if workflow.count(old_invalid) != 1:
              raise SystemExit('Unable to locate candidate scope invalid-file command')
          workflow = workflow.replace(old_invalid, new_invalid, 1)

          old_positional = """          if grep -nE 'nth-child' "$HOME_CSS" "$COMPONENTS"; then
            echo 'ERROR: nth-child positional component styling detected'
            exit 1
          fi
"""
          new_positional = """          if grep -nE 'nth-child|nth-of-type' "$HOME_CSS" "$COMPONENTS"; then
            echo 'ERROR: positional component styling detected'
            exit 1
          fi
"""
          if workflow.count(old_positional) != 1:
              raise SystemExit('Unable to locate positional selector gate')
          workflow = workflow.replace(old_positional, new_positional, 1)

          semantic_anchor = """          grep -q 'class="nvx-index-item__number"' "$HTML"
"""
          semantic_checks = semantic_anchor + """          grep -q 'class="nvx-brand-body nvx-home-editorial__lead"' "$HTML"
          grep -q 'class="nvx-brand-body nvx-home-editorial__body"' "$HTML"
          [[ "$(grep -o 'nvx-home-editorial__lead' "$HTML" | wc -l)" -eq 1 ]]
          [[ "$(grep -o 'nvx-home-editorial__body' "$HTML" | wc -l)" -eq 1 ]]
"""
          if workflow.count(semantic_anchor) != 1:
              raise SystemExit('Unable to locate semantic HTML gate anchor')
          workflow = workflow.replace(semantic_anchor, semantic_checks, 1)

          parse_block = """          for css in \\
            "$THEME/assets/css/nvx-tokens.css" \\
            "$THEME/assets/css/nvx-tokens.min.css" \\
            "$THEME/assets/css/nvx-components.css" \\
            "$THEME/assets/css/nvx-components.min.css" \\
            "$THEME/assets/css/nvx-brand-home.css" \\
            "$THEME/assets/css/nvx-brand-home.min.css"; do
            test -s "$css"
            npx --yes clean-css-cli@5.6.3 -o "/tmp/$(basename "$css").parsed.css" "$css"
            test -s "/tmp/$(basename "$css").parsed.css"
          done
"""
          equivalence = parse_block + """
          for stem in nvx-tokens nvx-components nvx-brand-home; do
            source="$THEME/assets/css/${stem}.css"
            committed="$THEME/assets/css/${stem}.min.css"
            expected="/tmp/${stem}.expected.min.css"
            npx --yes clean-css-cli@5.6.3 -o "$expected" "$source"
            if ! cmp -s "$expected" "$committed"; then
              echo "ERROR: ${stem}.min.css is not the deterministic minification of ${stem}.css"
              diff -u "$committed" "$expected" || true
              exit 1
            fi
          done
"""
          if workflow.count(parse_block) != 1:
              raise SystemExit('Unable to locate CSS parse loop')
          workflow = workflow.replace(parse_block, equivalence, 1)

          manifest_sha = '            "sha": "${{ steps.candidate.outputs.sha }}",\n'
          manifest_base = manifest_sha + '            "base_sha": "${{ steps.candidate.outputs.base }}",\n'
          if workflow.count(manifest_sha) != 1:
              raise SystemExit('Unable to locate delivery manifest SHA')
          workflow = workflow.replace(manifest_sha, manifest_base, 1)

          workflow_path.write_text(workflow, encoding='utf-8')
          PY

          npx --yes clean-css-cli@5.6.3 \
            -o wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css

      - name: Validate generated changes
        shell: bash
        run: |
          set -euo pipefail
          HOME_CSS='wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css'
          HOME_MIN='wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css'
          HTML='deploy/ticket-43/post_content_v3-production-copy.html'
          WORKFLOW='.github/workflows/ticket43-v4-delivery.yml'

          ! grep -nE 'nth-child|nth-of-type' "$HOME_CSS"
          grep -q 'nvx-home-editorial__lead' "$HTML"
          grep -q 'nvx-home-editorial__body' "$HTML"
          grep -q 'base_sha:' "$WORKFLOW"
          grep -q 'cmp -s "$expected" "$committed"' "$WORKFLOW"

          npx --yes clean-css-cli@5.6.3 -o /tmp/home.expected.min.css "$HOME_CSS"
          cmp -s /tmp/home.expected.min.css "$HOME_MIN"

      - name: Commit hardened candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/ticket43-complete-hardening.yml
          git add \
            .github/workflows/ticket43-v4-delivery.yml \
            deploy/ticket-43/post_content_v3-production-copy.html \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css
          git commit -m 'fix(ticket-43): complete semantic QA hardening'
          git push origin HEAD:fix/ticket-43-complete-qa-hardening
