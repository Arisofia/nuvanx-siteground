name: Promote Equipo Route Production PR Once

on:
  pull_request:
    branches: [master]
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: nuvanx-production-promotion
  cancel-in-progress: false

env:
  TARGET_SHA: 822dc8924e0ea71063ab1e40110681377df09ad5
  VALIDATED_STAGING_SHA: acfb4735ec1067f0a599611b1d7c316ba08db9e6
  PROD_ROOT: /home/customer/www/nuvanx.com/public_html
  STAGING_ROOT: /home/customer/www/staging2.nuvanx.com/public_html
  ARTIFACT_DIR: production-equipo-route-evidence

jobs:
  promote:
    if: >-
      github.event.label.name == 'promote-production' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'ops/promote-equipo-route-production-20260724'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out exact merged candidate
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate immutable candidate
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          git cat-file -e "${VALIDATED_STAGING_SHA}^{commit}"
          git diff --quiet "$VALIDATED_STAGING_SHA" "$TARGET_SHA" -- wp-content/themes/nuvanx-medical
          php -l wp-content/themes/nuvanx-medical/inc/nvx-equipo-route-guard.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-que-exigir-page.php
          bash -n tools/deploy/deploy-to-prod.sh
          printf 'target_sha=%s\nvalidated_staging_sha=%s\n' "$TARGET_SHA" "$VALIDATED_STAGING_SHA" > "$ARTIFACT_DIR/run-context.txt"

      - name: Configure strict SiteGround SSH
        env:
          SSH_HOST: ${{ secrets.STAGING2_SSH_HOST }}
          SSH_PORT_SECRET: ${{ secrets.STAGING2_SSH_PORT }}
          SSH_USER: ${{ secrets.STAGING2_SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.STAGING2_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.STAGING2_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          : "${SSH_HOST:?Missing STAGING2_SSH_HOST secret}"
          : "${SSH_USER:?Missing STAGING2_SSH_USER secret}"
          : "${SSH_PRIVATE_KEY:?Missing STAGING2_SSH_PRIVATE_KEY secret}"
          : "${SSH_KNOWN_HOSTS:?Missing STAGING2_SSH_KNOWN_HOSTS secret}"
          SSH_PORT="${SSH_PORT_SECRET:-18765}"
          [[ "$SSH_PORT" =~ ^[0-9]{1,5}$ ]]
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/nuvanx_key"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/nuvanx_key" "$HOME/.ssh/known_hosts"
          cat > "$HOME/.ssh/config" <<EOF
          Host nvx-host
            HostName $SSH_HOST
            User $SSH_USER
            Port $SSH_PORT
            IdentityFile $HOME/.ssh/nuvanx_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $HOME/.ssh/known_hosts
            ConnectTimeout 15
          EOF
          chmod 600 "$HOME/.ssh/config"
          ssh nvx-host 'printf "SSH_CONNECTION_OK\n"' | tee "$ARTIFACT_DIR/ssh-connectivity.log"

      - name: Verify validated staging source
        shell: bash
        run: |
          set -euo pipefail
          ssh nvx-host "bash -s -- '$PROD_ROOT' '$STAGING_ROOT' '$VALIDATED_STAGING_SHA'" <<'REMOTE' | tee "$ARTIFACT_DIR/preflight.log"
          set -euo pipefail
          PROD_ROOT="$1"
          STAGING_ROOT="$2"
          VALIDATED_STAGING_SHA="$3"
          test "$(cd "$PROD_ROOT" && wp option get siteurl)" = 'https://nuvanx.com'
          test "$(cd "$STAGING_ROOT" && wp option get siteurl)" = 'https://staging2.nuvanx.com'
          test "$(tr -d '\r\n' < "$STAGING_ROOT/wp-content/themes/nuvanx-medical/.nvx-deploy-sha")" = "$VALIDATED_STAGING_SHA"
          test -f "$STAGING_ROOT/wp-content/themes/nuvanx-medical/inc/nvx-equipo-route-guard.php"
          grep -Fq "nvx_schema_path_matches( \$path, '/equipo-medico/' )" "$STAGING_ROOT/wp-content/themes/nuvanx-medical/inc/nvx-equipo-route-guard.php"
          echo 'PRODUCTION_PREFLIGHT_OK'
          REMOTE
          grep -Fq 'PRODUCTION_PREFLIGHT_OK' "$ARTIFACT_DIR/preflight.log"

      - name: Upload immutable deployment helper
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_RELEASE="$STAGING_ROOT/wp-content/.nuvanx-deployments/prod-equipo-${TARGET_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "REMOTE_RELEASE=$REMOTE_RELEASE" >> "$GITHUB_ENV"
          ssh nvx-host "mkdir -p '$REMOTE_RELEASE'"
          rsync -az tools/deploy/deploy-to-prod.sh "nvx-host:$REMOTE_RELEASE/"

      - name: Promote and verify production disk
        shell: bash
        run: |
          set -euo pipefail
          ssh nvx-host "bash -s -- '$PROD_ROOT' '$STAGING_ROOT' '$REMOTE_RELEASE' '$TARGET_SHA'" <<'REMOTE' 2>&1 | tee "$ARTIFACT_DIR/promotion.log"
          set -Eeuo pipefail
          PROD_ROOT="$1"
          STAGING_ROOT="$2"
          RELEASE_ROOT="$3"
          TARGET_SHA="$4"
          PROMOTION_LOG="$(mktemp)"
          BACKUP_DIR=''
          MUTATION_STARTED=0

          rollback() {
            local exit_code=$?
            trap - ERR
            set +e
            if [[ "$MUTATION_STARTED" -eq 1 && -n "$BACKUP_DIR" && -f "$BACKUP_DIR/theme.tgz" ]]; then
              rm -rf "$PROD_ROOT/wp-content/themes/nuvanx-medical"
              tar -xzf "$BACKUP_DIR/theme.tgz" -C "$PROD_ROOT"
              (cd "$PROD_ROOT" && wp cache flush || true; wp sg purge || true; wp eval 'if (function_exists("opcache_reset")) { opcache_reset(); }' || true)
              echo "ROLLBACK_COMPLETE backup=$BACKUP_DIR" >&2
            fi
            exit "$exit_code"
          }
          trap rollback ERR

          NUVANX_CONFIRM=yes bash "$RELEASE_ROOT/deploy-to-prod.sh" --prod-root "$PROD_ROOT" --staging-root "$STAGING_ROOT" --confirm | tee "$PROMOTION_LOG"
          grep -Fq 'PROMOTE_PROD_OK' "$PROMOTION_LOG"
          BACKUP_DIR="$(sed -n 's/^== DONE backup=\(.*\) ==$/\1/p' "$PROMOTION_LOG" | tail -n1)"
          test -f "$BACKUP_DIR/theme.tgz"
          MUTATION_STARTED=1

          GUARD="$PROD_ROOT/wp-content/themes/nuvanx-medical/inc/nvx-equipo-route-guard.php"
          LOADER="$PROD_ROOT/wp-content/themes/nuvanx-medical/inc/nvx-que-exigir-page.php"
          test -f "$GUARD"
          php -l "$GUARD"
          php -l "$LOADER"
          grep -Fq "remove_filter( 'the_content', 'nvx_content_restructure_equipo_page', 19 );" "$GUARD"
          grep -Fq "nvx_schema_path_matches( \$path, '/equipo-medico/' )" "$GUARD"
          grep -Fq "require_once get_template_directory() . '/inc/nvx-equipo-route-guard.php';" "$LOADER"
          printf '%s\n' "$TARGET_SHA" > "$PROD_ROOT/wp-content/themes/nuvanx-medical/.nvx-deploy-sha"
          cd "$PROD_ROOT"
          wp cache flush || true
          wp sg purge || true
          rm -rf wp-content/cache/* 2>/dev/null || true
          wp eval 'if (function_exists("opcache_reset")) { opcache_reset(); }' || true
          test "$(tr -d '\r\n' < "$PROD_ROOT/wp-content/themes/nuvanx-medical/.nvx-deploy-sha")" = "$TARGET_SHA"

          trap - ERR
          MUTATION_STARTED=0
          echo "PROMOTE_PRODUCTION_DISK_OK sha=$TARGET_SHA backup=$BACKUP_DIR"
          REMOTE
          grep -Fq 'PROMOTE_PRODUCTION_DISK_OK' "$ARTIFACT_DIR/promotion.log"

      - name: Remove temporary payload
        if: always() && env.REMOTE_RELEASE != ''
        continue-on-error: true
        shell: bash
        run: ssh nvx-host "rm -rf '$REMOTE_RELEASE'"

      - name: Upload production evidence
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: production-equipo-route-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: production-equipo-route-evidence/
          retention-days: 30
          if-no-files-found: warn
