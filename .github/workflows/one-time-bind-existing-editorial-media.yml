name: One-time bind existing editorial media

on:
  push:
    branches:
      - fix/editorial-home-cases-final-20260722
    paths:
      - '.github/workflows/one-time-bind-existing-editorial-media.yml'

permissions:
  contents: write

jobs:
  patch-and-remove:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: fix/editorial-home-cases-final-20260722
          fetch-depth: 0
          persist-credentials: false

      - name: Replace failed upload paths with verified media-library files
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          replacements = {
              Path('wp-content/themes/nuvanx-medical/front-page.php'): {
                  '/uploads/2026/07/nuvanx_portada_1_final.png': '/uploads/2026/07/nvx-home-video-portada-poster.webp',
                  '/uploads/2026/07/nuvanx_body_inspirational.png': '/uploads/2026/07/Endolift-Corporal-Portada.webp',
                  '/uploads/2026/07/tone_correction_final.png': '/uploads/2026/07/Exion-IPL.webp',
                  '/uploads/2026/07/surface_renewal_final.png': '/uploads/2026/07/laser-co2-fraccionado-madrid-textura-cicatrices-poro.webp',
                  '/uploads/2026/07/profile_definition_final.png': '/uploads/2026/07/Endolift-Papada.webp',
                  '/uploads/2026/07/papada_mandibula.png': '/uploads/2026/07/Endolift-Papada.webp',
                  '/uploads/2026/07/calidad_firmeza.png': '/uploads/2026/07/Exion-IPL.webp',
                  '/uploads/2026/07/grasa_abdomen.png': '/uploads/2026/07/Endolift-Abdomen.webp',
                  '/uploads/2026/07/flacidez_brazos.png': '/uploads/2026/07/Endolift-Brazos.webp',
                  '/uploads/2026/07/recuperacion_postparto.png': '/uploads/2026/07/Endolift-Abdomen-y-Flancos-Frente.webp',
                  '/uploads/2026/07/cicatrices_poros.png': '/uploads/2026/07/laser-co2-fraccionado-madrid-textura-cicatrices-poro.webp',
                  '/uploads/2026/07/evolucion_papada_perfil.png': '/uploads/2026/07/Endolift-Papada.webp',
                  '/uploads/2026/07/evolucion_facial_integral.png': '/uploads/2026/07/Endolift-Full-Face.webp',
                  '/uploads/2026/07/evolucion_brazos.png': '/uploads/2026/07/Endolift-Brazos.webp',
                  '/uploads/2026/07/evolucion_abdomen.png': '/uploads/2026/07/Endolift-Abdomen.webp',
                  '/uploads/2026/07/evolucion_espalda_sujetador.png': '/uploads/2026/07/Endolift-Espalda-Flancos-y-Sujetador.webp',
                  '/uploads/2026/07/nuvanx_journey_section_title.png': '/uploads/2026/07/proceso-medico-laser-nuvanx-madrid.webp',
              },
              Path('wp-content/themes/nuvanx-medical/inc/nvx-cases-page.php'): {
                  '/uploads/2026/07/evolucion_papada_perfil.png': '/uploads/2026/07/Endolift-Papada.webp',
                  '/uploads/2026/07/evolucion_facial_integral.png': '/uploads/2026/07/Endolift-Full-Face.webp',
                  '/uploads/2026/07/evolucion_brazos.png': '/uploads/2026/07/Endolift-Brazos.webp',
                  '/uploads/2026/07/evolucion_abdomen.png': '/uploads/2026/07/Endolift-Abdomen.webp',
                  '/uploads/2026/07/evolucion_espalda_sujetador.png': '/uploads/2026/07/Endolift-Espalda-Flancos-y-Sujetador.webp',
                  '/uploads/2026/07/nuvanx_journey_section_title.png': '/uploads/2026/07/proceso-medico-laser-nuvanx-madrid.webp',
              },
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in pairs.items():
                  count = text.count(old)
                  if count < 1:
                      raise SystemExit(f'Missing expected media path in {path}: {old}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')

          functions = Path('wp-content/themes/nuvanx-medical/functions.php')
          text = functions.read_text(encoding='utf-8')
          enqueue = "\t\twp_enqueue_style( 'nvx-home-final-media', $css . 'nvx-home-final-media.css', array( 'nvx-home-v3' ), nvx_asset_version( 'assets/css/nvx-home-final-media.css' ) );\n"
          if text.count(enqueue) != 1:
              raise SystemExit('Expected final-media enqueue was not found exactly once.')
          functions.write_text(text.replace(enqueue, ''), encoding='utf-8')
          PY
          php -l wp-content/themes/nuvanx-medical/front-page.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-cases-page.php
          php -l wp-content/themes/nuvanx-medical/functions.php

      - name: Commit patch and remove one-time workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            wp-content/themes/nuvanx-medical/front-page.php \
            wp-content/themes/nuvanx-medical/inc/nvx-cases-page.php \
            wp-content/themes/nuvanx-medical/functions.php
          git rm .github/workflows/one-time-bind-existing-editorial-media.yml
          git commit -m 'fix(media): bind homepage and cases to verified library assets'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
