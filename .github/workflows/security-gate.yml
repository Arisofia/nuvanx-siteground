name: Security Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Reject tracked files covered by gitignore
        run: |
          set -euo pipefail
          tracked_ignored="$(git ls-files -ci --exclude-standard)"
          if [[ -n "$tracked_ignored" ]]; then
            echo 'ERROR: files are tracked although .gitignore excludes them:'
            printf '%s\n' "$tracked_ignored"
            exit 1
          fi

      - name: Reject forbidden operational paths
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '(^wp-admin/|^wp-includes/|^wp-content/uploads/|^qa/screenshots/|(^|/)wp-config\.php$|(^|/)source_site_wpconfig$|(^|/)\.env($|\.)|(^|/)wp-content/backups[^/]*/|(^|/)dup-installer(/|$)|(^|/)installer/original_files_|(^|/)[^/]*installer-log[^/]*$)' || true)"
          if [[ -n "$forbidden" ]]; then
            echo 'ERROR: forbidden operational or runtime paths are tracked:'
            printf '%s\n' "$forbidden"
            exit 1
          fi

      - name: Reject common secret material in tracked text
        run: |
          set -euo pipefail
          patterns=(
            "define[[:space:]]*\\([[:space:]]*['\"](AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT|WP_CACHE_KEY_SALT|DB_PASSWORD)['\"]"
            "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "gh[pousr]_[A-Za-z0-9_]{30,}"
          )
          for pattern in "${patterns[@]}"; do
            matches="$(git grep -nEI "$pattern" -- . ':!docs/security/**' ':!.github/workflows/security-gate.yml' || true)"
            if [[ -n "$matches" ]]; then
              echo "ERROR: possible secret material matched pattern: $pattern"
              printf '%s\n' "$matches" | sed -E 's/(:[0-9]+:).*/\1[REDACTED]/'
              exit 1
            fi
          done

      - name: Report repository hygiene
        run: |
          set -euo pipefail
          printf 'tracked_files=%s\n' "$(git ls-files | wc -l)"
          printf 'commits=%s\n' "$(git rev-list --count --all)"
          printf 'tracked_ignored=0\n'
