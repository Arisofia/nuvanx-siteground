name: Staging2 smoke verify (no deploy)

# Run anytime to confirm live staging2 HTML matches expected editorial markers.
# Does not deploy — use after manual deploys or to diagnose drift.

on:
  workflow_dispatch:
  schedule:
    # Daily 07:15 UTC — catch drift / cache regressions
    - cron: '15 7 * * *'

permissions:
  contents: read

env:
  STAGING_BASE_URL: https://staging2.nuvanx.com

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: HTTP smoke verify staging2
        env:
          BASE_URL: ${{ env.STAGING_BASE_URL }}
        run: |
          set -euo pipefail
          chmod +x scripts/staging2/smoke-verify-staging2.sh
          bash scripts/staging2/smoke-verify-staging2.sh
