name: Button System Gate

on:
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - 'wp-content/themes/nuvanx-medical/**/*.php'
      - 'scripts/design-system/audit-buttons.mjs'
      - 'docs/design-system/button.md'
      - '.github/workflows/button-system-gate.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - 'wp-content/themes/nuvanx-medical/**/*.php'
      - 'scripts/design-system/audit-buttons.mjs'
      - 'docs/design-system/button.md'
      - '.github/workflows/button-system-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate canonical button ownership and variants
        run: node scripts/design-system/audit-buttons.mjs
