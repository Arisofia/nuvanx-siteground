name: Emergency restore staging2

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/emergency-restore-staging2.yml'

permissions:
  contents: read

concurrency:
  group: staging2-manual-deployment
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging2
      url: https://staging2.nuvanx.com
    env:
      RESTORE_SHA: 2e392c7b56478ff8aad5b369e0bca05a46fdd7e5
      WP_ROOT: /home/customer/www/staging2.nuvanx.com/public_html
      ARTIFACT_DIR: staging2-emergency-restore-evidence
    steps:
      - name: Check out last known-good SHA
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ env.RESTORE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          test "$(git rev-parse HEAD)" = "$RESTORE_SHA"
          php -l wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php | tee "$ARTIFACT_DIR/php-lint.log"

      - name: Configure strict SSH
        shell: bash
        env:
          STAGING2_SSH_HOST: ${{ secrets.STAGING2_SSH_HOST }}
          STAGING2_SSH_PORT: ${{ secrets.STAGING2_SSH_PORT }}
          STAGING2_SSH_USER: ${{ secrets.STAGING2_SSH_USER }}
          STAGING2_SSH_PRIVATE_KEY: ${{ secrets.STAGING2_SSH_PRIVATE_KEY }}
          STAGING2_SSH_KNOWN_HOSTS: ${{ secrets.STAGING2_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          : "${STAGING2_SSH_HOST:?Missing host}"
          : "${STAGING2_SSH_USER:?Missing user}"
          : "${STAGING2_SSH_PRIVATE_KEY:?Missing key}"
          : "${STAGING2_SSH_KNOWN_HOSTS:?Missing known hosts}"
          SSH_PORT="${STAGING2_SSH_PORT:-18765}"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$STAGING2_SSH_PRIVATE_KEY" > "$HOME/.ssh/staging2_key"
          printf '%s\n' "$STAGING2_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/staging2_key" "$HOME/.ssh/known_hosts"
          cat > "$HOME/.ssh/config" <<EOF
          Host nvx-staging2
            HostName $STAGING2_SSH_HOST
            User $STAGING2_SSH_USER
            Port $SSH_PORT
            IdentityFile $HOME/.ssh/staging2_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $HOME/.ssh/known_hosts
            ConnectTimeout 15
          EOF
          chmod 600 "$HOME/.ssh/config"

      - name: Upload and restore immutable theme
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_RELEASE="$WP_ROOT/wp-content/.nuvanx-deployments/${RESTORE_SHA}-${GITHUB_RUN_ID}"
          echo "REMOTE_RELEASE=$REMOTE_RELEASE" >> "$GITHUB_ENV"
          ssh nvx-staging2 "mkdir -p '$REMOTE_RELEASE/theme'"
          rsync -az --delete wp-content/themes/nuvanx-medical/ "nvx-staging2:$REMOTE_RELEASE/theme/"
          rsync -az tools/deploy/deploy-to-staging2.sh scripts/wp/nvx-production-readiness-command.php scripts/staging2/smoke-verify-staging2.sh "nvx-staging2:$REMOTE_RELEASE/"
          ssh nvx-staging2 \
            "NUVANX_CONFIRM=yes bash '$REMOTE_RELEASE/deploy-to-staging2.sh' \
              --wp-root '$WP_ROOT' \
              --source-theme '$REMOTE_RELEASE/theme' \
              --migration-script '$REMOTE_RELEASE/nvx-production-readiness-command.php' \
              --smoke-script '$REMOTE_RELEASE/smoke-verify-staging2.sh' \
              --sha '$RESTORE_SHA' \
              --confirm" \
            2>&1 | tee "$ARTIFACT_DIR/restore.log"
          grep -Fq 'DEPLOY_STAGING2_OK' "$ARTIFACT_DIR/restore.log"

      - name: Verify restored site
        shell: bash
        run: |
          set -euo pipefail
          deployed_sha="$(ssh nvx-staging2 "tr -d '\r\n' < '$WP_ROOT/wp-content/themes/nuvanx-medical/.nvx-deploy-sha'")"
          test "$deployed_sha" = "$RESTORE_SHA"
          curl -fsSL --retry 5 --retry-delay 3 https://staging2.nuvanx.com/ >/dev/null
          curl -fsSL --retry 5 --retry-delay 3 https://staging2.nuvanx.com/btl-exilite-ipl-madrid/ >/dev/null
          printf '%s\n' "RESTORE_OK $deployed_sha" | tee "$ARTIFACT_DIR/result.log"

      - name: Cleanup remote payload
        if: always()
        shell: bash
        run: |
          if [[ -n "${REMOTE_RELEASE:-}" ]]; then ssh nvx-staging2 "rm -rf '$REMOTE_RELEASE'" || true; fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: staging2-emergency-restore-${{ github.run_id }}
          path: staging2-emergency-restore-evidence/
          retention-days: 30
