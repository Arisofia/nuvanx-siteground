name: Home Hero Stack Once

on:
  pull_request:
    branches: [master]
    types: [synchronize]
    paths:
      - '.github/workflows/home-hero-stack-once.yml'

permissions:
  contents: write

concurrency:
  group: home-hero-stack-once-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'content/home-cercano-medico-20260724'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Stack hero video and copy
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-home-v3.css')
          content = path.read_text(encoding='utf-8')

          replacements = [
              (
                  """/* Hero: video and copy are sibling columns, never layered. */
.nvx-home-v5 .nvx-home-hero {
	display: grid;
	grid-template-columns: minmax(0, 1.18fr) minmax(24rem, 0.82fr);
	width: 100%;
	max-width: none;
	min-height: min(52rem, calc(100svh - var(--nvx-header-height, 5rem)));
	margin: 0;
	background: var(--nvx-surface-base);
	overflow: hidden;
}

.nvx-home-v5 .nvx-home-hero__media {
	position: relative;
	min-width: 0;
	min-height: 36rem;
	background: var(--nvx-charcoal);
	overflow: hidden;
}""",
                  """/* Hero: full-width video followed by a separate editorial copy block. */
.nvx-home-v5 .nvx-home-hero {
	display: grid;
	grid-template-columns: 1fr;
	width: 100%;
	max-width: none;
	min-height: 0;
	margin: 0;
	background: var(--nvx-surface-base);
	overflow: hidden;
}

.nvx-home-v5 .nvx-home-hero__media {
	position: relative;
	width: 100%;
	min-width: 0;
	min-height: 0;
	aspect-ratio: 16 / 9;
	background: var(--nvx-charcoal);
	overflow: hidden;
}""",
              ),
              (
                  """	min-width: 0;
	padding: clamp(4rem, 7vw, 7.5rem) clamp(2rem, 5vw, 5.5rem);
	background: var(--nvx-surface-base);""",
                  """	width: min(100%, var(--nvx-shell));
	min-width: 0;
	margin-inline: auto;
	padding: clamp(3.5rem, 6vw, 6rem) var(--nvx-gutter-inner);
	background: var(--nvx-surface-base);""",
              ),
              (
                  """	max-width: 11ch;
	font-family: var(--nvx-serif);
	font-size: clamp(3.15rem, 5.2vw, 6.35rem);""",
                  """	max-width: 17ch;
	font-family: var(--nvx-serif);
	font-size: clamp(3rem, 5vw, 5.8rem);""",
              ),
              (
                  """	max-width: 34rem;
	font-family: var(--nvx-sans);""",
                  """	max-width: 58rem;
	font-family: var(--nvx-sans);""",
              ),
              (
                  """	.nvx-home-v5 .nvx-home-hero__media {
		min-height: 0;
		height: min(56svh, 34rem);
		max-height: 34rem;
	}""",
                  """	.nvx-home-v5 .nvx-home-hero__media {
		min-height: 0;
		height: auto;
		max-height: none;
		aspect-ratio: 16 / 9;
	}""",
              ),
          ]

          for old, new in replacements:
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one CSS block, found {count}')
              content = content.replace(old, new, 1)

          path.write_text(content, encoding='utf-8')
          PY

      - name: Validate CSS contract
        shell: bash
        run: |
          set -euo pipefail
          css='wp-content/themes/nuvanx-medical/assets/css/nvx-home-v3.css'
          grep -Fq 'grid-template-columns: 1fr;' "$css"
          grep -Fq 'aspect-ratio: 16 / 9;' "$css"
          grep -Fq 'width: min(100%, var(--nvx-shell));' "$css"
          ! grep -Fq 'grid-template-columns: minmax(0, 1.18fr) minmax(24rem, 0.82fr);' "$css"
          git diff --check

      - name: Commit layout correction and remove one-off workflow
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/home-hero-stack-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(home): stack full-width hero video above copy'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${TARGET_BRANCH}"
