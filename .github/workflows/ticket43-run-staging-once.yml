name: Ticket 43 Execute Staging QA Once

on:
  push:
    branches:
      - ci/ticket43-run-staging-qa
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  actions: write
  contents: write

jobs:
  dispatch-and-monitor:
    # Quote required: unquoted "ci(ticket-43): …" is invalid YAML (colon+space).
    if: "${{ github.event_name == 'push' && github.event.head_commit.message == 'ci(ticket-43): execute scoped staging QA candidate' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trigger branch
        uses: actions/checkout@v4
        with:
          ref: ci/ticket43-run-staging-qa
          fetch-depth: 0

      - name: Dispatch scoped staging workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run ticket43-v4-delivery.yml \
            --repo '${{ github.repository }}' \
            --ref ci/ticket43-run-staging-qa \
            -f target_sha='75a074bf1ba3a7935d91d772a7f7e0cfba3c5c01' \
            -f base_sha='abcfd2208651fb255dad32bfd165094f948682ff'

      - name: Monitor run and save result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=''
          for attempt in $(seq 1 30); do
            run_id="$(gh run list --repo '${{ github.repository }}' --workflow ticket43-v4-delivery.yml --branch ci/ticket43-run-staging-qa --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
            [[ -n "$run_id" ]] && break
            sleep 10
          done
          [[ -n "$run_id" ]]
          set +e
          gh run watch "$run_id" --repo '${{ github.repository }}' --exit-status
          watch_status=$?
          set -e
          mkdir -p qa/results
          gh run view "$run_id" --repo '${{ github.repository }}' --json databaseId,status,conclusion,url,headSha,createdAt > qa/results/ticket43-staging-run.json
          printf '\n{"watch_exit_code":%s}\n' "$watch_status" >> qa/results/ticket43-staging-run.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add qa/results/ticket43-staging-run.json
          git commit -m 'chore(ticket-43): record staging QA result [skip ci]'
          git push origin HEAD:ci/ticket43-run-staging-qa
          exit "$watch_status"

  report:
    # Visibility only — never fail this PR job:
    # missing run, still in progress, or unsuccessful conclusion.
    if: "${{ github.event_name == 'pull_request' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Locate and report latest staging run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail

          run_id="$(gh run list \
            --repo '${{ github.repository }}' \
            --workflow ticket43-v4-delivery.yml \
            --branch ci/ticket43-run-staging-qa \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty' 2>/dev/null || true)"

          if [[ -z "${run_id:-}" ]]; then
            echo "No staging workflow run found on ci/ticket43-run-staging-qa yet."
            echo "This check is informational only; PR stays green."
            exit 0
          fi

          echo "Staging workflow run: $run_id"

          # Snapshot current state (do not fail if view errors)
          if ! gh run view "$run_id" --repo '${{ github.repository }}' \
            --json databaseId,status,conclusion,url,headSha,createdAt; then
            echo "Could not load run details for $run_id (informational only)."
            exit 0
          fi

          status="$(gh run view "$run_id" --repo '${{ github.repository }}' --json status --jq '.status // empty' 2>/dev/null || true)"
          conclusion="$(gh run view "$run_id" --repo '${{ github.repository }}' --json conclusion --jq '.conclusion // empty' 2>/dev/null || true)"
          echo "status=${status:-unknown} conclusion=${conclusion:-none}"

          # Still running / queued: report and exit green (do not block the PR)
          if [[ "$status" == "queued" || "$status" == "in_progress" || "$status" == "waiting" || "$status" == "requested" || "$status" == "pending" ]]; then
            echo "Staging run has not finished yet. Not failing this PR check."
            exit 0
          fi

          # Finished: watch is optional; never propagate failure to the PR
          set +e
          gh run watch "$run_id" --repo '${{ github.repository }}' --exit-status
          watch_status=$?
          set -e

          if [[ "$watch_status" -eq 0 && "$conclusion" == "success" ]]; then
            echo "Staging workflow completed successfully."
          else
            echo "Staging workflow did not complete successfully (watch_exit=${watch_status}, conclusion=${conclusion:-none})."
            echo "Reporting for visibility only; not failing this PR check."
          fi

          exit 0
