name: CSS Runtime Parity Patch Temporary

on:
  push:
    branches:
      - fix/css-runtime-stack-parity
    paths:
      - '.github/workflows/css-audit-source-snapshot-temporary.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: fix/css-runtime-stack-parity
          fetch-depth: 0

      - name: Apply exact source patches
        run: |
          python - <<'PY'
          from pathlib import Path

          audit = Path('scripts/design-system/audit-css.mjs')
          source = audit.read_text()
          replacements = [
              (
                  "// Keep in enqueue order (see functions.php nvx_theme_scripts + conditional enqueues).\n// nvx-hero-blackout.css is intentionally omitted: temporary override with !important,\n// loaded only when nvx_theme_hero_blackout_enabled() — counted as inactive for the gate.\n// nvx-brand-home.css is loaded sitewide; it owns .hero-cta-group + .nvx-home-hero-ctas styles.\n",
                  "// Keep in canonical runtime order (see functions.php and conditional enqueues).\n// Conditional styles are active architecture: the gate must inspect every stylesheet\n// that can be referenced by PHP, JavaScript, HTML or another stylesheet.\n// nvx-brand-home.css is loaded sitewide; it owns .hero-cta-group + .nvx-home-hero-ctas styles.\n",
              ),
              ("\t'nvx-posts.css',\n];", "\t'nvx-posts.css',\n\t'nvx-hero-blackout.css',\n];"),
              (
                  "const runtimeFiles = walk(THEME, new Set(['.php', '.js', '.html']));\nconst referencedStylesheets = new Set(ACTIVE_STACK);\nconst stylesheetReferenceEvidence = [];",
                  "const runtimeFiles = walk(THEME, new Set(['.php', '.js', '.html']));\nconst runtimeReferencedStylesheets = new Set();\nconst referencedStylesheets = new Set(ACTIVE_STACK);\nconst stylesheetReferenceEvidence = [];",
              ),
              (
                  "\tfor (const file of extractRuntimeStylesheetReferences(read(absolute))) {\n\t\treferencedStylesheets.add(file);",
                  "\tfor (const file of extractRuntimeStylesheetReferences(read(absolute))) {\n\t\truntimeReferencedStylesheets.add(file);\n\t\treferencedStylesheets.add(file);",
              ),
              (
                  "\tfor (const file of extractCssImports(source)) {\n\t\treferencedStylesheets.add(file);",
                  "\tfor (const file of extractCssImports(source)) {\n\t\truntimeReferencedStylesheets.add(file);\n\t\treferencedStylesheets.add(file);",
              ),
              (
                  "const orphanStylesheets = sourceFiles.filter((file) => !referencedStylesheets.has(file));",
                  "const orphanStylesheets = sourceFiles.filter((file) => !referencedStylesheets.has(file));\nconst runtimeStylesheetsOutsideActiveStack = sourceFiles.filter(\n\t(file) => runtimeReferencedStylesheets.has(file) && !ACTIVE_STACK.includes(file)\n);",
              ),
              (
                  "\treferencedStylesheets: [...referencedStylesheets].sort(),\n\tstylesheetReferenceEvidence,",
                  "\treferencedStylesheets: [...referencedStylesheets].sort(),\n\truntimeReferencedStylesheets: [...runtimeReferencedStylesheets].sort(),\n\truntimeStylesheetsOutsideActiveStack,\n\tstylesheetReferenceEvidence,",
              ),
              (
                  "\tinactiveStylesheets: inactiveFiles.length,\n\torphanStylesheets: orphanStylesheets.length,",
                  "\tinactiveStylesheets: inactiveFiles.length,\n\truntimeStylesheetsOutsideActiveStack: runtimeStylesheetsOutsideActiveStack.length,\n\torphanStylesheets: orphanStylesheets.length,",
              ),
              (
                  "if (orphanStylesheets.length) fatal.push(`found ${orphanStylesheets.length} unreferenced stylesheet(s)`);",
                  "if (runtimeStylesheetsOutsideActiveStack.length) fatal.push(`found ${runtimeStylesheetsOutsideActiveStack.length} runtime stylesheet(s) omitted from ACTIVE_STACK: ${runtimeStylesheetsOutsideActiveStack.join(', ')}`);\nif (orphanStylesheets.length) fatal.push(`found ${orphanStylesheets.length} unreferenced stylesheet(s)`);",
              ),
          ]
          for old, new in replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'audit patch anchor count={source.count(old)}: {old[:80]!r}')
              source = source.replace(old, new)
          audit.write_text(source)

          blackout = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-hero-blackout.css')
          source = blackout.read_text()
          css_replacements = [
              ('  display: none !important;', '  display: none;'),
              ('/* Still-only media rails: full black field (no empty photo hole). */', '/* Media rails retain a stable black stage when still imagery is hidden. */'),
              ('):not(:has(video)) {', ') {'),
          ]
          for old, new in css_replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'blackout patch anchor count={source.count(old)}: {old!r}')
              source = source.replace(old, new)
          if '!important' in source or ':has(' in source:
              raise SystemExit('blackout still contains forbidden architecture')
          blackout.write_text(source)

          workflow = Path('.github/workflows/css-gate.yml')
          source = workflow.read_text()
          workflow_replacements = [
              ('            nvx-medical-review.css\n          )', '            nvx-medical-review.css\n            nvx-posts.css\n            nvx-hero-blackout.css\n          )'),
              ('          ACTIVE=(\n            "$THEME/assets/css/nvx-tokens.css"', '          ACTIVE=(\n            "$THEME/assets/css/nvx-fonts.css"\n            "$THEME/assets/css/nvx-tokens.css"'),
              ('            "$THEME/assets/css/nvx-brand-home.css"\n          )', '            "$THEME/assets/css/nvx-brand-home.css"\n            "$THEME/assets/css/nvx-mobile-hero-hierarchy.css"\n            "$THEME/assets/css/nvx-medical-review.css"\n            "$THEME/assets/css/nvx-posts.css"\n            "$THEME/assets/css/nvx-hero-blackout.css"\n          )'),
              ('      - name: Parse active CSS\n', '      - name: Run canonical CSS system audit\n        run: node scripts/design-system/audit-css.mjs\n\n      - name: Parse active CSS\n'),
              ('            -o /tmp/nuvanx-canonical.css \\\n            "$CSS/nvx-tokens.css"', '            -o /tmp/nuvanx-canonical.css \\\n            "$CSS/nvx-fonts.css" \\\n            "$CSS/nvx-tokens.css"'),
              ('            "$CSS/nvx-medical-review.css"\n          test -s', '            "$CSS/nvx-medical-review.css" \\\n            "$CSS/nvx-posts.css" \\\n            "$CSS/nvx-hero-blackout.css"\n          test -s'),
          ]
          for old, new in workflow_replacements:
              if source.count(old) != 1:
                  raise SystemExit(f'workflow patch anchor count={source.count(old)}: {old[:80]!r}')
              source = source.replace(old, new)
          workflow.write_text(source)
          PY

      - name: Validate patched sources
        run: |
          set -euo pipefail
          node --check scripts/design-system/audit-css.mjs
          ruby -e "require 'yaml'; YAML.load_file('.github/workflows/css-gate.yml'); puts 'yaml ok'"
          grep -Fq "'nvx-hero-blackout.css'" scripts/design-system/audit-css.mjs
          grep -Fq 'runtimeStylesheetsOutsideActiveStack' scripts/design-system/audit-css.mjs
          ! grep -Fq '!important' wp-content/themes/nuvanx-medical/assets/css/nvx-hero-blackout.css
          ! grep -Fq ':has(' wp-content/themes/nuvanx-medical/assets/css/nvx-hero-blackout.css
          grep -Fq 'Run canonical CSS system audit' .github/workflows/css-gate.yml

      - name: Commit deterministic patch and remove helper
        run: |
          set -euo pipefail
          rm .github/workflows/css-audit-source-snapshot-temporary.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/design-system/audit-css.mjs \
            .github/workflows/css-gate.yml \
            wp-content/themes/nuvanx-medical/assets/css/nvx-hero-blackout.css \
            .github/workflows/css-audit-source-snapshot-temporary.yml
          git commit -m 'fix(css): align runtime and audited stylesheet stacks'
          git push origin HEAD:fix/css-runtime-stack-parity
