name: Sonar Security Hotfix Generator

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/sonar-security-hotfix-generator.yml'

permissions:
  contents: write

concurrency:
  group: sonar-security-hotfix-generator
  cancel-in-progress: false

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out master
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Apply narrow security corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              content = target.read_text(encoding='utf-8')
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}')
              target.write_text(content.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'scripts/staging2/capture-visual-qa-browser.mjs',
              "import os from 'node:os';\n",
              "import os from 'node:os';\nimport { randomInt } from 'node:crypto';\n",
          )
          replace_once(
              'scripts/staging2/capture-visual-qa-browser.mjs',
              'const port = 9300 + Math.floor(Math.random() * 500);',
              'const port = randomInt(9300, 9800);',
          )
          replace_once(
              'scripts/staging2/test-deploy-workflow-contract.mjs',
              "const result = spawnSync('php', ['-l', file(relative)], { encoding: 'utf8', env: { ...process.env, PATH: '/usr/bin:/bin:/usr/sbin:/sbin' } });",
              "const result = spawnSync('/usr/bin/php', ['-l', file(relative)], { encoding: 'utf8' });",
          )
          replace_once(
              'scripts/staging2/verify-rendered-acceptance-ssh.mjs',
              "const result = spawnSync('ssh', [sshHost, 'bash', '-s', '--', url, redirectMode], {",
              "const result = spawnSync('/usr/bin/ssh', [sshHost, 'bash', '-s', '--', url, redirectMode], {",
          )
          replace_once(
              'wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php',
              "array( 'https://www.nuvanx.com', 'https://nuvanx.com', 'http://www.nuvanx.com', 'http://nuvanx.com' ),",
              "array( 'https://www.nuvanx.com', 'https://nuvanx.com' ),",
          )
          PY

      - name: Validate corrected files
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/staging2/capture-visual-qa-browser.mjs
          node --check scripts/staging2/test-deploy-workflow-contract.mjs
          node --check scripts/staging2/verify-rendered-acceptance-ssh.mjs
          /usr/bin/php -l wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php
          node scripts/staging2/test-deploy-workflow-contract.mjs
          git diff --check
          ! grep -Fq 'Math.random()' scripts/staging2/capture-visual-qa-browser.mjs
          ! grep -Fq "PATH: '/usr/bin:/bin:/usr/sbin:/sbin'" scripts/staging2/test-deploy-workflow-contract.mjs
          ! grep -Fq "spawnSync('ssh'" scripts/staging2/verify-rendered-acceptance-ssh.mjs
          ! grep -Fq "'http://www.nuvanx.com'" wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php
          ! grep -Fq "'http://nuvanx.com'" wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php

      - name: Publish clean hotfix branch
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: fix/sonar-security-hotspots-20260723
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/sonar-security-hotfix-generator.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C "$TARGET_BRANCH"
          git add scripts/staging2/capture-visual-qa-browser.mjs \
            scripts/staging2/test-deploy-workflow-contract.mjs \
            scripts/staging2/verify-rendered-acceptance-ssh.mjs \
            wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php \
            .github/workflows/sonar-security-hotfix-generator.yml
          git commit -m 'fix(security): resolve Sonar hotspots in staging2 tooling'
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${TARGET_BRANCH}"
