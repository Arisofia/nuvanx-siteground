name: Visual System Gate

on:
  pull_request:
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - 'wp-content/themes/nuvanx-medical/assets/images/**'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-staging2-canonical-closure.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-dr-rivera-page.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'wp-content/themes/nuvanx-medical/templates/template-contact.php'
      - 'wp-content/themes/nuvanx-medical/template-parts/content/nvx-page-shell.php'
      - 'scripts/design-system/**'
      - 'scripts/staging2/test-runtime-qa-closure-contract.mjs'
      - 'docs/design-system/**'
      - 'docs/NUVANX-DESIGN-SYSTEM.md'
      - 'qa/design-system/**'
      - '.github/workflows/visual-system-gate.yml'
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/assets/css/**'
      - 'wp-content/themes/nuvanx-medical/assets/images/**'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-staging2-canonical-closure.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-dr-rivera-page.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'wp-content/themes/nuvanx-medical/templates/template-contact.php'
      - 'wp-content/themes/nuvanx-medical/template-parts/content/nvx-page-shell.php'
      - 'scripts/design-system/**'
      - 'scripts/staging2/test-runtime-qa-closure-contract.mjs'
      - '.github/workflows/visual-system-gate.yml'

permissions:
  contents: read

jobs:
  visual-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          show-progress: false
          persist-credentials: false

      - name: Validate canonical visual contract
        run: node scripts/design-system/test-visual-system-contract.mjs

      - name: Validate external widget and typography closure
        run: node scripts/design-system/test-external-visual-closure.mjs

      - name: Validate rendered runtime closure
        run: node scripts/staging2/test-runtime-qa-closure-contract.mjs

      - name: Audit runtime typography, colors, icons and numbering
        run: node scripts/design-system/audit-visual-system.mjs

      - name: Verify generated visual audit is clean
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('qa/design-system/visual-system-summary.json', 'utf8'));
          const collections = [
            'activeRetiredColorFindings',
            'bannedFontFindings',
            'literalFontFindings',
            'forbiddenFontRequests',
            'typographyTokenMismatches',
            'parallelFontVariables',
            'survivingRetiredAssets',
            'missingIconClasses',
            'missingTokens',
          ];
          const dirty = collections.filter((key) => Array.isArray(summary[key]) && summary[key].length > 0);
          if (dirty.length) {
            console.error(`Dirty visual audit collections: ${dirty.join(', ')}`);
            process.exit(1);
          }
          console.log('PASS: generated visual-system-summary.json is clean');
          NODE

      - name: Run existing CSS audit
        run: node scripts/design-system/audit-css.mjs

      - name: Lint CSS rules against !important exceptions (Stylelint)
        run: npx stylelint "wp-content/themes/nuvanx-medical/assets/css/**/*.css" --config .stylelintrc.json

      - name: Validate PHP syntax
        run: |
          php -l wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-external-visual-closure.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-staging2-canonical-closure.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-dr-rivera-page.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-integrations.php
          php -l wp-content/themes/nuvanx-medical/templates/template-contact.php
          php -l wp-content/themes/nuvanx-medical/template-parts/content/nvx-page-shell.php

      - name: Upload visual audit
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-system-audit
          path: |
            qa/design-system/visual-system-summary.json
            qa/design-system/audit-summary.json
            qa/design-system/active-css-exceptions.json
          if-no-files-found: error
          retention-days: 7
