name: Apply canonical button patches

on:
  pull_request:
    branches:
      - master
    paths:
      - '.button-patches/*.patch'
      - '.github/workflows/apply-button-patches.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-canonical-button-patches-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: refactor/canonical-button-system-20260718
          fetch-depth: 0

      - name: Assemble and verify patches
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t patches < <(find .button-patches -maxdepth 1 -type f -name '*.patch' -print | LC_ALL=C sort)
          test "${#patches[@]}" = '3'
          printf '%s\n' "${patches[@]}"
          cat "${patches[@]}" > /tmp/button-system.patch
          test "$(wc -c < /tmp/button-system.patch | tr -d ' ')" = '21199'
          printf '%s  %s\n' '1d037d000db4ad3db3c6e8db890178c0d2eb161e4811b2f0c2984971e5c9b6f3' '/tmp/button-system.patch' | sha256sum --check --strict
          git apply --check --verbose /tmp/button-system.patch

      - name: Apply and validate canonical system
        shell: bash
        run: |
          set -euo pipefail
          git apply --verbose /tmp/button-system.patch
          test -z "$(find . -type f \( -name '*.orig' -o -name '*.rej' \) -print -quit)"
          node scripts/design-system/audit-buttons.mjs
          node scripts/design-system/audit-css.mjs
          find wp-content/themes/nuvanx-medical -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Commit implementation files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .button-patches
          git restore --worktree --staged qa/design-system/active-css-exceptions.json qa/design-system/audit-summary.json
          git config user.name 'Nuvanx Engineering'
          git config user.email 'engineering@nuvanx.com'
          git add -A .button-patches
          git add \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-components.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-footer.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-mobile-hero-hierarchy.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-patterns-editorial.css \
            wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-medicine-page.php \
            wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php
          git commit -m 'refactor(buttons): enforce one canonical CTA system'
          git push origin HEAD:refactor/canonical-button-system-20260718
