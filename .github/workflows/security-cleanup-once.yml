name: Security Cleanup Once

on:
  push:
    branches:
      - security/incident-2026-07-15

permissions:
  contents: write

jobs:
  cleanup-tracked-ignored-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout security branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: security/incident-2026-07-15
          fetch-depth: 0

      - name: Remove files that are tracked but now ignored
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git ls-files -ci --exclude-standard -z > /tmp/tracked-ignored.zlist
          if [[ -s /tmp/tracked-ignored.zlist ]]; then
            xargs -0 git rm -r --cached --ignore-unmatch < /tmp/tracked-ignored.zlist
          fi

          git rm --cached --ignore-unmatch .github/workflows/security-cleanup-once.yml

          if git diff --cached --quiet; then
            echo 'No tracked ignored files remain.'
            exit 0
          fi

          git commit -m 'security: remove tracked runtime, backup and generated artifacts [skip ci]'
          git push origin HEAD:security/incident-2026-07-15
