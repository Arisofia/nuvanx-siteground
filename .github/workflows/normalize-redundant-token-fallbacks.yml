name: Normalize Redundant Token Fallbacks

on:
  push:
    branches:
      - fix/remove-literal-colors-20260717
    paths:
      - 'scripts/design-system/normalize-redundant-token-fallbacks.mjs'
      - '.github/workflows/normalize-redundant-token-fallbacks.yml'

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Normalize redundant fallbacks
        run: node scripts/design-system/normalize-redundant-token-fallbacks.mjs
      - name: Validate CSS system
        run: node scripts/design-system/audit-css.mjs
      - name: Commit normalized CSS
        run: |
          if git diff --quiet; then
            echo 'No normalization changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/assets/css qa/design-system
          git commit -m 'fix(css): simplify redundant token fallbacks'
          git push origin HEAD:${{ github.ref_name }}
