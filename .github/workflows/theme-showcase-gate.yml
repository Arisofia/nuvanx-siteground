name: Theme Showcase Gate

concurrency:
  group: theme-showcase-gate-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - '.agents/skills/nuvanx-theme-factory/**'
      - 'docs/design-system/theme-showcase.html'
      - 'docs/design-system/theme-showcase.pdf'
      - 'scripts/design-system/generate-showcase-pdf.mjs'
      - '.github/workflows/theme-showcase-gate.yml'
  push:
    branches:
      - master
    paths:
      - '.agents/skills/nuvanx-theme-factory/**'
      - 'docs/design-system/theme-showcase.html'
      - 'docs/design-system/theme-showcase.pdf'
      - 'scripts/design-system/generate-showcase-pdf.mjs'
      - '.github/workflows/theme-showcase-gate.yml'

permissions:
  contents: read

jobs:
  showcase:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install temporary PDF dependency
        run: npm install puppeteer@22.12.1 --no-save

      - name: Generate showcase PDF
        run: node scripts/design-system/generate-showcase-pdf.mjs --output /tmp/theme-showcase.pdf

      - name: Upload generated showcase
        uses: actions/upload-artifact@v4
        with:
          name: theme-showcase-generated
          path: /tmp/theme-showcase.pdf
          if-no-files-found: error
          retention-days: 7

      - name: Install PDF inspection tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils

      - name: Validate generated and committed PDFs
        run: |
          for pdf in /tmp/theme-showcase.pdf docs/design-system/theme-showcase.pdf; do
            test -s "$pdf"
            test "$(pdfinfo "$pdf" | awk '/^Pages:/ {print $2}')" = "6"
            txt="/tmp/$(basename "$pdf").txt"
            pdftotext "$pdf" "$txt"
            grep -qi "Theme Factory" "$txt"
            grep -qi "Acento Zafiro" "$txt"
            grep -qi "Oro Editorial" "$txt"
            grep -qi "No modifica el sistema visual web de producción" "$txt"
          done

      - name: Run canonical visual audits
        run: |
          node scripts/design-system/audit-css.mjs
          node scripts/design-system/test-external-visual-closure.mjs

      - name: Confirm runtime theme was not changed
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD -- wp-content/themes/nuvanx-medical | grep -q .; then
            echo "Theme Factory PR must not modify WordPress runtime files."
            exit 1
          fi
          echo "PASS: no WordPress runtime files changed"
