name: Apply Editorial Coherence Once

on:
  pull_request:
    branches:
      - master
    types: [synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: editorial-team-qa-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  extend-team-qa:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
          fetch-depth: 0

      - name: Add permanent Equipo visual contract
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('scripts/staging2/capture-visual-qa.mjs')
          text = path.read_text(encoding='utf-8')

          page_anchor = "  ['/inversion-medicina-estetica/', 'El presupuesto forma parte de una decisión informada.'],\n"
          team_page = "  ['/equipo-medico/', 'Equipo médico NUVANX: quién te valora y quién trata'],\n"
          if team_page not in text:
              if page_anchor not in text:
                  raise SystemExit('visual QA page anchor not found')
              text = text.replace(page_anchor, page_anchor + team_page, 1)

          function_anchor = "async function auditSingleViewport(port, pagePath, expectedH1, viewport) {\n"
          team_function = r'''async function auditEquipoEditorial(session, viewport, scope, result) {
            const state = await session.evaluate(String.raw`(() => {
              const columnCount = (selector) => {
                const node = document.querySelector(selector);
                if (!node) return 0;
                const value = getComputedStyle(node).gridTemplateColumns.trim();
                return value && value !== 'none' ? value.split(/\s+/).length : 0;
              };
              const allClasses = Array.from(document.querySelectorAll('[class]'))
                .flatMap((node) => Array.from(node.classList));
              const crossed = allClasses.filter((name) =>
                /^nvx-endolift-(?:section|kicker|heading|body|diagnosis|panel|editorial|hero)/.test(name) ||
                /^nvx-endolaser-zone/.test(name)
              );
              return {
                stylesheet: Array.from(document.querySelectorAll('link[rel="stylesheet"]'))
                  .some((node) => /nvx-editorial-coherence\.css/.test(node.href)),
                editorialSections: document.querySelectorAll('.nvx-editorial-section').length,
                gridLists: document.querySelectorAll('.nvx-editorial-grid-list').length,
                factLists: document.querySelectorAll('.nvx-editorial-fact-list').length,
                profiles: document.querySelectorAll('.nvx-equipo-profile-layout').length,
                gridListColumns: columnCount('.nvx-editorial-grid-list'),
                factListColumns: columnCount('.nvx-editorial-fact-list'),
                profileColumns: columnCount('.nvx-equipo-profile-layout'),
                crossed: [...new Set(crossed)],
              };
            })()`);
            result.equipo_editorial = state;
            if (!state.stylesheet) fail(scope, 'editorial coherence stylesheet is not loaded');
            if (state.crossed.length) fail(scope, `crossed treatment classes remain in DOM: ${state.crossed.join(', ')}`);
            if (state.editorialSections < 6) fail(scope, `expected at least 6 editorial sections, found ${state.editorialSections}`);
            if (!state.gridLists || !state.factLists || !state.profiles) fail(scope, 'missing editorial grid, fact list or profile layout');
            const expectedColumns = viewport.mobile ? 1 : 2;
            for (const [name, count] of [
              ['editorial grid list', state.gridListColumns],
              ['editorial fact list', state.factListColumns],
              ['medical profile', state.profileColumns],
            ]) {
              if (count !== expectedColumns) fail(scope, `${name} has ${count} columns; expected ${expectedColumns}`);
            }
          }

          '''
          if 'async function auditEquipoEditorial(' not in text:
              if function_anchor not in text:
                  raise SystemExit('auditSingleViewport anchor not found')
              text = text.replace(function_anchor, team_function + function_anchor, 1)

          audit_anchor = "    if (!result.footerVisible) fail(scope, 'footer is not visible');\n\n"
          team_call = "    if (pagePath === '/equipo-medico/') await auditEquipoEditorial(session, viewport, scope, result);\n\n"
          if team_call not in text:
              if audit_anchor not in text:
                  raise SystemExit('visual viewport assertion anchor not found')
              text = text.replace(audit_anchor, audit_anchor + team_call, 1)

          path.write_text(text, encoding='utf-8', newline='\n')
          PY
          node --check scripts/staging2/capture-visual-qa.mjs
          git diff --check

      - name: Commit clean QA extension
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-editorial-coherence-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test(qa): enforce equipo editorial grids and token boundaries'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${HEAD_REF}"
