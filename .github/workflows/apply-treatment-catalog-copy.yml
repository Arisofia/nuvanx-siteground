name: Apply Treatment Catalog Copy

on:
  push:
    branches:
      - fix/catalog-local-metadata-copy-20260717
    paths:
      - scripts/clinical/normalize-treatment-catalog.mjs
      - .github/workflows/apply-treatment-catalog-copy.yml
  pull_request:
    branches:
      - master
    paths:
      - scripts/clinical/normalize-treatment-catalog.mjs
      - .github/workflows/apply-treatment-catalog-copy.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout PR head branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Normalize treatment catalog copy
        run: node scripts/clinical/normalize-treatment-catalog.mjs

      - name: Validate PHP
        run: php -l wp-content/themes/nuvanx-medical/inc/nvx-treatments-catalog.php

      - name: Commit normalized source
        run: |
          set -euo pipefail
          if git diff --quiet -- wp-content/themes/nuvanx-medical/inc/nvx-treatments-catalog.php; then
            echo 'Treatment catalog copy is already canonical.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/inc/nvx-treatments-catalog.php
          git commit -m 'refactor(catalog): normalize BTL treatment copy'
          git push origin HEAD:${TARGET_BRANCH}
