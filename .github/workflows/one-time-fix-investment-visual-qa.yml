name: One-time fix investment visual QA

on:
  push:
    branches:
      - fix/editorial-home-cases-final-20260722
    paths:
      - '.github/workflows/one-time-fix-investment-visual-qa.yml'

permissions:
  contents: write

jobs:
  patch-and-remove:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: fix/editorial-home-cases-final-20260722
          fetch-depth: 0
          persist-credentials: false

      - name: Correct institutional injection assertion
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('scripts/staging2/capture-visual-qa.mjs')
          text = path.read_text(encoding='utf-8')
          old = """    if (['/nosotros/', '/equipo-medico/', '/contacto/', '/por-que-nuvanx/', '/inversion-medicina-estetica/'].includes(pagePath)) {
              const hasTreatmentInjection = await session.evaluate(`(() => {
                 return !!document.querySelector('.nvx-endolift-process, .nvx-endolift-effects, .nvx-endolaser-zone, .nvx-editorial-effects, .nvx-editorial-price-table-wrap');
              })()`);
              if (hasTreatmentInjection) fail(scope, `institutional page incorrectly received treatment block injections`);
            }
          """
          new = """    if (['/nosotros/', '/equipo-medico/', '/contacto/', '/por-que-nuvanx/', '/inversion-medicina-estetica/'].includes(pagePath)) {
              const treatmentSelector = pagePath === '/inversion-medicina-estetica/'
                ? '.nvx-endolift-process, .nvx-endolift-effects, .nvx-endolaser-zone, .nvx-editorial-effects'
                : '.nvx-endolift-process, .nvx-endolift-effects, .nvx-endolaser-zone, .nvx-editorial-effects, .nvx-editorial-price-table-wrap';
              const hasTreatmentInjection = await session.call((selector) => !!document.querySelector(selector), treatmentSelector);
              if (hasTreatmentInjection) fail(scope, `institutional page incorrectly received treatment block injections`);
            }
          """
          if text.count(old) != 1:
              raise SystemExit('Expected visual QA assertion was not found exactly once.')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          node --check scripts/staging2/capture-visual-qa.mjs

      - name: Commit patch and remove one-time workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/staging2/capture-visual-qa.mjs
          git rm .github/workflows/one-time-fix-investment-visual-qa.yml
          git commit -m 'test(staging2): allow investment page price table in visual QA'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
