name: History Purge Closure Gate

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  all-refs-closure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete default-branch history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Fetch mutable refs and pull-request heads
        run: |
          set -euo pipefail
          git fetch --force origin \
            '+refs/heads/*:refs/remotes/origin/*' \
            '+refs/tags/*:refs/tags/*'
          git fetch --force origin \
            '+refs/pull/*/head:refs/remotes/pull/*' || true

      - name: Record temporary repository visibility
        env:
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          mkdir -p qa/security/history-closure
          if [[ "${REPOSITORY_PRIVATE}" == 'true' ]]; then
            echo 'repository_private=true' >> qa/security/history-closure/closure-state.txt
            echo 'Repository visibility is private.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'repository_private=false' >> qa/security/history-closure/closure-state.txt
            echo '::warning::Repository is temporarily public for issue #45 remediation execution.'
            echo 'Visibility must return to private before closure; public mode is not release approval.'
            echo 'repository_private=false — temporary remediation mode' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Record incident commit reachability
        run: |
          set -euo pipefail
          incident='81dafb2e74b6bbfffe302979d67fe789c0075509'
          if git cat-file -e "${incident}^{commit}" 2>/dev/null; then
            echo 'incident_commit_reachable=true' >> qa/security/history-closure/closure-state.txt
            echo "::warning::SECURITY NO GO — incident commit remains reachable: $incident"
            echo 'incident_commit_reachable=true' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'incident_commit_reachable=false' >> qa/security/history-closure/closure-state.txt
            echo 'incident_commit_reachable=false' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Record prohibited paths across fetched refs
        run: |
          set -euo pipefail
          objects_file="$(mktemp)"
          trap 'rm -f "$objects_file"' EXIT
          git -c core.quotePath=false rev-list --objects --all > "$objects_file"
          python3 scripts/security/issue-45-build-manifest.py \
            --objects "$objects_file" \
            --manifest qa/security/history-closure/residual-paths.txt \
            --reasons qa/security/history-closure/residual-reasons.tsv
          residual_count="$(wc -l < qa/security/history-closure/residual-paths.txt | tr -d ' ')"
          echo "residual_prohibited_paths=${residual_count}" >> qa/security/history-closure/closure-state.txt
          echo "residual_prohibited_paths=${residual_count}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$residual_count" != '0' ]]; then
            echo "::warning::SECURITY NO GO — ${residual_count} prohibited historical paths remain reachable."
          fi

      - name: Report closure evidence
        if: always()
        run: |
          set -euo pipefail
          {
            printf 'heads=%s\n' "$(git for-each-ref --format='%(refname)' refs/remotes/origin | wc -l)"
            printf 'tags=%s\n' "$(git for-each-ref --format='%(refname)' refs/tags | wc -l)"
            printf 'pull_heads=%s\n' "$(git for-each-ref --format='%(refname)' refs/remotes/pull | wc -l)"
            printf 'reachable_commits=%s\n' "$(git rev-list --count --all)"
          } | tee qa/security/history-closure/ref-counts.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload path-only closure evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: history-purge-closure-evidence
          path: |
            qa/security/history-closure/closure-state.txt
            qa/security/history-closure/ref-counts.txt
            qa/security/history-closure/residual-paths.txt
            qa/security/history-closure/residual-reasons.tsv
          retention-days: 7
          if-no-files-found: error

      - name: Enforce complete incident closure
        if: always()
        run: |
          set -euo pipefail
          state='qa/security/history-closure/closure-state.txt'
          if [[ ! -f "$state" ]]; then
            echo 'ERROR: closure evidence state was not generated.'
            exit 1
          fi

          repository_private="$(awk -F= '$1=="repository_private" {print $2}' "$state" | tail -n1)"
          incident_reachable="$(awk -F= '$1=="incident_commit_reachable" {print $2}' "$state" | tail -n1)"
          residual_paths="$(awk -F= '$1=="residual_prohibited_paths" {print $2}' "$state" | tail -n1)"

          if [[ "$repository_private" != 'true' || "$incident_reachable" != 'false' || "$residual_paths" != '0' ]]; then
            echo 'ERROR: SECURITY NO GO — issue #45 closure criteria are incomplete.'
            echo "repository_private=${repository_private:-unknown}"
            echo "incident_commit_reachable=${incident_reachable:-unknown}"
            echo "residual_prohibited_paths=${residual_paths:-unknown}"
            echo 'The repository may remain public only during remediation execution; return it to private after fresh-clone verification.'
            exit 1
          fi

          echo 'ISSUE45_HISTORY_CLOSURE_VERIFIED=true'
