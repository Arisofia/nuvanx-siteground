name: Deploy theme to staging2 + flush cache

# Auto-deploys when theme/MU code lands on master, and supports manual dispatch.
# After deploy, runs HTTP smoke checks so missing modules are caught immediately.

on:
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/**'
      - 'wp-content/mu-plugins/**'
      - 'scripts/staging2/**'
      - '.github/workflows/deploy-theme-staging2.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: true
        default: master
      skip_smoke:
        description: Skip post-deploy smoke verify (true/false)
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: deploy-staging2
  cancel-in-progress: false

env:
  STAGING_BASE_URL: https://staging2.nuvanx.com
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html
  THEME_REL: wp-content/themes/nuvanx-medical

jobs:
  deploy-and-flush:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      deployed_ref: ${{ steps.meta.outputs.deployed_ref }}
      deployed_sha: ${{ steps.identity.outputs.deployed_sha }}
    steps:
      - name: Resolve deploy ref
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            REF='${{ inputs.ref }}'
          else
            REF='${{ github.sha }}'
          fi
          echo "deployed_ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "Deploying ref: ${REF}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.meta.outputs.deployed_ref }}
          fetch-depth: 1

      - name: Resolve immutable deploy SHA
        id: identity
        run: |
          set -euo pipefail
          SHA="$(git rev-parse HEAD)"
          [[ "$SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "ERROR: invalid checkout SHA: $SHA" >&2; exit 1; }
          printf '%s\n' "$SHA" > "${{ env.THEME_REL }}/.nvx-deploy-sha"
          grep -Fxq "$SHA" "${{ env.THEME_REL }}/.nvx-deploy-sha"
          echo "deployed_sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Immutable deploy SHA: $SHA"

      - name: Validate secrets and canonical source
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in SSH_KEY SSH_USER SSH_HOST SSH_PORT KNOWN_HOSTS; do
            [[ -n "${!name:-}" ]] || { echo "ERROR: secret $name empty"; exit 1; }
          done
          for css_file in \
            nvx-fonts.css \
            nvx-tokens.css \
            nvx-base.css \
            nvx-site-layout.css \
            nvx-components.css \
            nvx-patterns-editorial.css \
            nvx-header.css \
            nvx-footer.css; do
            test -f "${{ env.THEME_REL }}/assets/css/$css_file" || { echo "ERROR: missing canonical CSS $css_file"; exit 1; }
          done
          grep -Fq -- '--nvx-light: #fcfbf8;' "${{ env.THEME_REL }}/assets/css/nvx-tokens.css"
          grep -Fq -- '--nvx-surface-base: #f8f7f4;' "${{ env.THEME_REL }}/assets/css/nvx-tokens.css"
          grep -Fq -- '--nvx-accent-muted: #756f69;' "${{ env.THEME_REL }}/assets/css/nvx-tokens.css"
          grep -Fq 'nvx-site-layout.css' "${{ env.THEME_REL }}/functions.php"
          grep -Fq 'nvx-patterns-editorial.css' "${{ env.THEME_REL }}/functions.php"
          test -f "${{ env.THEME_REL }}/inc/nvx-structured-data.php"
          php -l "${{ env.THEME_REL }}/inc/nvx-structured-data.php"
          php -l "${{ env.THEME_REL }}/inc/nvx-integrations.php"
          php -l "${{ env.THEME_REL }}/inc/nvx-environment-flags.php"
          node --check scripts/seo/verify-p0-deployment.mjs
          test -f "${{ env.THEME_REL }}/.nvx-deploy-sha"
          grep -Fxq "${{ steps.identity.outputs.deployed_sha }}" "${{ env.THEME_REL }}/.nvx-deploy-sha"
          find "${{ env.THEME_REL }}" -type f -name '*.php' -print0 | xargs -0 -n1 php -l
          for f in nvx-content-presentation.php nvx-treatments-catalog.php nvx-endolift-page.php nvx-laser-medicine-page.php nvx-clinics-hub.php; do
            test -f "${{ env.THEME_REL }}/inc/$f" || { echo "ERROR: missing inc/$f"; exit 1; }
            grep -q "require_once get_template_directory() . '/inc/$f'" "${{ env.THEME_REL }}/functions.php" \
              || { echo "ERROR: $f not required in functions.php"; exit 1; }
          done
          if [[ -f "${{ env.THEME_REL }}/inc/nvx-aesthetic-medicine-page.php" ]]; then
            php -l "${{ env.THEME_REL }}/inc/nvx-aesthetic-medicine-page.php"
            grep -q "nvx-aesthetic-medicine-page.php" "${{ env.THEME_REL }}/functions.php" \
              || { echo "ERROR: aesthetic page file present but not required"; exit 1; }
          fi
          grep -q "wpseo_schema_graph" "${{ env.THEME_REL }}/inc/nvx-structured-data.php"
          test -x scripts/staging2/smoke-verify-staging2.sh || chmod +x scripts/staging2/smoke-verify-staging2.sh

      - name: Configure SSH agent and known hosts
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      - run: mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.STAGING_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts && chmod 600 ~/.ssh/known_hosts

      - name: Rsync theme
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          rsync -az --delete -e "ssh -p $SSH_PORT" \
            --exclude '.git' --exclude 'php_errorlog' --exclude '*.log' \
            "${{ env.THEME_REL }}/" \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/${{ env.THEME_REL }}/"

      - name: Rsync MU plugins (forms)
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          rsync -az -e "ssh -p $SSH_PORT" \
            wp-content/mu-plugins/nuvanx-valoracion-native-hubspot-form.php \
            wp-content/mu-plugins/nuvanx-contacto-hubspot-form.php \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/wp-content/mu-plugins/"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "rm -f '${{ env.STAGING_PATH }}/wp-content/mu-plugins/zzzzzzzzzzzz-nuvanx-valoracion-native-hubspot-form.php' \
                    '${{ env.STAGING_PATH }}/wp-content/mu-plugins/zzzzzzzzzzzz-nuvanx-contacto-hubspot-form.php' \
                    '${{ env.STAGING_PATH }}/wp-content/mu-plugins/z-nuvanx-valoracion-native-hubspot-form.php' \
                    '${{ env.STAGING_PATH }}/wp-content/mu-plugins/z-nuvanx-contacto-hubspot-form.php'"

      - name: Verify staging theme files and flush caches
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          EXPECTED_SHA: ${{ steps.identity.outputs.deployed_sha }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "EXPECTED_SHA='$EXPECTED_SHA' bash -e -s" <<'REMOTE'
            set -euo pipefail
            ROOT='/home/customer/www/staging2.nuvanx.com/public_html'
            THEME="$ROOT/wp-content/themes/nuvanx-medical"
            CSS="$THEME/assets/css"
            cd "$ROOT"
            rm -f wp-content/mu-plugins/zzzzzzzzzzzz-nuvanx-valoracion-native-hubspot-form.php \
                  wp-content/mu-plugins/zzzzzzzzzzzz-nuvanx-contacto-hubspot-form.php \
                  wp-content/mu-plugins/z-nuvanx-valoracion-native-hubspot-form.php \
                  wp-content/mu-plugins/z-nuvanx-contacto-hubspot-form.php
            [[ "$(wp option get siteurl)" == 'https://staging2.nuvanx.com' ]]
            [[ "$(wp option get home)" == 'https://staging2.nuvanx.com' ]]
            [[ "$(wp theme list --status=active --field=name)" == 'nuvanx-medical' ]]
            test -f "$THEME/.nvx-deploy-sha"
            deployed_sha="$(tr -d '\r\n' < "$THEME/.nvx-deploy-sha")"
            [[ "$deployed_sha" == "$EXPECTED_SHA" ]] || { echo "ERROR: remote SHA $deployed_sha != expected $EXPECTED_SHA" >&2; exit 1; }
            echo "DEPLOY_SHA_OK $deployed_sha"
            for css_file in \
              nvx-fonts.css \
              nvx-tokens.css \
              nvx-base.css \
              nvx-site-layout.css \
              nvx-components.css \
              nvx-patterns-editorial.css \
              nvx-header.css \
              nvx-footer.css \
              nvx-posts.css; do
              test -f "$CSS/$css_file" || { echo "ERROR: remote missing canonical CSS $css_file"; exit 1; }
            done
            test -f "$THEME/inc/nvx-blog-system.php" || { echo "ERROR: remote missing nvx-blog-system.php"; exit 1; }
            test -f "$THEME/archive.php" || { echo "ERROR: remote missing archive.php"; exit 1; }
            test -f "$THEME/search.php" || { echo "ERROR: remote missing search.php"; exit 1; }
            test -f "$THEME/template-parts/content/nvx-blog-single.php" || { echo "ERROR: remote missing nvx-blog-single.php"; exit 1; }
            grep -Fq "require_once __DIR__ . '/nvx-blog-system.php'" \
              "$THEME/inc/nvx-integrations.php" \
              || { echo "ERROR: nvx-blog-system not required from integrations (expected: require_once __DIR__ . '/nvx-blog-system.php')"; exit 1; }
            grep -Fq -- '--nvx-light: #fcfbf8;' "$CSS/nvx-tokens.css"
            grep -Fq -- '--nvx-surface-base: #f8f7f4;' "$CSS/nvx-tokens.css"
            grep -Fq -- '--nvx-accent-muted: #756f69;' "$CSS/nvx-tokens.css"
            grep -Fq 'nvx-site-layout.css' "$THEME/functions.php"
            grep -Fq 'nvx-patterns-editorial.css' "$THEME/functions.php"
            for f in nvx-content-presentation.php nvx-treatments-catalog.php nvx-endolift-page.php nvx-laser-medicine-page.php nvx-clinics-hub.php; do
              test -f "$THEME/inc/$f" || { echo "ERROR: remote missing $f"; exit 1; }
              php -l "$THEME/inc/$f"
            done
            if [[ -f "$THEME/inc/nvx-aesthetic-medicine-page.php" ]]; then
              php -l "$THEME/inc/nvx-aesthetic-medicine-page.php"
            fi
            php -l "$THEME/inc/nvx-structured-data.php"
            php -l "$THEME/inc/nvx-integrations.php"
            if ! command -v wp >/dev/null 2>&1; then
              echo "ERROR: wp (WP-CLI) not found on PATH" >&2
              exit 1
            fi
            if ! wp core is-installed --quiet 2>/dev/null; then
              echo "ERROR: WP-CLI cannot bootstrap WordPress (core is-installed failed)" >&2
              exit 1
            fi
            wp eval '
              if ( ! function_exists( "nvx_schema_clinics" ) || ! function_exists( "nvx_schema_page_registry" ) || ! has_filter( "wpseo_schema_graph", "nvx_extend_yoast_schema_graph" ) ) {
                fwrite( STDERR, "SCHEMA_HOOK_MISSING\n" );
                exit( 1 );
              }
              $registry = nvx_schema_page_registry();
              $required = array(
                array( "clinics", "chamberi", 1543 ),
                array( "clinics", "goya", 1537 ),
                array( "clinic_hub", null, 1399 ),
                array( "treatments", "endolift_facial", 1241 ),
                array( "treatments", "exion_btl", 2906 ),
              );
              foreach ( $required as $row ) {
                list( $group, $key, $id ) = $row;
                $entry = null === $key ? ( $registry[ $group ] ?? null ) : ( $registry[ $group ][ $key ] ?? null );
                if ( ! is_array( $entry ) || (int) ( $entry["id"] ?? 0 ) !== (int) $id || empty( $entry["path"] ) ) {
                  fwrite( STDERR, "SCHEMA_REGISTRY_MISMATCH\n" );
                  exit( 1 );
                }
              }
              $clinics = nvx_schema_clinics();
              if (
                ( $clinics["chamberi"]["identifier"]["value"] ?? "" ) !== "CS20144"
                || ( $clinics["goya"]["identifier"]["value"] ?? "" ) !== "CS20073"
                || ( $clinics["chamberi"]["telephone"] ?? "" ) !== "+34669319836"
                || ( $clinics["goya"]["telephone"] ?? "" ) !== "+34647505107"
              ) {
                fwrite( STDERR, "SCHEMA_ENTITY_MISMATCH\n" );
                exit( 1 );
              }
              echo "SCHEMA_ENTITY_OK\n";
              $need = array(
                "nvx_content_presentation_enhance",
                "nvx_content_restructure_treatments_index",
                "nvx_content_restructure_endolift_page",
                "nvx_content_restructure_laser_medicine_page",
                "nvx_clinics_hub_enhance",
                "nvx_clinics_normalize_layout",
              );
              foreach ( $need as $fn ) {
                if ( ! function_exists( $fn ) ) {
                  fwrite( STDERR, "FILTER_FN_MISSING:$fn\n" );
                  exit( 1 );
                }
              }
              if ( function_exists( "nvx_content_restructure_aesthetic_medicine_page" ) ) {
                echo "AESTHETIC_MODULE_OK\n";
              } else {
                echo "AESTHETIC_MODULE_ABSENT\n";
              }
              if ( function_exists( "nvx_home_action_banner_markup" ) ) {
                echo "HOME_BANNER_FN_OK\n";
              } else {
                echo "HOME_BANNER_FN_ABSENT\n";
              }
              echo "CLINICS_LAYOUT_FN_OK\n";
            '
            # Staging must expose the repository CSS directly. SiteGround's CSS
            # minifier otherwise regenerates stale sibling *.min.css files and
            # hides whether the canonical token palette is actually deployed.
            wp sg optimize css disable || true
            wp sg optimize combine-css disable || true
            wp sg optimize combine-js disable || true
            find "$CSS" -maxdepth 1 -type f -name 'nvx-*.min.css' -delete
            wp cache flush || true
            wp sg purge || true
            rm -rf wp-content/uploads/siteground-optimizer-assets/siteground-optimizer-combined-* 2>/dev/null || true
            rm -rf wp-content/cache/sgo-cache/* 2>/dev/null || true
            rm -rf wp-content/cache/* 2>/dev/null || true
            wp eval 'if (function_exists("opcache_reset")) { opcache_reset(); echo "opcache=ok\n"; }' || true
            echo DEPLOY_FLUSH_OK
          REMOTE

  smoke-verify:
    needs: deploy-and-flush
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_smoke != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.deploy-and-flush.outputs.deployed_sha }}
          fetch-depth: 1

      - name: Install pinned Chromium verification runtime
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock @playwright/test@1.55.0
          npx playwright install --with-deps chromium

      - name: Wait for CDN / cache edge
        run: sleep 15

      - name: Exact P0 deployment identity (staging2)
        env:
          BASE_URL: ${{ env.STAGING_BASE_URL }}
          EXPECT_NOINDEX: 'true'
          CANONICAL_HOST: nuvanx.com
          EXPECTED_DEPLOY_SHA: ${{ needs.deploy-and-flush.outputs.deployed_sha }}
          BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
          BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
          VERIFY_RETRIES: '8'
        run: node scripts/seo/verify-p0-deployment.mjs

      - name: HTTP smoke verify staging2 pages
        env:
          BASE_URL: ${{ env.STAGING_BASE_URL }}
          SMOKE_RETRIES: '8'
          SMOKE_RETRY_SLEEP: '6'
        run: |
          set -euo pipefail
          chmod +x scripts/staging2/smoke-verify-staging2.sh
          bash scripts/staging2/smoke-verify-staging2.sh
