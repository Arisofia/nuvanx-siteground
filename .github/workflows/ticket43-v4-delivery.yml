name: Ticket 43 Editorial Staging QA

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact 40-character candidate SHA to deploy to staging2
        required: true
        type: string
      base_sha:
        description: Exact 40-character base SHA for scope validation
        required: true
        type: string

permissions:
  contents: read

env:
  STAGING_BASE_URL: https://staging2.nuvanx.com
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html
  REMOTE_TMP: /home/customer/www/staging2.nuvanx.com/public_html/tmp-ticket43-${{ github.run_id }}-${{ github.run_attempt }}
  BACKUP_NAME: ticket43-editorial-before-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  editorial-staging-qa:
    name: Editorial staging deployment and QA
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Validate secrets and candidate SHAs
        id: candidate
        env:
          TARGET: ${{ inputs.target_sha }}
          BASE: ${{ inputs.base_sha }}
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
          BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
          BASIC_PASS: ${{ secrets.STAGING_BASIC_PASSWORD }}
        run: |
          set -euo pipefail
          for name in SSH_KEY SSH_USER SSH_HOST SSH_PORT KNOWN_HOSTS BASIC_USER BASIC_PASS; do
            [[ -n "${!name:-}" ]] || { echo "ERROR: required secret $name is empty"; exit 1; }
          done
          [[ "$TARGET" =~ ^[0-9a-f]{40}$ ]] || { echo 'ERROR: invalid target_sha'; exit 1; }
          [[ "$BASE" =~ ^[0-9a-f]{40}$ ]] || { echo 'ERROR: invalid base_sha'; exit 1; }
          [[ "$TARGET" != "$BASE" ]] || { echo 'ERROR: target_sha equals base_sha'; exit 1; }
          git fetch origin master
          git cat-file -e "${TARGET}^{commit}"
          git cat-file -e "${BASE}^{commit}"
          git merge-base --is-ancestor origin/master "$TARGET" || { echo 'ERROR: target must contain current master'; exit 1; }
          git merge-base --is-ancestor "$BASE" "$TARGET" || { echo 'ERROR: base must be an ancestor of target'; exit 1; }
          git checkout --detach "$TARGET"
          echo "sha=$TARGET" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Validate scope, architecture and deterministic CSS
        run: |
          set -euo pipefail
          TARGET='${{ steps.candidate.outputs.sha }}'
          BASE='${{ steps.candidate.outputs.base }}'
          THEME='wp-content/themes/nuvanx-medical'
          CSS="$THEME/assets/css"
          HOME="$CSS/nvx-brand-home.css"
          COMPONENTS="$CSS/nvx-components.css"
          HTML='deploy/ticket-43/post_content_v3-production-copy.html'
          mkdir -p qa/results qa/screenshots
          git diff --name-only "$BASE" "$TARGET" | tee qa/results/editorial-changed-files.txt
          git diff --stat "$BASE" "$TARGET" | tee qa/results/editorial-diff-stat.txt
          test -s qa/results/editorial-changed-files.txt
          ALLOWED='^(\.github/workflows/ticket43-v4-delivery\.yml|deploy/ticket-43/post_content_v3-production-copy\.html|qa/design-system/HARDENING-NOTE\.md|wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home(\.min)?\.css)$'
          INVALID="$(grep -Ev "$ALLOWED" qa/results/editorial-changed-files.txt || true)"
          [[ -z "$INVALID" ]] || { echo "ERROR: files outside scope:"; echo "$INVALID"; exit 1; }
          ! grep -RIn --include='*.css' '!important' "$THEME"
          ! grep -nEi 'Playfair|Cormorant|Source Sans|font-family:[^;]*Inter|transition\s*:\s*all|nth-child|nth-of-type' "$HOME" "$COMPONENTS" "$HTML"
          ! grep -nE 'nvx-v3-|nvx-editorial-home-v4|id="nvx-home-manifiesto"' "$HOME" "$HTML"
          grep -q 'id="nvx-home-main" class="nvx-home nvx-brand-page nvx-editorial-home"' "$HTML"
          grep -q 'class="nvx-index-item__number"' "$HTML"
          [[ "$(grep -o 'nvx-home-editorial__lead' "$HTML" | wc -l)" -eq 1 ]]
          [[ "$(grep -o 'nvx-home-editorial__body' "$HTML" | wc -l)" -eq 1 ]]
          grep -q 'font-variant-numeric: lining-nums tabular-nums' "$COMPONENTS"
          for stem in nvx-tokens nvx-components nvx-brand-home; do
            npx --yes clean-css-cli@5.6.3 -o "/tmp/$stem.min.css" "$CSS/$stem.css"
            cmp -s "/tmp/$stem.min.css" "$CSS/$stem.min.css" || { echo "ERROR: $stem minified asset differs"; exit 1; }
          done
          php scripts/ticket-43/verify-copy-integrity.php \
            qa/fixtures/ticket-43/home-production-post-content.html "$HTML" \
            | tee qa/results/editorial-copy-lock.json
          : > qa/results/editorial-css.sha256
          : > qa/results/editorial-transfer.sha256
          for file in nvx-tokens.css nvx-tokens.min.css nvx-components.css nvx-components.min.css nvx-brand-home.css nvx-brand-home.min.css; do
            hash="$(sha256sum "$CSS/$file" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$file" | tee -a qa/results/editorial-css.sha256 qa/results/editorial-transfer.sha256
          done
          for path in "$HTML" scripts/ticket-43/apply-post-content.php scripts/ticket-43/rollback.sh scripts/ticket-43/verify-post-deploy.sh; do
            hash="$(sha256sum "$path" | awk '{print $1}')"
            printf '%s  %s\n' "$hash" "$(basename "$path")" | tee -a qa/results/editorial-transfer.sha256
          done

      - name: Configure SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Configure known hosts
        env:
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 700 ~/.ssh && chmod 600 ~/.ssh/known_hosts

      - name: Back up staging page and complete CSS set
        id: backup
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' <<'REMOTE'
            set -euo pipefail
            ROOT='/home/customer/www/staging2.nuvanx.com/public_html'
            BACKUP="$HOME/nuvanx-backups/${{ env.BACKUP_NAME }}"
            CSS="$ROOT/wp-content/themes/nuvanx-medical/assets/css"
            cd "$ROOT"
            [[ "$(wp option get siteurl)" == 'https://staging2.nuvanx.com' ]]
            [[ "$(wp option get home)" == 'https://staging2.nuvanx.com' ]]
            [[ "$(wp theme list --status=active --field=name)" == 'nuvanx-medical' ]]
            [[ "$(wp option get page_on_front)" == '9' ]]
            mkdir -p "$BACKUP"
            wp post get 9 --field=post_content > "$BACKUP/post_content_before.html"
            for file in nvx-tokens.css nvx-tokens.min.css nvx-components.css nvx-components.min.css nvx-brand-home.css nvx-brand-home.min.css; do
              test -s "$CSS/$file"; cp "$CSS/$file" "$BACKUP/$file"
            done
            cd "$BACKUP"
            sha256sum post_content_before.html nvx-*.css > metadata.sha256
            sha256sum -c metadata.sha256
          REMOTE

      - name: Transfer and deploy candidate to staging2
        id: deploy
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          CSS='wp-content/themes/nuvanx-medical/assets/css'
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -rf '${{ env.REMOTE_TMP }}' && mkdir -p '${{ env.REMOTE_TMP }}'"
          scp -P "$SSH_PORT" \
            "$CSS"/nvx-{tokens,components,brand-home}{,.min}.css \
            deploy/ticket-43/post_content_v3-production-copy.html \
            scripts/ticket-43/{apply-post-content.php,rollback.sh,verify-post-deploy.sh} \
            qa/results/editorial-{transfer,css}.sha256 \
            "$SSH_USER@$SSH_HOST:${{ env.REMOTE_TMP }}/"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' <<'REMOTE'
            set -euo pipefail
            ROOT='/home/customer/www/staging2.nuvanx.com/public_html'
            TMP='${{ env.REMOTE_TMP }}'
            CSS="$ROOT/wp-content/themes/nuvanx-medical/assets/css"
            cd "$TMP" && sha256sum -c editorial-transfer.sha256
            chmod +x rollback.sh verify-post-deploy.sh
            mkdir -p "$ROOT/scripts/ticket-43"
            cp rollback.sh verify-post-deploy.sh "$ROOT/scripts/ticket-43/"
            for file in nvx-tokens.css nvx-tokens.min.css nvx-components.css nvx-components.min.css nvx-brand-home.css nvx-brand-home.min.css; do cp "$TMP/$file" "$CSS/$file"; done
            (cd "$CSS" && sha256sum -c "$TMP/editorial-css.sha256")
            cd "$ROOT"
            NVX_POST_CONTENT_CANDIDATE="$TMP/post_content_v3-production-copy.html" wp eval-file "$TMP/apply-post-content.php"
          REMOTE

      - name: Verify authenticated staging deployment
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
          BASIC_PASS: ${{ secrets.STAGING_BASIC_PASSWORD }}
        run: |
          set -euo pipefail
          U="$(printf '%s' "$BASIC_USER" | base64 -w0)"; P="$(printf '%s' "$BASIC_PASS" | base64 -w0)"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' <<REMOTE
            cd '${{ env.STAGING_PATH }}'
            export NUVX_BASIC_USER="\$(printf '%s' '$U' | base64 -d)"
            export NUVX_BASIC_PASS="\$(printf '%s' '$P' | base64 -d)"
            export NUVX_STAGING_URL='${{ env.STAGING_BASE_URL }}'
            export NUVX_THEME_CSS='wp-content/themes/nuvanx-medical/assets/css'
            export NUVX_HERO_VIDEO_PATH='wp-content/uploads/2026/07/nvx-home-video-portada-hero-12s-720p.mp4'
            bash '${{ env.REMOTE_TMP }}/verify-post-deploy.sh'
          REMOTE

      - name: Install Playwright and collect strict QA evidence
        env:
          STAGING_BASE_URL: ${{ env.STAGING_BASE_URL }}
          STAGING_BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
          STAGING_BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
        run: |
          set -euo pipefail
          npm install --no-save @playwright/test@1.49.1
          npx playwright install --with-deps chromium
          node qa/capture-v4-screenshots.mjs
          node qa/validate-v4-consolidated.mjs
          node qa/validate-design-system-routes.mjs
          test -s qa/results/v4-validation.json
          test -s qa/results/design-system-route-validation.json
          for file in chromium_home_1440x900_viewport.png chromium_home_1024x768_viewport.png chromium_home_390x844_viewport.png hero_1440.png intro_1440.png hero_1024.png intro_1024.png hero_390.png intro_390.png chromium_home_1440x900_fullpage.png chromium_home_390x844_fullpage.png; do test -s "qa/screenshots/$file"; done

      - name: Confirm production is unchanged and write manifest
        run: |
          set -euo pipefail
          HTML="$(curl -fsSL -H 'Cache-Control: no-cache' "https://nuvanx.com/?nocache=$(date +%s)")"
          printf '%s' "$HTML" | grep -q 'EXPERIENCIA NUVANX:'
          ! printf '%s' "$HTML" | grep -q 'nvx-editorial-home'
          cat > qa/results/editorial-delivery-manifest.json <<EOF
          {"branch":"${{ github.ref_name }}","sha":"${{ steps.candidate.outputs.sha }}","base_sha":"${{ steps.candidate.outputs.base }}","workflow_run_id":${{ github.run_id }},"staging_url":"${{ env.STAGING_BASE_URL }}/?nvxqa=editorial","production_deployed":false,"cache_purged":false,"css_assets_deployed":6,"home_viewport_cases":3,"route_regression_cases":27}
          EOF

      - name: Clean remote temporary directory
        if: success()
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "rm -rf '${{ env.REMOTE_TMP }}'"

      - name: Roll back staging on failure
        if: failure() && steps.backup.outcome == 'success'
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' <<'REMOTE'
            ROOT='/home/customer/www/staging2.nuvanx.com/public_html'; TMP='${{ env.REMOTE_TMP }}'; BACKUP="$HOME/nuvanx-backups/${{ env.BACKUP_NAME }}"
            if [[ -s "$TMP/rollback.sh" ]]; then NVX_BACKUP_DIR="$BACKUP" NVX_STAGING_PATH="$ROOT" bash "$TMP/rollback.sh"; rm -rf "$TMP"; fi
          REMOTE

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ticket43-editorial-screenshots
          path: qa/screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ticket43-editorial-qa-results
          path: qa/results/
          retention-days: 30
          if-no-files-found: warn
