name: Patch Audit Declaration Boundary

on:
  push:
    branches:
      - fix/warm-white-accent-20260717
    paths:
      - 'scripts/design-system/patch-audit-declaration-boundary.mjs'
      - '.github/workflows/patch-audit-declaration-boundary.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Patch parser and run regression assertion
        run: node scripts/design-system/patch-audit-declaration-boundary.mjs
      - name: Run CSS audit
        run: node scripts/design-system/audit-css.mjs
      - name: Commit parser fix and audit artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/design-system/audit-css.mjs qa/design-system
          git commit -m 'fix(css): ignore custom-property name fragments in declaration audit'
          git push origin HEAD:${{ github.ref_name }}
