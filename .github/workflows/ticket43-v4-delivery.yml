name: Ticket 43 V4 Delivery QA

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA del candidato V4 (40 hex)'
        required: false
        default: ''
  push:
    branches:
      - fix/ticket-43-v4-1-reference-alignment

permissions:
  contents: read

env:
  STAGING_BASE_URL: https://staging2.nuvanx.com
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html
  BACKUP_NAME: ticket43-v4-before-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  v4-delivery-qa:
    name: V4 Consolidated Delivery QA
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Resolve Candidate SHA
        id: candidate
        run: |
          if [ -n "${{ github.event.inputs.target_sha }}" ]; then
            TARGET="${{ github.event.inputs.target_sha }}"
          else
            TARGET="${{ github.sha }}"
          fi
          if [[ ! "$TARGET" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: invalid SHA: $TARGET"
            exit 1
          fi
          echo "sha=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Candidate SHA: $TARGET"

      - name: Checkout Candidate SHA
        run: |
          git checkout "${{ steps.candidate.outputs.sha }}"

      - name: Prepare QA Results Directory
        run: |
          mkdir -p qa/results qa/screenshots

      - name: Compare Against Master
        run: |
          git fetch origin master
          TARGET="${{ steps.candidate.outputs.sha }}"
          git diff --stat origin/master..."$TARGET" > qa/results/v4-diff-stat.txt
          git diff origin/master..."$TARGET" -- \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            deploy/ticket-43/post_content_v3-production-copy.html \
            > qa/results/v4-css-html.diff || true
          git diff --name-only origin/master..."$TARGET" > qa/results/v4-changed-files.txt
          cat qa/results/v4-diff-stat.txt
          cat qa/results/v4-changed-files.txt

      - name: Candidate Hashes
        run: |
          sha256sum deploy/ticket-43/post_content_v3-production-copy.html \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css \
            | tee qa/results/v4-hashes.txt

      - name: Copy Lock Manifest
        run: |
          php scripts/ticket-43/verify-copy-integrity.php \
            qa/fixtures/ticket-43/home-production-post-content.html \
            deploy/ticket-43/post_content_v3-production-copy.html \
            | tee qa/results/v4-copy-lock.json

      - name: CSS Consolidation Check
        run: |
          CSS="wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css"
          grep -q "TICKET #43 — V4.1 FINAL REFERENCE ALIGNMENT" "$CSS"
          ! grep -q "TICKET #43 — V3 FULL-HOME" "$CSS"
          ! grep -q "RECONCILIATION CONTRACT" "$CSS"
          ! grep -q "NUVANX HOME CANONICAL 2026" "$CSS"
          wc -l "$CSS" | tee qa/results/v4-css-lines.txt

      - name: Setup SSH for Staging Sync
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Configure SSH Known Hosts
        env:
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/known_hosts

      - name: Precheck Staging and Create Backup
        id: backup
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            cd "${{ env.STAGING_PATH }}"

            SITEURL=\$(wp option get siteurl)
            HOMEURL=\$(wp option get home)
            ACTIVE_THEME=\$(wp theme list --status=active --field=name)

            if [ "\$SITEURL" != "${{ env.STAGING_BASE_URL }}" ]; then echo "ERROR: SITEURL mismatch: \$SITEURL"; exit 1; fi
            if [ "\$HOMEURL" != "${{ env.STAGING_BASE_URL }}" ]; then echo "ERROR: HOMEURL mismatch: \$HOMEURL"; exit 1; fi
            if [ "\$ACTIVE_THEME" != "nuvanx-medical" ]; then echo "ERROR: ACTIVE_THEME mismatch: \$ACTIVE_THEME"; exit 1; fi

            BACKUP_DIR="\$HOME/nuvanx-backups/${{ env.BACKUP_NAME }}"
            mkdir -p "\$BACKUP_DIR"

            wp post get 9 --field=post_content > "\$BACKUP_DIR/post_content_before.html"
            sha256sum "\$BACKUP_DIR/post_content_before.html" > "\$BACKUP_DIR/metadata.sha256"

            THEME_CSS="${{ env.STAGING_PATH }}/wp-content/themes/nuvanx-medical/assets/css"
            cp "\$THEME_CSS/nvx-brand-home.css" "\$BACKUP_DIR/"
            cp "\$THEME_CSS/nvx-brand-home.min.css" "\$BACKUP_DIR/"
            sha256sum "\$BACKUP_DIR/nvx-brand-home.css" "\$BACKUP_DIR/nvx-brand-home.min.css" >> "\$BACKUP_DIR/metadata.sha256"

            echo "\$BACKUP_DIR" > /tmp/nvx_ticket43_v4_backup_dir.txt
            echo "Backup created at \$BACKUP_DIR"
          EOF

      - name: Deploy V4 Candidate to Staging2
        id: deploy
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p ${{ env.STAGING_PATH }}/tmp-v4-deploy ${{ env.STAGING_PATH }}/deploy/ticket-43 ${{ env.STAGING_PATH }}/scripts/ticket-43"
          scp -P "$SSH_PORT" deploy/ticket-43/post_content_v3-production-copy.html \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.min.css \
            scripts/ticket-43/apply-post-content.php \
            scripts/ticket-43/rollback.sh \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/tmp-v4-deploy/"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "chmod +x ${{ env.STAGING_PATH }}/tmp-v4-deploy/rollback.sh && \
            cp ${{ env.STAGING_PATH }}/tmp-v4-deploy/rollback.sh ${{ env.STAGING_PATH }}/scripts/ticket-43/rollback.sh && \
            cd ${{ env.STAGING_PATH }} && \
            cp tmp-v4-deploy/nvx-brand-home.css wp-content/themes/nuvanx-medical/assets/css/ && \
            cp tmp-v4-deploy/nvx-brand-home.min.css wp-content/themes/nuvanx-medical/assets/css/ && \
            NVX_POST_CONTENT_V3=${{ env.STAGING_PATH }}/tmp-v4-deploy/post_content_v3-production-copy.html \
            wp eval-file tmp-v4-deploy/apply-post-content.php"

      - name: Ensure Staging Media Aliases
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            UPLOADS="${{ env.STAGING_PATH }}/wp-content/uploads"
            TARGET="\$UPLOADS/2026/07/nvx-javi-gris-760.webp"
            SOURCE="\$UPLOADS/2026/06/nvx-javi-gris-760.webp"
            REMOTE="https://nuvanx.com/wp-content/uploads/2026/06/nvx-javi-gris-760.webp"
            if [ ! -s "\$TARGET" ]; then
              mkdir -p "\$UPLOADS/2026/07"
              if [ -s "\$SOURCE" ]; then
                cp "\$SOURCE" "\$TARGET"
                echo "Aliased javi media from local 2026/06 copy."
              else
                curl -fsSL "\$REMOTE" -o "\$TARGET"
                echo "Fetched javi media alias from production 2026/06."
              fi
            else
              echo "javi media alias already present."
            fi
          EOF

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save @playwright/test@1.49.1
          npx playwright install chromium

      - name: Capture Viewports and Crops
        id: capture
        env:
          STAGING_BASE_URL: ${{ env.STAGING_BASE_URL }}
          STAGING_BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
          STAGING_BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
        run: |
          if [[ -z "${STAGING_BASIC_USER}" && -z "${STAGING_BASIC_PASSWORD}" ]]; then
            echo "NOTICE: STAGING_BASIC_USER/PASSWORD not set; using GitHub Actions IP allowlist."
          elif [[ -z "${STAGING_BASIC_PASSWORD}" ]]; then
            echo "ERROR: STAGING_BASIC_PASSWORD required when STAGING_BASIC_USER is set"
            exit 1
          fi
          mkdir -p qa/screenshots qa/results
          node qa/capture-v4-screenshots.mjs
          for f in \
            qa/screenshots/chromium_home_1440x900_viewport.png \
            qa/screenshots/chromium_home_1024x768_viewport.png \
            qa/screenshots/chromium_home_390x844_viewport.png \
            qa/screenshots/hero_1440.png \
            qa/screenshots/intro_1440.png \
            qa/screenshots/hero_1024.png \
            qa/screenshots/intro_1024.png \
            qa/screenshots/hero_390.png \
            qa/screenshots/intro_390.png \
            qa/screenshots/chromium_home_1440x900_fullpage.png \
            qa/screenshots/chromium_home_390x844_fullpage.png; do
            test -s "$f" || { echo "Missing screenshot: $f"; exit 1; }
          done
          file qa/screenshots/chromium_home_*_viewport.png | tee qa/results/v4-screenshot-dimensions.txt

      - name: Run V4 Validation
        id: validate
        env:
          STAGING_BASE_URL: ${{ env.STAGING_BASE_URL }}
          STAGING_BASIC_USER: ${{ secrets.STAGING_BASIC_USER }}
          STAGING_BASIC_PASSWORD: ${{ secrets.STAGING_BASIC_PASSWORD }}
        run: |
          if [[ -z "${STAGING_BASIC_USER}" && -z "${STAGING_BASIC_PASSWORD}" ]]; then
            echo "NOTICE: STAGING_BASIC_USER/PASSWORD not set; using GitHub Actions IP allowlist."
          elif [[ -z "${STAGING_BASIC_PASSWORD}" ]]; then
            echo "ERROR: STAGING_BASIC_PASSWORD required when STAGING_BASIC_USER is set"
            exit 1
          fi
          node qa/validate-v4-consolidated.mjs
          test -s qa/results/v4-validation.json

      - name: Write Delivery Manifest
        if: success()
        run: |
          TARGET="${{ steps.candidate.outputs.sha }}"
          cat > qa/results/v4-delivery-manifest.json <<EOF
          {
            "branch": "${{ github.ref_name }}",
            "sha": "${TARGET}",
            "workflow_run_id": ${{ github.run_id }},
            "workflow_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "staging_url": "${{ env.STAGING_BASE_URL }}/?nvxqa=v4",
            "artifacts": [
              "qa/screenshots/chromium_home_1440x900_viewport.png",
              "qa/screenshots/chromium_home_1024x768_viewport.png",
              "qa/screenshots/chromium_home_390x844_viewport.png",
              "qa/screenshots/hero_1440.png",
              "qa/screenshots/intro_1440.png",
              "qa/screenshots/hero_1024.png",
              "qa/screenshots/intro_1024.png",
              "qa/screenshots/hero_390.png",
              "qa/screenshots/intro_390.png",
              "qa/screenshots/chromium_home_1440x900_fullpage.png",
              "qa/screenshots/chromium_home_390x844_fullpage.png",
              "qa/results/v4-validation.json",
              "qa/results/v4-hashes.txt",
              "qa/results/v4-copy-lock.json",
              "qa/results/v4-css-html.diff",
              "qa/results/v4-changed-files.txt"
            ]
          }
          EOF

      - name: Rollback Staging on Failure
        if: failure() && steps.backup.outcome == 'success'
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' << EOF
            set -e
            BACKUP_DIR="\$HOME/nuvanx-backups/${{ env.BACKUP_NAME }}"
            export NUVX_BACKUP_DIR="\$BACKUP_DIR"
            export NUVX_STAGING_PATH="${{ env.STAGING_PATH }}"
            bash "${{ env.STAGING_PATH }}/scripts/ticket-43/rollback.sh"
          EOF

      - name: Upload V4 Screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ticket43-v4-screenshots
          path: |
            qa/screenshots/chromium_home_1440x900_viewport.png
            qa/screenshots/chromium_home_1024x768_viewport.png
            qa/screenshots/chromium_home_390x844_viewport.png
            qa/screenshots/hero_1440.png
            qa/screenshots/intro_1440.png
            qa/screenshots/hero_1024.png
            qa/screenshots/intro_1024.png
            qa/screenshots/hero_390.png
            qa/screenshots/intro_390.png
            qa/screenshots/chromium_home_1440x900_fullpage.png
            qa/screenshots/chromium_home_390x844_fullpage.png
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload V4 QA Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ticket43-v4-qa-results
          path: qa/results/
          retention-days: 30
          if-no-files-found: ignore