name: Aesthetic Hub Governance Gate

on:
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-hub-governance.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'scripts/seo/test-aesthetic-hub-governance.php'
      - '.github/workflows/aesthetic-hub-governance-gate.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-hub-governance.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'scripts/seo/test-aesthetic-hub-governance.php'
      - '.github/workflows/aesthetic-hub-governance-gate.yml'
  workflow_dispatch:

concurrency:
  group: aesthetic-hub-governance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate PHP syntax
        run: |
          php -l wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-hub-governance.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-integrations.php

      - name: Enforce route and wording contracts
        run: php scripts/seo/test-aesthetic-hub-governance.php
