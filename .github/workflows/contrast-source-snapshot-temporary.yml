name: Contrast Patch Temporary

on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/contrast-source-snapshot-temporary.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact contrast patches
        run: |
          python - <<'PY'
          from pathlib import Path

          tokens = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-tokens.css')
          source = tokens.read_text()
          old = '  --nvx-accent-muted: #77736d;'
          new = '  --nvx-accent-muted: #756f69;'
          if source.count(old) != 1:
              raise SystemExit(f'token anchor count={source.count(old)}')
          tokens.write_text(source.replace(old, new))

          home = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css')
          source = home.read_text()
          old = '  color:var(--nvx-accent-muted,var(--nvx-text-muted));'
          new = '  color:var(--nvx-text-on-dark-72);'
          if source.count(old) != 1:
              raise SystemExit(f'home dark kicker anchor count={source.count(old)}')
          home.write_text(source.replace(old, new))

          components = Path('wp-content/themes/nuvanx-medical/assets/css/nvx-components.css')
          source = components.read_text()
          marker = '/* Accessibility contrast contexts: dark bands and consent placeholders. */'
          if marker in source:
              raise SystemExit('contrast context rules already present')
          source += '''\n\n/* Accessibility contrast contexts: dark bands and consent placeholders. */\n:where(\n  .nvx-home-action-banner,\n  .nvx-home-cta-final-band,\n  .nvx-cta-banner,\n  .nvx-catalog-close,\n  .nvx-endolift-action,\n  .nvx-laser-action,\n  .nvx-aes-action\n) :is(\n  .nvx-eyebrow,\n  .nvx-brand-kicker,\n  .nvx-endolift-kicker,\n  .nvx-laser-kicker,\n  .nvx-aes-kicker\n) {\n  color: var(--nvx-text-on-dark-72);\n}\n\nhtml body button.cmplz-blocked-content-notice {\n  color: var(--nvx-light);\n  background-color: var(--nvx-text-body);\n}\n'''
          components.write_text(source)
          PY

      - name: Validate patched CSS
        run: |
          set -euo pipefail
          grep -Fq -- '--nvx-accent-muted: #756f69;' wp-content/themes/nuvanx-medical/assets/css/nvx-tokens.css
          grep -Fq 'color:var(--nvx-text-on-dark-72);' wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css
          grep -Fq 'html body button.cmplz-blocked-content-notice' wp-content/themes/nuvanx-medical/assets/css/nvx-components.css
          npx --yes clean-css-cli@5.6.3 -o /tmp/contrast.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-tokens.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-components.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css
          test -s /tmp/contrast.css

      - name: Commit permanent changes and remove helper
        run: |
          set -euo pipefail
          rm .github/workflows/contrast-source-snapshot-temporary.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/assets/css/nvx-tokens.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-components.css \
            wp-content/themes/nuvanx-medical/assets/css/nvx-brand-home.css \
            .github/workflows/contrast-source-snapshot-temporary.yml
          git commit -m 'fix(a11y): normalize light and dark contrast contexts'
          git push origin HEAD:${{ github.head_ref }}
