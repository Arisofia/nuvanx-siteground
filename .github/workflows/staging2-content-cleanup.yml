name: Staging2 content cleanup (audit/apply)

# Guarded WordPress content cleanup on staging2 only.
# Default: audit (dry-run). Apply requires confirm=CONFIRM-STAGING2.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: audit (dry-run) or apply
        required: true
        default: audit
        type: choice
        options:
          - audit
          - apply
      confirm:
        description: For apply, type exactly CONFIRM-STAGING2
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: staging2-content-cleanup
  cancel-in-progress: false

env:
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html

jobs:
  content-cleanup:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Validate inputs
        run: |
          set -euo pipefail
          MODE='${{ inputs.mode }}'
          CONFIRM='${{ inputs.confirm }}'
          if [[ "$MODE" == "apply" && "$CONFIRM" != "CONFIRM-STAGING2" ]]; then
            echo "ERROR: apply requires confirm=CONFIRM-STAGING2"
            exit 1
          fi

      - name: Known hosts
        env:
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 700 ~/.ssh && chmod 600 ~/.ssh/known_hosts

      - name: Upload cleanup scripts
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'mkdir -p "$HOME/nuvanx-staging2-scripts"'
          rsync -az -e "ssh -p $SSH_PORT" \
            scripts/staging2/cleanup-content-navigation.php \
            scripts/staging2/run-content-cleanup.sh \
            "$SSH_USER@$SSH_HOST:~/nuvanx-staging2-scripts/"

      - name: Run audit or apply on staging2
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "MODE='$MODE' bash -e -s" <<'REMOTE'
            set -euo pipefail
            ROOT='/home/customer/www/staging2.nuvanx.com/public_html'
            SCRIPTS="$HOME/nuvanx-staging2-scripts"
            chmod +x "$SCRIPTS/run-content-cleanup.sh"
            export STAGING2_ROOT="$ROOT"
            export CLEANUP_SCRIPT_SOURCE="$SCRIPTS/cleanup-content-navigation.php"
            cd "$SCRIPTS"
            if [[ "$MODE" == "apply" ]]; then
              bash run-content-cleanup.sh apply CONFIRM-STAGING2
            else
              bash run-content-cleanup.sh audit
            fi
          REMOTE
