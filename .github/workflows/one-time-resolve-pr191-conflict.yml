name: One-time Resolve PR 191 Conflict

on:
  push:
    branches:
      - feature/theme-factory-showcase
    paths:
      - '.github/workflows/one-time-resolve-pr191-conflict.yml'

permissions:
  contents: write

concurrency:
  group: resolve-pr-191-conflict
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: feature/theme-factory-showcase
          fetch-depth: 0

      - name: Merge current master and resolve expected conflict
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin master

          set +e
          git merge --no-ff --no-commit origin/master
          merge_status=$?
          set -e

          unresolved="$(git diff --name-only --diff-filter=U)"
          expected="scripts/design-system/test-showcase-pdf-contract.mjs"

          if [ -n "$unresolved" ] && [ "$unresolved" != "$expected" ]; then
            echo "Unexpected unresolved paths:"
            printf '%s\n' "$unresolved"
            exit 1
          fi

          if [ "$unresolved" = "$expected" ]; then
            git checkout --ours -- "$expected"
            git add "$expected"
          fi

          if [ "$merge_status" -ne 0 ] && [ -z "$unresolved" ]; then
            echo "Merge failed without an inspectable conflict."
            exit 1
          fi

          rm -f .github/workflows/one-time-resolve-pr191-conflict.yml
          git add -A

      - name: Validate resolved branch
        shell: bash
        run: |
          set -euo pipefail
          node scripts/design-system/test-showcase-pdf-contract.mjs
          node scripts/design-system/test-agent-skills-contract.mjs
          node scripts/accessibility/test-accessibility-audit-doc-contract.mjs
          node scripts/design-system/audit-css.mjs
          node scripts/design-system/test-external-visual-closure.mjs

      - name: Commit and push merge resolution
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No merge changes to commit."
            exit 1
          fi
          git commit -m "merge(master): resolve theme showcase contract conflict"
          git push origin HEAD:feature/theme-factory-showcase
