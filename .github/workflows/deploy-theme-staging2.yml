name: Deploy theme to staging2 + flush cache

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch or SHA)
        required: true
        default: master

permissions:
  contents: read

env:
  STAGING_BASE_URL: https://staging2.nuvanx.com
  STAGING_PATH: /home/customer/www/staging2.nuvanx.com/public_html
  THEME_REL: wp-content/themes/nuvanx-medical

jobs:
  deploy-and-flush:
    name: Rsync theme and purge staging caches
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Validate secrets
        env:
          SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          for name in SSH_KEY SSH_USER SSH_HOST SSH_PORT KNOWN_HOSTS; do
            [[ -n "${!name:-}" ]] || { echo "ERROR: secret $name empty"; exit 1; }
          done
          test -d "${{ env.THEME_REL }}"
          test -f "${{ env.THEME_REL }}/style.css"
          test -f "${{ env.THEME_REL }}/assets/css/nvx-tokens.css"
          grep -q 'PLATA PULIDA\|Plata Pulida\|platinum' "${{ env.THEME_REL }}/assets/css/nvx-tokens.css"
          ! test -f "${{ env.THEME_REL }}/assets/css/nvx-fluid-organic-2026.css"
          ! test -f "${{ env.THEME_REL }}/assets/css/nvx-visual-system.css"

      - name: Configure SSH
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Known hosts
        env:
          KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 700 ~/.ssh && chmod 600 ~/.ssh/known_hosts

      - name: Rsync theme to staging2
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -p $SSH_PORT" \
            --exclude '.git' \
            --exclude 'php_errorlog' \
            --exclude '*.log' \
            "${{ env.THEME_REL }}/" \
            "$SSH_USER@$SSH_HOST:${{ env.STAGING_PATH }}/${{ env.THEME_REL }}/"

      - name: Verify remote theme + flush caches
        env:
          SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          SSH_PORT: ${{ secrets.STAGING_SSH_PORT }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'bash -e -s' <<'REMOTE'
            set -euo pipefail
            ROOT='/home/customer/www/staging2.nuvanx.com/public_html'
            THEME="$ROOT/wp-content/themes/nuvanx-medical"
            CSS="$THEME/assets/css"
            cd "$ROOT"
            site="$(wp option get siteurl)"
            home="$(wp option get home)"
            echo "siteurl=$site home=$home"
            [[ "$site" == 'https://staging2.nuvanx.com' ]]
            [[ "$home" == 'https://staging2.nuvanx.com' ]]
            [[ "$(wp theme list --status=active --field=name)" == 'nuvanx-medical' ]]
            test -f "$CSS/nvx-tokens.css"
            test -f "$CSS/nvx-tokens.min.css"
            grep -Eq 'platinum|PLATA PULIDA|Plata Pulida|9ba3ad' "$CSS/nvx-tokens.css"
            ! test -f "$CSS/nvx-fluid-organic-2026.css"
            ! test -f "$CSS/nvx-fluid-organic-2026.min.css"
            ! test -f "$CSS/nvx-visual-system.css"
            ! test -f "$CSS/nvx-typography-alignment.css"
            # WP object cache
            wp cache flush || true
            # SiteGround Optimizer
            wp sg purge || true
            wp sg optimize combine-css disable || true
            wp sg optimize combine-js disable || true
            # Dynamic combined assets
            rm -rf wp-content/uploads/siteground-optimizer-assets/siteground-optimizer-combined-* 2>/dev/null || true
            rm -rf wp-content/cache/sgo-cache/* 2>/dev/null || true
            rm -rf wp-content/cache/* 2>/dev/null || true
            # OPcache if available
            wp eval 'if (function_exists("opcache_reset")) { opcache_reset(); echo "opcache_reset=ok\n"; } else { echo "opcache_reset=na\n"; }' || true
            echo "THEME_HEAD_TOKENS=$(head -n 5 "$CSS/nvx-tokens.css" | tr "\n" " ")"
            echo "DEPLOY_AND_FLUSH_OK"
          REMOTE

      - name: HTTP smoke (public tokens)
        run: |
          set -euo pipefail
          body="$(curl -fsSL "${{ env.STAGING_BASE_URL }}/wp-content/themes/nuvanx-medical/assets/css/nvx-tokens.css")"
          echo "$body" | head -n 12
          echo "$body" | grep -Eqi 'platinum|9ba3ad|plata'
          ! echo "$body" | grep -q 'B89A5B'
          home="$(curl -fsSL "${{ env.STAGING_BASE_URL }}/")"
          echo "$home" | grep -q 'nvx-tokens'
          ! echo "$home" | grep -q 'nvx-fluid-organic-2026'
          ! echo "$home" | grep -q 'nvx-visual-system'
          ! echo "$home" | grep -q 'nvx-typography-alignment'
          echo "HTTP_SMOKE_OK"
