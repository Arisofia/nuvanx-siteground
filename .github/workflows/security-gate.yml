name: Security Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Reject tracked files covered by gitignore
        run: |
          set -euo pipefail
          tracked_ignored="$(git ls-files -ci --exclude-standard)"
          if [[ -n "$tracked_ignored" ]]; then
            echo 'ERROR: files are tracked although .gitignore excludes them:'
            printf '%s\n' "$tracked_ignored"
            exit 1
          fi

      - name: Reject forbidden operational paths
        run: |
          set -euo pipefail
          forbidden="$(git ls-files | grep -E '(^wp-admin/|^wp-includes/|^wp-content/uploads/|^qa/screenshots/|^wp-content/themes/nuvanx-medical-wpvibe-draft/|^wp-content/(sgo-config|sgs_encrypt_key)\.php$|(^|/)wp-config\.php$|(^|/)source_site_wpconfig|(^|/)\.env($|\.)|(^|/)wp-content/backups[^/]*/|(^|/)dup-installer(/|$)|(^|/)installer/original_files_|(^|/)[^/]*installer-log[^/]*$)' || true)"
          if [[ -n "$forbidden" ]]; then
            echo 'ERROR: forbidden operational or runtime paths are tracked:'
            printf '%s\n' "$forbidden"
            exit 1
          fi

      - name: Enforce sole canonical theme
        run: |
          set -euo pipefail
          canonical='nuvanx-medical'
          themes="$(git ls-files | awk -F/ '$1 == "wp-content" && $2 == "themes" && NF >= 4 {print $3}' | sort -u)"
          unexpected="$(printf '%s\n' "$themes" | sed '/^$/d' | grep -vx "$canonical" || true)"
          if [[ -n "$unexpected" ]]; then
            echo 'ERROR: non-canonical WordPress theme directories are versioned:'
            printf '%s\n' "$unexpected"
            exit 1
          fi
          if ! git ls-files --error-unmatch "wp-content/themes/$canonical/functions.php" >/dev/null 2>&1; then
            echo "ERROR: canonical theme is missing: wp-content/themes/$canonical"
            exit 1
          fi
          printf 'canonical_theme=%s\n' "$canonical"

      - name: Scan concrete values and write path-only evidence
        id: scan
        run: |
          set -euo pipefail
          mkdir -p qa/security
          output='qa/security/current-tree-matches.txt'
          : > "$output"
          patterns=(
            "define[[:space:]]*\\([[:space:]]*['\"](AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT|WP_CACHE_KEY_SALT)['\"][[:space:]]*,[[:space:]]*['\"][^'\"]{20,}['\"]"
            "define[[:space:]]*\\([[:space:]]*['\"]DB_PASSWORD['\"][[:space:]]*,[[:space:]]*['\"][^'\"]{8,}['\"]"
            "cache_secret_key[[:space:]]*['\"]?[[:space:]]*=>[[:space:]]*['\"][^'\"]{16,}['\"]"
            "sg_encryption_key[[:space:]]*=[[:space:]]*['\"][^'\"]{16,}['\"]"
            "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "gh[pousr]_[A-Za-z0-9_]{30,}"
          )
          index=0
          for pattern in "${patterns[@]}"; do
            index=$((index + 1))
            matches="$(git grep -lEI "$pattern" -- . ':!docs/security/**' ':!qa/security/**' ':!.github/workflows/security-gate.yml' ':!.github/workflows/security-secret-diagnostic-once.yml' || true)"
            if [[ -n "$matches" ]]; then
              printf '[pattern-%s]\n%s\n' "$index" "$matches" >> "$output"
            fi
          done
          if [[ -s "$output" ]]; then
            echo 'has_matches=true' >> "$GITHUB_OUTPUT"
          else
            printf 'NO_MATCHES\n' > "$output"
            echo 'has_matches=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Upload path-only scan evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: repository-security-path-evidence
          path: qa/security/current-tree-matches.txt
          retention-days: 7
          if-no-files-found: error

      - name: Reject concrete secret values in tracked text
        if: steps.scan.outputs.has_matches == 'true'
        run: |
          echo 'ERROR: possible concrete secret material remains in tracked files.'
          cat qa/security/current-tree-matches.txt
          exit 1

      - name: Report repository hygiene
        run: |
          set -euo pipefail
          printf 'tracked_files=%s\n' "$(git ls-files | wc -l)"
          printf 'commits=%s\n' "$(git rev-list --count --all)"
          printf 'tracked_ignored=0\n'
          printf 'canonical_theme=nuvanx-medical\n'

  issue45-inventory-evidence:
    if: github.head_ref == 'security/issue45-inventory-run-2' || github.ref_name == 'security/issue45-inventory-run-2'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout security tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 1

      - name: Install pinned scanners
        run: |
          set -euo pipefail
          python3 -m pip install --disable-pip-version-check --no-cache-dir git-filter-repo==2.47.0
          version='8.30.1'
          asset="gitleaks_${version}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${version}"
          curl -fsSLO "${base}/${asset}"
          curl -fsSLO "${base}/gitleaks_${version}_checksums.txt"
          grep " ${asset}$" "gitleaks_${version}_checksums.txt" | sha256sum -c -
          tar -xzf "$asset" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Mirror every accessible ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git clone --mirror "$auth_url" /tmp/nuvanx-siteground-purge.git
          git -C /tmp/nuvanx-siteground-purge.git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -C /tmp/nuvanx-siteground-purge.git fetch --force "$auth_url" '+refs/heads/*:refs/heads/*' '+refs/tags/*:refs/tags/*'
          git -C /tmp/nuvanx-siteground-purge.git fetch --force "$auth_url" '+refs/pull/*/head:refs/pull/*/head' '+refs/pull/*/merge:refs/pull/*/merge' || true

      - name: Generate path-only inventory
        run: |
          set -euo pipefail
          mkdir -p /tmp/issue45-tools /tmp/issue45-evidence/pre
          cp scripts/security/issue-45-build-manifest.py /tmp/issue45-tools/
          cp scripts/security/issue-45-inventory.sh /tmp/issue45-tools/
          chmod 700 /tmp/issue45-tools/issue-45-inventory.sh
          /tmp/issue45-tools/issue-45-inventory.sh /tmp/nuvanx-siteground-purge.git /tmp/issue45-evidence/pre /tmp/issue45-tools

      - name: Publish review-safe evidence branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          publish=/tmp/issue45-evidence-publish
          mkdir -p "$publish/qa/security/issue45-inventory"
          cp /tmp/issue45-evidence/pre/inventory-metadata.txt "$publish/qa/security/issue45-inventory/"
          cp /tmp/issue45-evidence/pre/reachable-refs-before.txt "$publish/qa/security/issue45-inventory/"
          cp /tmp/issue45-evidence/pre/repository-size-before.txt "$publish/qa/security/issue45-inventory/"
          cp /tmp/issue45-evidence/pre/candidate-purge-paths.txt "$publish/qa/security/issue45-inventory/"
          cp /tmp/issue45-evidence/pre/candidate-purge-reasons.tsv "$publish/qa/security/issue45-inventory/"
          cp /tmp/issue45-evidence/pre/evidence-sha256.txt "$publish/qa/security/issue45-inventory/"
          cat > "$publish/README.md" <<EOF
          # Issue 45 path-only inventory evidence

          Generated by the pinned all-refs inventory job. No secret values or historical blobs are stored here.
          Source commit: ${GITHUB_SHA}
          EOF
          cd "$publish"
          git init
          git checkout --orphan security/issue45-inventory-evidence
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md qa/security/issue45-inventory
          git commit -m 'security: publish issue 45 path-only inventory evidence'
          auth_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force "$auth_url" HEAD:refs/heads/security/issue45-inventory-evidence
