name: Security Secret Diagnostic Once

on:
  push:
    branches:
      - security/incident-2026-07-15

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.event.head_commit.message == 'chore: run path diagnostic'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: security/incident-2026-07-15
          fetch-depth: 0

      - name: Record matching paths without values
        run: |
          set -euo pipefail
          mkdir -p docs/security
          output='docs/security/current-tree-secret-paths.txt'
          : > "$output"
          patterns=(
            "define[[:space:]]*\\([[:space:]]*['\"](AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT|WP_CACHE_KEY_SALT)['\"][[:space:]]*,[[:space:]]*['\"][^'\"]{20,}['\"]"
            "define[[:space:]]*\\([[:space:]]*['\"]DB_PASSWORD['\"][[:space:]]*,[[:space:]]*['\"][^'\"]{8,}['\"]"
            "-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----"
            "AKIA[0-9A-Z]{16}"
            "gh[pousr]_[A-Za-z0-9_]{30,}"
          )
          index=0
          for pattern in "${patterns[@]}"; do
            index=$((index + 1))
            matches="$(git grep -lEI "$pattern" -- . ':!docs/security/**' ':!.github/workflows/security-gate.yml' ':!.github/workflows/security-secret-diagnostic-once.yml' || true)"
            if [[ -n "$matches" ]]; then
              printf '[pattern-%s]\n%s\n' "$index" "$matches" >> "$output"
            fi
          done
          if [[ ! -s "$output" ]]; then
            printf 'NO_MATCHES\n' > "$output"
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$output"
          git rm .github/workflows/security-secret-diagnostic-once.yml
          git commit -m 'chore: record path diagnostic [skip ci]'
          git push origin HEAD:security/incident-2026-07-15
