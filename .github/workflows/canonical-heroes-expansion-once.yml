name: Canonical Heroes Expansion Once

on:
  push:
    branches:
      - fix/staging2-endolaser-cases-heroes-20260725
    paths:
      - '.github/workflows/canonical-heroes-expansion-once.yml'

permissions:
  contents: write

concurrency:
  group: canonical-heroes-expansion-once
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: fix/staging2-endolaser-cases-heroes-20260725
          fetch-depth: 0
          persist-credentials: false

      - name: Expand canonical hero governance
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          path = Path('wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php')
          content = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "\t\t\t'exion-fractional',\n\t\t\t'equipo-medico',",
                  "\t\t\t'exion-fractional',\n\t\t\t'endolaser-corporal-grasa-localizada',\n\t\t\t'casos-de-pacientes',\n\t\t\t'equipo-medico',",
              ),
              (
                  "\t\t'nvx-hero-subtitle',\n\t);",
                  "\t\t'nvx-hero-subtitle',\n\t\t'nvx-cases-hero__lead',\n\t);",
              ),
              (
                  "\t\t'.//*[contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-brand-hero__media \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-page-hero__media \")]',",
                  "\t\t'.//*[contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-brand-hero__media \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-page-hero__media \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-cases-hero__media \")]',",
              ),
              (
                  "? './/*[contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-editorial-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-editorial-hero__copy-copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-brand-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-page-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-hero__copy \")]',",
                  "? './/*[contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-editorial-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-editorial-hero__copy-copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-brand-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-page-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-hero__copy \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-cases-hero__copy \")]',",
              ),
              (
                  "\t\t'//*[@id=\"nvx-content-transform-root\"]//*[contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-brand-hero \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-editorial-hero \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-page-hero \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-hero-section \")]',",
                  "\t\t'//*[@id=\"nvx-content-transform-root\"]//*[contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-brand-hero \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-editorial-hero \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-page-hero \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-hero-section \") or contains(concat(\" \", normalize-space(@class), \" \"), \" nvx-cases-hero \ \")]',",
              ),
          ]

          for old, new in replacements:
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'expected exactly one match, found {count}: {old[:80]}')
              content = content.replace(old, new, 1)

          path.write_text(content, encoding='utf-8')
          PY

      - name: Validate PHP and contract markers
        shell: bash
        run: |
          set -euo pipefail
          php -l wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php
          grep -Fq "'endolaser-corporal-grasa-localizada'" wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php
          grep -Fq "'casos-de-pacientes'" wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php
          grep -Fq 'nvx-cases-hero__copy' wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php
          grep -Fq 'nvx-cases-hero__media' wp-content/themes/nuvanx-medical/inc/nvx-mobile-hero-hierarchy.php
          git diff --check

      - name: Commit durable change and remove one-off workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/canonical-heroes-expansion-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(hero): govern Endolaser and patient cases canonically'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:fix/staging2-endolaser-cases-heroes-20260725
