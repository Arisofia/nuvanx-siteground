name: SEO Production Readiness Gate

on:
  pull_request:
    paths:
      - 'wp-content/themes/nuvanx-medical/inc/nvx-seo-metadata.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-structured-data.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-treatment-schema.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-seo-production-readiness.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-btl-detail-pages.php'
      - 'scripts/seo/test-production-seo-*'
      - '.github/workflows/seo-production-readiness-gate.yml'
  push:
    branches:
      - master
    paths:
      - 'wp-content/themes/nuvanx-medical/inc/nvx-seo-metadata.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-structured-data.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-treatment-schema.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-seo-production-readiness.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-integrations.php'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-btl-detail-pages.php'
      - 'scripts/seo/test-production-seo-*'
      - '.github/workflows/seo-production-readiness-gate.yml'

permissions:
  contents: read

jobs:
  production-seo-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          show-progress: false
          persist-credentials: false

      - name: Validate PHP syntax
        run: |
          php -l wp-content/themes/nuvanx-medical/inc/nvx-seo-production-readiness.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-seo-metadata.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-page-hygiene.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-structured-data.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-integrations.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-aesthetic-treatment-schema.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-btl-detail-pages.php

      - name: Validate environment, clinic and Schema source contract
        run: node scripts/seo/test-production-seo-contract.mjs

      - name: Exercise graph normalization and robots headers
        run: php scripts/seo/test-production-seo-readiness.php

      - name: Validate Publication Safeguards (P0)
        run: node scripts/seo/test-publication-safeguards.mjs

      - name: Validate Rendered Pages Audit
        run: node scripts/seo/test-audit-rendered-pages.mjs

      - name: Validate SEO Metadata
        run: php scripts/seo/test-seo-metadata.php

      - name: Validate Home Content Canonical V2
        run: php scripts/seo/test-home-content-v2-canonical.php

      - name: Validate Home Content V2
        run: php scripts/seo/test-home-content-v2.php

      - name: Validate Home Copy Canonical
        run: php scripts/seo/test-home-copy-canonical.php

      - name: Validate Home Copy
        run: php scripts/seo/test-home-copy.php

      - name: Validate Home FAQ Parity
        run: php scripts/seo/test-home-faq-parity.php

      - name: Validate Medical Review Governance
        run: php scripts/seo/test-medical-review.php

      - name: Validate P0 Publication Guard
        run: php scripts/seo/test-p0-publication-guard.php

      - name: Validate Page Shell Managed Editorial
        run: php scripts/seo/test-page-shell-managed-editorial.php

      - name: Validate Page Shell Strategy Editorial
        run: php scripts/seo/test-page-shell-strategy-editorial.php

      - name: Validate Page Shell Strategy Hero
        run: php scripts/seo/test-page-shell-strategy-hero.php

      - name: Validate Aesthetic Hub Governance
        run: php scripts/seo/test-aesthetic-hub-governance.php

      - name: Validate Aesthetic Treatment Pages
        run: php scripts/seo/test-aesthetic-treatment-pages.php

      - name: Validate Contacto Audit Fixes
        run: php scripts/seo/test-contacto-audit-fixes.php

      - name: Validate Contacto HubSpot Render
        run: php scripts/seo/test-contacto-hubspot-render.php

      - name: Validate Contacto Iframe Style Cleanup
        run: php scripts/seo/test-contacto-iframe-style-cleanup.php

      - name: Validate Clinical Language
        run: php scripts/seo/test-clinical-language.php

      - name: Validate Retired Slugs Redirect
        run: php scripts/seo/test-retired-slugs-redirect.php

      - name: Validate Staging2 Canonical Closure
        run: php scripts/seo/test-staging2-canonical-closure.php

      - name: Validate Strategy Pages
        run: php scripts/seo/test-strategy-pages.php

      - name: Validate Treatment Catalog Copy
        run: php scripts/seo/test-treatment-catalog-copy.php
