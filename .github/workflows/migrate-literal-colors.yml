name: Migrate Literal Colors

on:
  push:
    branches:
      - fix/remove-literal-colors-20260717
    paths:
      - 'scripts/design-system/migrate-literal-colors.mjs'
      - '.github/workflows/migrate-literal-colors.yml'

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Replace literal colors with semantic tokens
        run: node scripts/design-system/migrate-literal-colors.mjs
      - name: Validate CSS audit
        run: node scripts/design-system/audit-css.mjs
      - name: Commit migration
        run: |
          if git diff --quiet; then
            echo 'No migration changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add wp-content/themes/nuvanx-medical/assets/css scripts/design-system/audit-css.mjs qa/design-system
          git commit -m 'fix(css): replace literal colors with semantic tokens'
          git push origin HEAD:${{ github.ref_name }}
