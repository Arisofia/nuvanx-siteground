name: One-time Staging2 WhatsApp Typography Fix

on:
  push:
    branches:
      - fix/staging2-whatsapp-typography-20260720
    paths:
      - '.github/workflows/one-time-staging2-whatsapp-typography.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/staging2-whatsapp-typography-20260720
          fetch-depth: 0

      - name: Apply canonical closure
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          visual_path = root / 'wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php'
          content_path = root / 'wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php'
          test_path = root / 'scripts/design-system/test-visual-system-contract.mjs'
          audit_path = root / 'scripts/design-system/audit-visual-system.mjs'
          docs_path = root / 'docs/design-system/icons.md'

          visual = visual_path.read_text(encoding='utf-8')
          content = content_path.read_text(encoding='utf-8')
          test = test_path.read_text(encoding='utf-8')
          audit = audit_path.read_text(encoding='utf-8')
          docs = docs_path.read_text(encoding='utf-8')

          def replace_once(source, old, new, label):
              if source.count(old) != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {source.count(old)}')
              return source.replace(old, new, 1)

          visual = replace_once(
              visual,
              "\treturn '<svg class=\"' . esc_attr( $class ) . '\" viewBox=\"0 0 32 32\" fill=\"none\" aria-hidden=\"true\" focusable=\"false\">' . $body . '</svg>';\n}\n",
              "\treturn '<svg class=\"' . esc_attr( $class ) . '\" viewBox=\"0 0 32 32\" fill=\"none\" aria-hidden=\"true\" focusable=\"false\">' . $body . '</svg>';\n}\n\n/** Return the single canonical filled WhatsApp brand icon. */\nfunction nvx_visual_whatsapp_icon_svg( string $class = 'icon-whatsapp nvx-icon--xs' ): string {\n\treturn '<svg class=\"' . esc_attr( $class ) . '\" viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\" focusable=\"false\"><path d=\"M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z\"/></svg>';\n}\n",
              'WhatsApp helper insertion',
          )

          old_type = """/* Typography roles */
body,
.nvx-copy,
.nvx-brand-body,
.nvx-lead,
.nvx-brand-hero__lead,
.nvx-button,
.nvx-btn,
.nvx-brand-btn,
.nvx-eyebrow,
.nvx-brand-kicker,
.nvx-brand-card__kicker {
  font-family: var(--nvx-sans);
}"""
          new_type = """/* Typography roles */
body,
button,
input,
select,
textarea,
label,
summary,
.nvx-copy,
.nvx-brand-body,
.nvx-lead,
.nvx-brand-hero__lead,
.nvx-button,
.nvx-btn,
.nvx-brand-btn,
.nvx-eyebrow,
.nvx-brand-kicker,
.nvx-brand-card__kicker,
.joinchat,
.joinchat__chatbox,
.joinchat__bubble,
.joinchat__open__text,
.joinchat__powered {
  font-family: var(--nvx-sans);
}
:where(.joinchat, .joinchat *) {
  font-family: var(--nvx-sans);
}"""
          visual = replace_once(visual, old_type, new_type, 'typography role block')

          visual = replace_once(
              visual,
              ".nvx-display,\n.nvx-brand-hero__title {",
              ".nvx-display,\n.nvx-brand-hero__title,\n.nvx-hero__title,\n.nvx-editorial-hero__title {",
              'display aliases',
          )
          visual = replace_once(
              visual,
              ".nvx-h1,\n.nvx-heading,\nh1 {",
              ".nvx-h1,\n.nvx-heading,\n.nvx-heading-1,\n.nvx-page__title,\n.nvx-page-title,\nh1 {",
              'h1 aliases',
          )
          visual = replace_once(
              visual,
              ".nvx-h2,\n.nvx-brand-title,\nh2 {",
              ".nvx-h2,\n.nvx-heading-2,\n.nvx-brand-title,\n.nvx-section-title,\nh2 {",
              'h2 aliases',
          )
          visual = replace_once(
              visual,
              ".nvx-h3,\n.nvx-brand-subtitle,\nh3 {",
              ".nvx-h3,\n.nvx-heading-3,\n.nvx-brand-subtitle,\n.nvx-card__title,\n.nvx-clinic-card__name,\nh3 {",
              'h3 aliases',
          )

          visual = replace_once(
              visual,
              "  .nvx-endolift-step__icon,\n  .nvx-benefit-icon,\n  .icon-whatsapp\n) {",
              "  .nvx-endolift-step__icon,\n  .nvx-benefit-icon\n) {",
              'remove WhatsApp from medium icon group',
          )

          old_whatsapp_css = """.icon-whatsapp,
.icon-whatsapp path {
  width: var(--nvx-icon-sm);
  height: var(--nvx-icon-sm);
  fill: currentColor;
  stroke: none;
}"""
          new_whatsapp_css = """.icon-whatsapp {
  display: inline-block;
  width: var(--nvx-icon-xs);
  height: var(--nvx-icon-xs);
  color: currentColor;
  flex: 0 0 var(--nvx-icon-xs);
  vertical-align: middle;
}
.icon-whatsapp path {
  fill: currentColor;
  stroke: none;
}

/* Joinchat is an external widget but must follow the NUVANX scale. */
.joinchat {
  --s: var(--nvx-icon-frame);
  font-family: var(--nvx-sans);
}
.joinchat__button {
  width: var(--nvx-icon-frame);
  height: var(--nvx-icon-frame);
  min-width: var(--nvx-icon-frame);
  min-height: var(--nvx-icon-frame);
}
.joinchat__open__icon {
  width: var(--nvx-icon-sm);
  height: var(--nvx-icon-sm);
  flex: 0 0 var(--nvx-icon-sm);
}"""
          visual = replace_once(visual, old_whatsapp_css, new_whatsapp_css, 'WhatsApp and Joinchat CSS')

          old_enqueue = """/** Add the canonical closure after the last theme stylesheet. */
function nvx_visual_system_enqueue_css(): void {
\t$handle = wp_style_is( 'nvx-home', 'enqueued' ) ? 'nvx-home' : 'nvx-components';
\twp_add_inline_style( $handle, nvx_visual_system_css() );
}
add_action( 'wp_enqueue_scripts', 'nvx_visual_system_enqueue_css', 20 );"""
          new_enqueue = """/** Add the canonical closure after theme and plugin styles. */
function nvx_visual_system_enqueue_css(): void {
\t$version = defined( 'NVX_THEME_VERSION' ) ? NVX_THEME_VERSION : null;
\twp_register_style( 'nvx-visual-system-closure', false, array(), $version );
\twp_enqueue_style( 'nvx-visual-system-closure' );
\twp_add_inline_style( 'nvx-visual-system-closure', nvx_visual_system_css() );
}
add_action( 'wp_enqueue_scripts', 'nvx_visual_system_enqueue_css', 999 );"""
          visual = replace_once(visual, old_enqueue, new_enqueue, 'terminal enqueue')

          cleanup_pattern = re.compile(r"\n\t\$html = \(string\) preg_replace_callback\(\n\t\t'/<section\\b\(\?=\[\^>\]\*\\bid=\[\"\\'\]nvx-site-closing-cta[\s\S]*?\n\t\);\n", re.M)
          visual, count = cleanup_pattern.subn('\n', visual, count=1)
          if count != 1:
              raise SystemExit(f'CTA normalizer removal: expected 1, found {count}')

          old_secondary = """\treturn sprintf(
\t\t'<a class=\"%1$s\" href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">%3$s</a>',
\t\tesc_attr( $class ),
\t\tesc_url( nvx_cta_whatsapp_url() ),
\t\tesc_html__( 'Contactar por WhatsApp', 'nuvanx-medical' )
\t);"""
          new_secondary = """\treturn sprintf(
\t\t'<a class=\"%1$s\" href=\"%2$s\" target=\"_blank\" rel=\"noopener noreferrer\">%3$s<span>%4$s</span></a>',
\t\tesc_attr( $class ),
\t\tesc_url( nvx_cta_whatsapp_url() ),
\t\tnvx_visual_whatsapp_icon_svg(),
\t\tesc_html__( 'Contactar por WhatsApp', 'nuvanx-medical' )
\t);"""
          content = replace_once(content, old_secondary, new_secondary, 'secondary WhatsApp CTA')

          svg_pattern = re.compile(r'\s*<svg class="icon-whatsapp"[^>]*>.*?</svg>', re.S)
          content, count = svg_pattern.subn("\n\t\t\t' . nvx_visual_whatsapp_icon_svg() . '", content, count=1)
          if count != 1:
              raise SystemExit(f'inline WhatsApp SVG replacement: expected 1, found {count}')

          replacements = {
              " aria-label=\"' . esc_attr__( 'Solicitar valoración médica', 'nuvanx-medical' ) . '\" style=\"text-align: center;\">'": " aria-label=\"' . esc_attr__( 'Solicitar valoración médica', 'nuvanx-medical' ) . '\">'",
              "<p class=\"nvx-cta-banner__kicker\" style=\"font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--nvx-color-primary, #9a8a78); margin-bottom: 1rem; font-weight: 600;\">": "<p class=\"nvx-cta-banner__kicker\">",
              "<h2 class=\"nvx-cta-banner__title\" style=\"font-size: 2.5rem; line-height: 1.2; margin-bottom: 1.5rem; color: #ffffff;\">": "<h2 class=\"nvx-cta-banner__title\">",
              "<p class=\"nvx-cta-banner__sub\" style=\"font-size: 1.125rem; color: #cccccc; margin-bottom: 2rem;\">": "<p class=\"nvx-cta-banner__sub\">",
              "<div class=\"nvx-cta-pair nvx-cta-banner__actions\" style=\"justify-content: center;\">": "<div class=\"nvx-cta-pair nvx-cta-banner__actions\">",
              " aria-haspopup=\"dialog\" style=\"text-transform: uppercase; letter-spacing: 1px; font-weight: 600;\">%2$s</a>'": " aria-haspopup=\"dialog\">%2$s</a>'",
          }
          for old, new in replacements.items():
              content = replace_once(content, old, new, f'CTA inline cleanup: {old[:30]}')

          old_close_wa = """\t$html .= sprintf(
\t\t'<a class=\"nvx-btn nvx-btn--secondary-on-dark\" href=\"%1$s\" target=\"_blank\" rel=\"noopener noreferrer\">%2$s</a>',
\t\tesc_url( $whatsapp ),
\t\tesc_html__( 'Contactar por WhatsApp', 'nuvanx-medical' )
\t);"""
          new_close_wa = """\t$html .= sprintf(
\t\t'<a class=\"nvx-btn nvx-btn--secondary-on-dark\" href=\"%1$s\" target=\"_blank\" rel=\"noopener noreferrer\">%2$s<span>%3$s</span></a>',
\t\tesc_url( $whatsapp ),
\t\tnvx_visual_whatsapp_icon_svg(),
\t\tesc_html__( 'Contactar por WhatsApp', 'nuvanx-medical' )
\t);"""
          content = replace_once(content, old_close_wa, new_close_wa, 'closing WhatsApp CTA')

          test = replace_once(
              test,
              "const visual = read('wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php');\n",
              "const visual = read('wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php');\nconst contentPresentation = read('wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php');\n",
              'test content source',
          )
          test = replace_once(
              test,
              "requireMatch(visual, /nvx-site-closing-cta[\\s\\S]*style=/, 'closing CTA inline-style cleanup is missing');",
              "requireMatch(visual, /function nvx_visual_whatsapp_icon_svg\\(/, 'canonical WhatsApp icon helper is missing');\nrequireMatch(visual, /\\.joinchat__button[\\s\\S]*--nvx-icon-frame/, 'Joinchat floating button is not bound to the canonical icon frame');\nrequireMatch(visual, /\\.joinchat__open__icon[\\s\\S]*--nvx-icon-sm/, 'Joinchat chat icon is not bound to the canonical small icon size');\nrequireMatch(visual, /nvx-visual-system-closure[\\s\\S]*wp_enqueue_style[\\s\\S]*999/, 'visual closure must load after theme and plugin styles');\nrequireAbsent(contentPresentation, /\\sstyle=[\"']/, 'content presentation still emits inline styles');\nrequireAbsent(contentPresentation, /#(?:9a8a78|ffffff|cccccc)/i, 'content presentation still contains retired CTA color literals');\nrequireAbsent(contentPresentation, /<svg class=\"icon-whatsapp\"/, 'WhatsApp SVG must come from the canonical helper');",
              'test contract update',
          )
          test = replace_once(
              test,
              "requireMatch(visual, /function nvx_visual_icon_svg\\(/, 'canonical inline icon registry is missing');",
              "requireMatch(visual, /function nvx_visual_icon_svg\\(/, 'canonical inline icon registry is missing');\nrequireMatch(contentPresentation, /nvx_visual_whatsapp_icon_svg\\(\\)/, 'CTA markup does not use the canonical WhatsApp icon helper');",
              'test WhatsApp usage',
          )

          audit = replace_once(
              audit,
              "  const isGovernedLegacyMarkup = /(?:nvx-content-presentation\\.php|nvx-components\\.css)$/i.test(row.file);\n  if (isGovernedLegacyMarkup) continue;\n",
              "",
              'remove visual audit exemptions',
          )
          audit = replace_once(
              audit,
              "  '.icon-whatsapp',\n];",
              "  '.icon-whatsapp',\n  '.joinchat__button',\n  '.joinchat__open__icon',\n];",
              'audit Joinchat selectors',
          )

          if '## WhatsApp y Joinchat' not in docs:
              docs += """

## WhatsApp y Joinchat

- El SVG de marca se genera únicamente con `nvx_visual_whatsapp_icon_svg()`.
- Icono dentro de CTA: `--nvx-icon-xs` (16 px).
- Botón flotante Joinchat: `--nvx-icon-frame` (48 px, objetivo táctil mínimo).
- Icono de apertura dentro del chat: `--nvx-icon-sm` (24 px).
- Todo el texto del widget hereda `--nvx-sans` (Manrope).
- No se permiten tamaños HTML o CSS privados para estas superficies.
"""

          visual_path.write_text(visual, encoding='utf-8')
          content_path.write_text(content, encoding='utf-8')
          test_path.write_text(test, encoding='utf-8')
          audit_path.write_text(audit, encoding='utf-8')
          docs_path.write_text(docs, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/one-time-staging2-whatsapp-typography.yml

      - name: Validate
        run: |
          node scripts/design-system/test-visual-system-contract.mjs
          node scripts/design-system/audit-visual-system.mjs
          node scripts/design-system/audit-css.mjs
          php -l wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php
          php -l wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php
          git diff --check

      - name: Commit focused fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wp-content/themes/nuvanx-medical/inc/nvx-visual-system.php
          git add wp-content/themes/nuvanx-medical/inc/nvx-content-presentation.php
          git add scripts/design-system/test-visual-system-contract.mjs
          git add scripts/design-system/audit-visual-system.mjs
          git add docs/design-system/icons.md
          git add -u .github/workflows/one-time-staging2-whatsapp-typography.yml
          git commit -m "fix(design-system): normalize WhatsApp icons and typography"
          git push origin HEAD:fix/staging2-whatsapp-typography-20260720
