name: Deploy Identity Gate

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-theme-staging2.yml'
      - '.github/workflows/deploy-theme-production.yml'
      - '.github/workflows/deploy-identity-gate.yml'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-environment-flags.php'
      - 'scripts/seo/verify-p0-deployment.mjs'
      - 'scripts/ops/test-deploy-sha-php.php'
      - 'scripts/ops/test-deploy-identity-contract.mjs'
      - 'docs/ops/deployment-source-of-truth.md'
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/deploy-theme-staging2.yml'
      - '.github/workflows/deploy-theme-production.yml'
      - '.github/workflows/deploy-identity-gate.yml'
      - 'wp-content/themes/nuvanx-medical/inc/nvx-environment-flags.php'
      - 'scripts/seo/verify-p0-deployment.mjs'
      - 'scripts/ops/test-deploy-sha-php.php'
      - 'scripts/ops/test-deploy-identity-contract.mjs'
      - 'docs/ops/deployment-source-of-truth.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-deploy-identity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate PHP and JavaScript
        run: |
          set -euo pipefail
          php -l wp-content/themes/nuvanx-medical/inc/nvx-environment-flags.php
          php -l scripts/ops/test-deploy-sha-php.php
          node --check scripts/seo/verify-p0-deployment.mjs
          node --check scripts/ops/test-deploy-identity-contract.mjs

      - name: Enforce exact deployment identity contract
        run: |
          set -euo pipefail
          php scripts/ops/test-deploy-sha-php.php
          node scripts/ops/test-deploy-identity-contract.mjs
