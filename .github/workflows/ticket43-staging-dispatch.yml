name: Ticket 43 Temporary Staging Monitor

on:
  pull_request:
    branches:
      - master
    types:
      - synchronize
      - reopened

permissions:
  actions: read
  contents: read

jobs:
  monitor:
    if: github.head_ref == 'fix/ticket-43-complete-qa-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Locate and monitor staging run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=''
          for attempt in $(seq 1 30); do
            run_id="$(gh run list --repo '${{ github.repository }}' --workflow ticket43-v4-delivery.yml --branch fix/ticket-43-complete-qa-hardening --event workflow_dispatch --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
            [[ -n "$run_id" ]] && break
            sleep 10
          done
          [[ -n "$run_id" ]]
          echo "Staging workflow run: $run_id"
          gh run watch "$run_id" --repo '${{ github.repository }}' --exit-status
